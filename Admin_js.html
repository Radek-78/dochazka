<script>
    /**
     * Pomocné funkce pro bezpečné vkládání dat do HTML (ochrana proti XSS).
     */
    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    // Validuje CSS barvu – povoluje pouze hex (#rrggbb, #rgb) a pojmenované barvy.
    // Zabraňuje CSS injection přes hodnoty barev statusů.
    function safeCssColor(val) {
        if (!val) return '#94a3b8';
        return /^#[0-9a-fA-F]{3,8}$|^[a-zA-Z]+$/.test(String(val)) ? String(val) : '#94a3b8';
    }

    /**
    * Logika pro Administraci - Nová architektura (OPRAVENÝ SCOPING A ROZŠÍŘENÉ SLOUPCE)
    */
    var admin = window.admin = {
        data: null,
        users: [],
        statuses: [],
        showInactiveUsers: true,
        currentTab: 'users',
        userSearchQuery: '',
        statusView: 'normal',
        privacySettings: { masking_enabled: false },
        _expandedLocations: new Set(),
        _locationsInitialized: false,
        _sectionViewMode: {},       // { [sectionId]: 'structure' | 'config' }
        _sectionConfigs: {},        // { [sectionId]: { section_id, show_leader_first, containers } }
        _drag: null,                // drag&drop state
        _addContainerData: null,    // temp data for add-container modal
        namedDays: {},             // { "MM-DD": "Jméno" }
        currentNamedDayMonth: new Date().getMonth() + 1,

        /**
        * Spustí se při přepnutí do Administrace
        */
        init: async function () {
            console.log("Admin: Inicializace spuštěna...");
            const overlay = document.getElementById('admin-init-overlay');
            const statusEl = document.getElementById('admin-init-status');

            if (overlay) overlay.style.display = 'flex';
            if (statusEl) statusEl.textContent = "Načítám konfiguraci a data ze serveru...";
            showAdminStatus("Načítám konfiguraci systému...");

            try {
                await this.refreshAllData();

                if (statusEl) statusEl.textContent = "Aplikuji pravidla přístupu podle rolí...";

                // Zobrazení/skrytí záložek dle definovaných RBAC oprávnění (z category 'Administrace')
                const rbacMapping = {
                    'users': 'manage_users',
                    'depts': 'manage_org',
                    'statuses': 'manage_statuses',
                    'settings': 'settings',
                    'maps': 'manage_maps',
                    'namedays': 'manage_namedays',
                    'rbac': 'manage_rbac'
                };

                let firstVisibleTab = null;
                document.querySelectorAll('.admin-nav-item').forEach(navEl => {
                    const view = navEl.getAttribute('data-view');
                    if (view && rbacMapping[view]) {
                        const permKey = rbacMapping[view];
                        const hasPerm = (typeof window.hasPermission === 'function' || typeof hasPermission === 'function') ? hasPermission(permKey) : false;
                        navEl.style.display = hasPerm ? 'flex' : 'none';
                        if (hasPerm && !firstVisibleTab) firstVisibleTab = view;
                    }
                });

                // Přepne tabulku, pokud k aktuální nemá uživatel oprávnění
                if (this.currentTab && rbacMapping[this.currentTab]) {
                    if (!((typeof window.hasPermission === 'function' || typeof hasPermission === 'function') && hasPermission(rbacMapping[this.currentTab]))) {
                        this.currentTab = firstVisibleTab || 'users';
                    }
                }

                this.renderCurrentTab();
            } catch (e) {
                console.error("Admin: Chyba inicializace:", e);
                showAdminStatus("Chyba při načítání dat.");
                if (statusEl) statusEl.textContent = "Kritická chyba spojení se serverem.";
            } finally {
                // Počkáme malý zlomek vteřiny, aby to neproblikávalo příliš rychle a nebylo to rušivé
                setTimeout(() => {
                    if (overlay) overlay.style.display = 'none';
                }, 300);
            }
        },

        refreshAllData: async function () {
            try {
                const [orgResult, usersResult, statusesResult, namedDaysResult] = await Promise.all([
                    callServer('getAdminOrgData'),
                    callServer('getAllUsers'),
                    callServer('getAttendanceStatuses'),
                    callServer('getNamedDays')
                ]);
                if (orgResult.success) {
                    this.data = orgResult.data;
                    this.vacationConfig = orgResult.data.vacationConfig;
                    this.privacySettings = orgResult.data.privacySettings || { masking_enabled: false };
                }
                if (usersResult.success) this.users = usersResult.data;
                if (statusesResult.success) this.statuses = statusesResult.data || [];
                if (namedDaysResult.success) this.namedDays = namedDaysResult.data || {};

                console.log("Admin: Data načtena.", { org: this.data, users: this.users, statuses: this.statuses, namedDays: this.namedDays });
            } catch (e) {
                console.error("Admin: Refresh error:", e);
                throw e;
            }
        },

        renderCurrentTab: function () {
            console.log("Admin: Přepínám na záložku:", this.currentTab);
            const panels = document.querySelectorAll('.admin-view-panel');
            panels.forEach(p => p.classList.remove('active'));
            const activePanel = document.getElementById(`admin-panel-${this.currentTab}`);
            if (activePanel) {
                activePanel.classList.add('active');
                switch (this.currentTab) {
                    case 'users': this.renderUsers(); break;
                    case 'depts': this.renderOrgStructure(); break;
                    case 'statuses': this.renderStatuses(); break;
                    case 'settings': this.renderSettings(); break;
                    case 'maps': this.renderMapsPanel(); break;
                    case 'namedays': this.renderNamedDays(); break;
                    case 'rbac': this.renderRbac(); break;
                }
            }
        },

        renderUsers: function () {
            const panel = document.getElementById('admin-panel-users');
            if (!panel || !this.users) return;

            // ── SCOPED PERMISSIONS PRO UŽIVATELE ──
            let scope = typeof window.hasPermission === 'function' ? window.hasPermission('manage_users') : 'NONE';
            if (scope === true) scope = 'ALL';
            if (scope === false || !scope) scope = 'NONE';

            if (scope === 'NONE') {
                panel.innerHTML = '<div style="padding:40px; text-align:center; color:#ef4444; font-weight:800;">Nemáte oprávnění spravovat uživatele.</div>';
                return;
            }

            const currentUser = (typeof plannerData !== 'undefined' && plannerData.user) ? plannerData.user : null;
            let filteredUsers = this.users;

            if (scope !== 'ALL' && currentUser) {
                filteredUsers = this.users.filter(u => {
                    if (scope === 'OWN_SECTION') return u.section_id === currentUser.section_id;
                    if (scope === 'OWN_DEPARTMENT') return u.department_id === currentUser.department_id;
                    if (scope === 'OWN_GROUP') return u.group_id === currentUser.group_id;
                    return u.user_id === currentUser.user_id; // Fallback
                });
            }

            const sectionMap = {}; if (this.data && this.data.sections) this.data.sections.forEach(s => sectionMap[s.section_id] = s.name);
            const deptMap = {}; if (this.data && this.data.departments) this.data.departments.forEach(d => deptMap[d.department_id] = d.name);
            const groupMap = {}; if (this.data && this.data.groups) this.data.groups.forEach(g => groupMap[g.group_id] = g.name);
            const posMap = {}; if (this.data && this.data.positions) this.data.positions.forEach(p => posMap[p.position_id] = p.name);
            let renderedUserCount = 0;

            let tableHtml = `
<div class="admin-card" style="padding:0; overflow:hidden;">
    <div class="admin-header-compact"
        style="display:flex; justify-content:space-between; align-items:center; gap:16px; padding:10px 16px; background:#fff; border-bottom:1px solid #f1f5f9; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:14px; flex:1 1 420px; min-width:280px;">
            <h2 style="margin:0; color:var(--primary); font-size:20px; font-weight:900; white-space:nowrap;">Správa uživatelů</h2>
            <div class="admin-user-search">
                <span class="admin-user-search-icon" aria-hidden="true">⌕</span>
                <input id="admin-user-search-input" type="search" value="${escapeHtml(this.userSearchQuery)}"
                    placeholder="Hledat ve všech sloupcích..."
                    oninput="admin.setUserSearch(this.value)"
                    autocomplete="off" aria-label="Hledat uživatele">
                <button type="button" class="admin-user-search-clear" onclick="admin.clearUserSearch()" title="Vymazat hledání">×</button>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex:0 0 auto;">
            <span id="admin-user-search-count" class="admin-user-search-count"></span>
            <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px;">
                <input type="checkbox" ${this.showInactiveUsers ? 'checked' : ''}
                    onchange="admin.toggleInactiveUsers(this.checked)"> Zobrazit neaktivní
            </label>
            <button class="btn-action" onclick="admin.showUserModal()"
                style="background:var(--success); color:white; padding:8px 16px; border-radius:8px; border:none; font-weight:800; cursor:pointer;">+
                PŘIDAT UŽIVATELE</button>
        </div>
    </div>
    <div class="table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Uživatel (Účet)</th>
                    <th>Org. Struktura</th>
                    <th>Pozice</th>
                    <th>Systémová Role</th>
                    <th style="text-align:center">Status</th>
                    <th style="text-align:center">Autorizace</th>
                    <th>Nástup / Ukončení</th>
                    <th style="text-align:center">Akce</th>
                </tr>
            </thead>
            <tbody>
                `;

            filteredUsers.forEach(u => {
                const isActiveInDB = u.active !== "false";
                const isDerivedActive = u.is_derived_active !== false;
                const isCurrentlyActive = isActiveInDB && isDerivedActive;
                const isOptimistic = u._optimistic === true;

                if (!isCurrentlyActive && !this.showInactiveUsers) return;
                renderedUserCount++;
                const authLabel = u.auth_status === 'APPROVED' ? 'Schváleno' : u.auth_status === 'PENDING' ? 'Čeká' : u.auth_status === 'REJECTED' ? 'Zamítnuto' : '';
                const searchableText = [
                    u.first_name, u.last_name, u.email, u.system_role, u.auth_status, authLabel,
                    isCurrentlyActive ? 'Aktivní' : 'Neaktivní',
                    sectionMap[u.section_id], deptMap[u.department_id], groupMap[u.group_id], posMap[u.position_id],
                    this.formatDateCompact(u.date_start), this.formatDateCompact(u.date_end)
                ].concat(Object.keys(u).map(k => u[k])).join(' ');

                tableHtml += `
                <tr class="${!isCurrentlyActive ? 'row-inactive' : ''}${isOptimistic ? ' row-optimistic' : ''}" data-user-row="true" data-search="${escapeHtml(searchableText)}">
                    <td>
                        <div style="font-weight:800;">${escapeHtml(u.first_name)} ${escapeHtml(u.last_name)}</div>
                        <div style="font-size:11px; color:#64748b;">${escapeHtml(u.email)}</div>
                    </td>
                    <td>
                        <div style="font-weight:700; color:var(--primary); font-size:10px;">${escapeHtml(sectionMap[u.section_id] || '-')}</div>
                        <div style="font-size:10px; color:#64748b;">${escapeHtml(deptMap[u.department_id] || '-')} /
                            ${escapeHtml(groupMap[u.group_id] || '-')}</div>
                    </td>
                    <td style="font-size:12px; font-weight:600;">${escapeHtml(posMap[u.position_id] || '-')}</td>
                    <td><span
                            class="badge-role ${u.system_role === 'SUPERADMIN' ? 'badge-superadmin' : (u.system_role === 'ADMIN' ? 'badge-admin' : (u.system_role === 'LEADER' ? 'badge-leader' : ''))}">${u.system_role}</span>
                    </td>
                    <td style="text-align:center;">
                        <span class="${isCurrentlyActive ? 'badge-status-active' : 'badge-status-inactive'}">
                            ${isCurrentlyActive ? 'Aktivní' : 'Neaktivní'}
                        </span>
                    </td>
                    <td style="text-align:center;">
                        ${u.auth_status === 'APPROVED'
                        ? '<span class="badge-auth-yes">Schváleno</span>'
                        : u.auth_status === 'PENDING'
                            ? '<span class="badge-auth-pending">Čeká</span>'
                            : u.auth_status === 'REJECTED'
                                ? '<span class="badge-auth-no">Zamítnuto</span>'
                                : '<span style="color:#cbd5e0; font-size:11px;">—</span>'}
                    </td>
                    <td style="font-size:11px;">
                        N: <strong>${this.formatDateCompact(u.date_start)}</strong><br>
                        U: <strong>${this.formatDateCompact(u.date_end)}</strong>
                    </td>
                    <td style="text-align:center">
                        ${isOptimistic
                        ? `<span class="badge-saving"><span class="saving-spinner"></span> Ukládám…</span>`
                        : `<button onclick="admin.showUserModal('${u.user_id}')" class="btn-icon" title="Upravit">✏️</button>
                               <button onclick="admin.confirmDeleteUser('${u.user_id}')" class="btn-icon btn-icon-danger" title="Smazat účet">🗑️</button>`
                    }
                    </td>
                </tr>
                `;
            });
            tableHtml += `
                <tr id="admin-user-search-empty" style="display:none;">
                    <td colspan="8" style="padding:28px; text-align:center; color:#64748b; font-weight:700;">
                        Nenalezen žádný uživatel odpovídající hledání.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>`;
            panel.innerHTML = tableHtml;
            this._lastRenderedUserCount = renderedUserCount;
            this.applyUserSearchFilter();
        },

        setUserSearch: function (value) {
            this.userSearchQuery = value || '';
            this.applyUserSearchFilter();
        },

        clearUserSearch: function () {
            this.userSearchQuery = '';
            const input = document.getElementById('admin-user-search-input');
            if (input) input.value = '';
            this.applyUserSearchFilter();
            if (input) input.focus();
        },

        applyUserSearchFilter: function () {
            const query = String(this.userSearchQuery || '').trim().toLocaleLowerCase('cs-CZ');
            const rows = document.querySelectorAll('#admin-panel-users tr[data-user-row="true"]');
            let visible = 0;
            rows.forEach(row => {
                const haystack = (row.getAttribute('data-search') || '').toLocaleLowerCase('cs-CZ');
                const match = !query || haystack.indexOf(query) !== -1;
                row.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            const empty = document.getElementById('admin-user-search-empty');
            if (empty) empty.style.display = visible === 0 ? '' : 'none';
            const count = document.getElementById('admin-user-search-count');
            if (count) {
                const total = rows.length;
                count.textContent = query ? (visible + ' / ' + total) : (total + ' uživatelů');
            }
        },

        /**
        * Org. Struktura: Lokace (collapsible) → Úsek → Oddělení → Tým
        */
        renderOrgStructure: function () {
            const panel = document.getElementById('admin-panel-depts');
            if (!panel || !this.data) return;

            panel.innerHTML = `
<div style="display:grid; grid-template-columns: 1fr 360px; gap:20px; align-items: start;">
    <div id="org-tree-container"></div>
    <div id="org-positions-container"></div>
</div>`;

            this.renderOrgTree();
            this.renderPositionsTable();
        },

        /**
         * Vykreslí stromovou strukturu: Lokace (collapsible) → Úsek → Oddělení → Tým
         */
        renderOrgTree: function () {
            const container = document.getElementById('org-tree-container');
            if (!container) return;

            // ── SCOPED PERMISSIONS PRO ORG. STRUKTURU ──
            let scope = typeof window.hasPermission === 'function' ? window.hasPermission('manage_org') : 'NONE';
            if (scope === true) scope = 'ALL';
            if (scope === false || !scope) scope = 'NONE';

            if (scope === 'NONE') {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:#ef4444; font-weight:800;">Nemáte oprávnění spravovat organizační strukturu.</div>';
                return;
            }

            const currentUser = (typeof plannerData !== 'undefined' && plannerData.user) ? plannerData.user : null;
            let sections = this.data.sections || [];
            let departments = this.data.departments || [];
            let groups = this.data.groups || [];

            if (scope !== 'ALL' && currentUser) {
                if (scope === 'OWN_SECTION') {
                    sections = sections.filter(s => s.section_id === currentUser.section_id);
                    departments = departments.filter(d => d.section_id === currentUser.section_id);
                    const deptIds = new Set(departments.map(d => d.department_id));
                    groups = groups.filter(g => deptIds.has(g.department_id));
                } else if (scope === 'OWN_DEPARTMENT') {
                    departments = departments.filter(d => d.department_id === currentUser.department_id);
                    const secIds = new Set(departments.map(d => d.section_id));
                    sections = sections.filter(s => secIds.has(s.section_id));
                    groups = groups.filter(g => g.department_id === currentUser.department_id);
                } else if (scope === 'OWN_GROUP') {
                    groups = groups.filter(g => g.group_id === currentUser.group_id);
                    const deptIds = new Set(groups.map(g => g.department_id));
                    departments = departments.filter(d => deptIds.has(d.department_id));
                    const secIds = new Set(departments.map(d => d.section_id));
                    sections = sections.filter(s => secIds.has(s.section_id));
                }
            }

            const locations = (this.data.locations || []).filter(l => {
                if (l.active === 'false') return false;
                if (scope === 'ALL') return true;
                // Zobrazit lokaci, jen pokud v ní máme nějaký úsek po filtraci
                return sections.some(s => s.location_id === l.location_id);
            });

            // Sort: HQ first, then LC alphabetically
            const sorted = [...locations].sort((a, b) => {
                if (a.type === 'HQ' && b.type !== 'HQ') return -1;
                if (b.type === 'HQ' && a.type !== 'HQ') return 1;
                return (a.name || '').localeCompare(b.name || '', 'cs');
            });

            // Auto-expand první lokaci jen při úplně prvním renderu
            if (!this._locationsInitialized) {
                this._locationsInitialized = true;
                if (sorted.length > 0) {
                    this._expandedLocations.add(sorted[0].location_id);
                }
            }

            let html = `
<div class="admin-card" style="padding:0; overflow:hidden;">
  <div class="admin-header-compact" style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#f8fafc; border-bottom:1px solid #e2e8f0;">
    <h2 style="margin:0; color:var(--primary); font-size:16px; font-weight:900;">Organizační struktura</h2>
    <button class="org-add-loc-btn" onclick="admin.showLocationModal()">+ Lokace</button>
  </div>
  <div class="org-locations-list">`;

            if (sorted.length === 0) {
                html += `<div style="padding:40px; text-align:center; color:#94a3b8; font-size:13px;">Žádné lokace. Klikněte + Lokace pro přidání.</div>`;
            } else {
                sorted.forEach(loc => {
                    const isExpanded = this._expandedLocations.has(loc.location_id);
                    const locSections = sections.filter(s => s.location_id === loc.location_id && s.active !== 'false');
                    const isHQ = loc.type === 'HQ';
                    const secCount = locSections.length;
                    const secLabel = secCount === 1 ? '1 úsek' : secCount > 1 && secCount < 5 ? `${secCount} úseky` : `${secCount} úseků`;

                    html += `
  <div class="org-loc-card" id="loc-card-${loc.location_id}">
    <div class="org-loc-header" onclick="admin.toggleLocation('${loc.location_id}')">
      <span class="org-loc-badge ${isHQ ? 'badge-hq' : 'badge-lc'}">${loc.type || 'LC'}</span>
      <span class="org-loc-name">${escapeHtml(loc.name)}</span>
      <span class="org-loc-count">${secLabel}</span>
      <div class="org-loc-actions" onclick="event.stopPropagation()">
        <button class="org-action-btn" onclick="admin.showLocationModal('${loc.location_id}')" title="Upravit lokaci">✏️</button>
        <button class="org-action-btn btn-danger-sm" onclick="admin.confirmDeleteLocation('${loc.location_id}')" title="Smazat lokaci">🗑️</button>
      </div>
      <span class="org-loc-chevron${isExpanded ? ' expanded' : ''}">▶</span>
    </div>
    <div class="org-loc-body" id="loc-body-${loc.location_id}" style="display:${isExpanded ? 'block' : 'none'};">
      <div class="org-sections-wrap">
        <div class="org-sections-toolbar">
          <span class="org-toolbar-label">Úseky</span>
          <button class="org-add-btn" onclick="admin.showSectionModal(null,'${loc.location_id}')">+ Přidat úsek</button>
        </div>`;

                    if (locSections.length === 0) {
                        html += `<div class="org-empty-msg">Žádné úseky — klikněte + Přidat úsek.</div>`;
                    } else {
                        locSections.forEach(s => {
                            const depts = departments.filter(d => d.section_id === s.section_id && d.active !== 'false');
                            const sectionMode = this._sectionViewMode[s.section_id] || 'structure';

                            // Build dept list HTML for structure mode
                            let deptListHtml = '';
                            depts.forEach(d => {
                                const grps = groups.filter(g => g.department_id === d.department_id && g.active !== 'false');
                                deptListHtml += `
          <div class="org-dept-item">
            <div class="org-dept-row">
              <span class="org-item-icon">📂</span>
              <span class="org-item-name">${escapeHtml(d.name)}</span>
              <div class="org-item-actions">
                <button class="org-action-btn" onclick="admin.showDeptModal('${d.department_id}','${s.section_id}')" title="Upravit">✏️</button>
                <button class="org-action-btn btn-add-success" onclick="admin.showGroupModal(null,'${d.department_id}')" title="Přidat tým">+ Tým</button>
              </div>
            </div>`;
                                grps.forEach(g => {
                                    deptListHtml += `
            <div class="org-group-row">
              <span class="org-item-icon">👥</span>
              <span class="org-item-name">${escapeHtml(g.name)}</span>
              <div class="org-item-actions">
                <button class="org-action-btn" onclick="admin.showGroupModal('${g.group_id}','${d.department_id}')" title="Upravit">✏️</button>
              </div>
            </div>`;
                                });
                                deptListHtml += `</div>`; // .org-dept-item
                            });

                            html += `
        <div class="org-section-item">
          <div class="org-section-row">
            <span class="org-item-icon">🏢</span>
            <span class="org-item-name">${escapeHtml(s.name)}</span>
            <div class="org-item-actions">
              <div class="sec-view-tabs">
                <button class="sec-tab-btn${sectionMode === 'structure' ? ' active' : ''}"
                        onclick="admin.toggleSectionView('${s.section_id}', 'structure')" title="Struktura org.">Struktura</button>
                <button class="sec-tab-btn${sectionMode === 'config' ? ' active' : ''}"
                        onclick="admin.toggleSectionView('${s.section_id}', 'config')" title="Konfigurace zobrazení v kalendáři">📋 Zobrazení</button>
              </div>
              <button class="org-action-btn" onclick="admin.showSectionModal('${s.section_id}','${loc.location_id}')" title="Upravit úsek">✏️</button>
              ${sectionMode === 'structure' ? `<button class="org-action-btn btn-add-primary" onclick="admin.showDeptModal(null,'${s.section_id}')" title="Přidat oddělení">+ Oddělení</button>` : ''}
            </div>
          </div>
          ${sectionMode === 'structure'
                                    ? deptListHtml
                                    : `<div class="sec-config-panel" id="section-config-panel-${s.section_id}"><div class="sec-config-loading"><div class="sec-loading-spinner"></div><span>Načítám konfiguraci…</span></div></div>`
                                }
        </div>`;
                        });
                    }

                    html += `

        saveSectionConfig: async function (sectionId) {

            if (!cfg) return;
            const panel = document.getElementById('section-config-panel-' + sectionId);
            const saveBtn = panel ? panel.querySelector('.sec-btn-save') : null;
            if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Ukládám…'; }
            try {
                const result = await callServer('saveSectionViewConfig', cfg);
                if (result && result.success) {
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ Uloženo!'; setTimeout(() => { if (saveBtn) saveBtn.textContent = '💾 Uložit konfiguraci'; }, 2000); }

                    if (window.plannerData && window.plannerData.user &&
                        window.plannerData.user.section_id === sectionId) {
                        window.plannerData.sectionViewConfig = JSON.parse(JSON.stringify(cfg));

                } else {
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Uložit konfiguraci'; }

        onDragStart: function (ev, type, sectionId, idx, containerId) {
            this._drag = { type, sectionId, idx, containerId };
            ev.dataTransfer.effectAllowed = 'move';
            ev.currentTarget.classList.add('drag-ghost');
        },

        onDragEnd: function (ev) {
            ev.currentTarget.classList.remove('drag-ghost');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            this._drag = null;
        },

        onDragOver: function (ev) {
            ev.preventDefault();
            ev.dataTransfer.dropEffect = 'move';
            ev.currentTarget.classList.add('drag-over');
        },

        onDragLeave: function (ev) {
            ev.currentTarget.classList.remove('drag-over');
        },

        onDrop: function (ev, type, sectionId, targetIdx, containerId) {
            ev.preventDefault();
            ev.stopPropagation();
            ev.currentTarget.classList.remove('drag-over');
            const drag = this._drag;
            if (!drag || drag.sectionId !== sectionId) return;
            const cfg = this._sectionConfigs[sectionId];
            if (!cfg) return;

            if (type === 'container' && drag.type === 'container') {
                const from = drag.idx;
                if (from === targetIdx) return;
                const [moved] = cfg.containers.splice(from, 1);
                cfg.containers.splice(targetIdx, 0, moved);
            } else if (type === 'item' && drag.type === 'item' && drag.containerId === containerId) {
                const container = cfg.containers.find(c => c.id === containerId);
                if (!container || !container.items) return;
                const from = drag.idx;
                if (from === targetIdx) return;
                const [moved] = container.items.splice(from, 1);
                container.items.splice(targetIdx, 0, moved);
            }
            this._drag = null;
            this.renderSectionConfigPanel(sectionId);
        },

            modal.style.display = 'flex';

        saveGeneric: async function (serverMethod, formId) {
            const form = document.getElementById(formId);
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            // Checkbox/toggle: pokud není zaškrtnutý, FormData ho neobsahuje → nastavit 'false'
            form.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
                if (!data[cb.name]) data[cb.name] = 'false';
            });

            // Optimistický update - identifikovat kolekci
            let collection = null;
            let idKey = null;

            if (serverMethod === 'updateLocation') { collection = this.data.locations; idKey = 'location_id'; }
            else if (serverMethod === 'updateSection') { collection = this.data.sections; idKey = 'section_id'; }
            else if (serverMethod === 'updateDepartment') { collection = this.data.departments; idKey = 'department_id'; }
            else if (serverMethod === 'updateGroup') { collection = this.data.groups; idKey = 'group_id'; }
            else if (serverMethod === 'updatePosition') { collection = this.data.positions; idKey = 'position_id'; }
            else if (serverMethod === 'updateAttendanceStatus') { collection = this.statuses; idKey = 'status_id'; }

            const isNew = !data[idKey];
            let tempId = data[idKey] || ('temp-' + Date.now());

            // 1. Zavřít modal okamžitě
            this.closeModal();

            // 2. Aktualizovat lokální cache pokud víme kam
            if (collection && idKey) {
                const optimisticData = { ...data };
                if (isNew) {
                    optimisticData[idKey] = tempId;
                    collection.push(optimisticData);
                } else {
                    const idx = collection.findIndex(item => item[idKey] === tempId);
                    if (idx !== -1) collection[idx] = { ...collection[idx], ...optimisticData };
                }
                // 3. Okamžitě překreslit tab
                this.renderCurrentTab();
            } else {
                // Pro ostatní (uživatelé atd.) necháme zatím klasický loader, protože jsou komplexnější
                showLoader("Ukládám...");
            }

            // 4. Server call na pozadí
            try {
                const result = await callServer(serverMethod, data);
                if (result.success) {
                    // Refresh dat v pozadí pro jistotu (bez blokování UI)
                    await this.refreshAllData();
                    this.renderCurrentTab();

                    if (typeof showAdminToast === 'function') showAdminToast("Uloženo", "success");

                    if (typeof refreshApp === 'function') {
                        refreshApp({ full: true });
                    }
                } else {
                    // V případě chyby nahlásit a refreshnout (pro "rollback")
                    alert("Chyba při ukládání: " + result.error);
                    await this.refreshAllData();
                    this.renderCurrentTab();
                }
            } catch (e) {
                console.error("Optimistic save failed", e);
                await this.refreshAllData();
                this.renderCurrentTab();
            } finally {
                hideLoader();
            }
        },

        togglePrivacyMasking: async function (enabled) {
            const previous = !!(this.privacySettings && this.privacySettings.masking_enabled);
            this.privacySettings = { masking_enabled: !!enabled };
            this.renderStatuses();
            try {
                const result = await callServer('savePrivacySettings', { masking_enabled: !!enabled });
                if (result && result.success) {
                    this.privacySettings = result.data || { masking_enabled: !!enabled };
                    showAdminToast(enabled ? 'GDPR maskování zapnuto' : 'GDPR maskování vypnuto', 'success');
                    this.renderStatuses();
                } else {
                    this.privacySettings = { masking_enabled: previous };
                    this.renderStatuses();
                    showAdminToast('Chyba: ' + (result ? result.error : 'Neznámá chyba'));
                }
            } catch (e) {
                this.privacySettings = { masking_enabled: previous };
                this.renderStatuses();
                showAdminToast('Chyba komunikace: ' + e);
            }
        },

        showStatusModal: function (id, kind) {
            const item = id ? this.statuses.find(s => s.status_id === id) : null;
            const statusKind = item

            const s = this.statuses.find(st => st.status_id === id);
            if (!s) return;
            const newVal = String(s.shows_work_time) === 'true' ? 'false' : 'true';
            s.shows_work_time = newVal;
            this.renderCurrentTab();
            callServer('updateAttendanceStatus', { ...s })
                .then(result => {
                    if (result.success) {
                        showAdminToast('Status upraven', 'success');
                        this.refreshAllData().then(() => {
                            this.renderCurrentTab();
                            if (window.plannerData) window.plannerData.statuses = this.statuses;
                        });
                    } else {
                        s.shows_work_time = newVal === 'true' ? 'false' : 'true';
                        this.renderCurrentTab();
                        alert('Chyba: ' + result.error);
                    }
                })
                .catch(() => {
                    s.shows_work_time = newVal === 'true' ? 'false' : 'true';
                    this.renderCurrentTab();
                });
        },

        deleteStatus: function (id) {
            const item = this.statuses.find(s => s.status_id === id);
            if (!item) return;
            if (!confirm('Opravdu chcete trvale smazat status "' + item.name + '"?\n\nTato akce je nevratná.')) return;

            // Optimistický delete
            const originalIndex = this.statuses.findIndex(s => s.status_id === id);
            const originalItem = { ...this.statuses[originalIndex] };

            this.statuses.splice(originalIndex, 1);
            this.renderCurrentTab();

            callServer('deleteAttendanceStatus', id)
                .then(result => {
                    if (result.success) {
                        showAdminToast("Status smazán", "success");
                        // Tichý refresh
                        this.refreshAllData().then(() => {
                            this.renderCurrentTab();
                            if (window.plannerData) {
                                window.plannerData.statuses = this.statuses;
                                if (typeof renderPlanner === 'function') renderPlanner();
                            }
                        });
                    } else {
                        alert("Chyba při mazání: " + result.error);
                        // Rollback
                        this.refreshAllData().then(() => this.renderCurrentTab());
                    }
                })
                .catch(e => {
                    console.error("Delete status failed", e);

        renderAnniversaryChips: function () {
            const container = document.getElementById('anniversary-chips');
            const hidden = document.getElementById('anniversary-milestones-val');
            if (!container || !hidden) return;
            let milestones = [];
            try { milestones = JSON.parse(hidden.value); } catch (e) { milestones = [10, 15, 20, 40]; }
            milestones.sort(function (a, b) { return a - b; });
            container.innerHTML = milestones.map(function (m) {
                return '<span class="anniversary-chip">' + m + ' let <button type="button" class="anniversary-chip-x" onclick="admin.removeAnniversaryMilestone(' + m + ')">×</button></span>';
            }).join('');
        },

        addAnniversaryMilestone: function () {
            const input = document.getElementById('anniversary-new-input');
            const hidden = document.getElementById('anniversary-milestones-val');
            if (!input || !hidden) return;
            const val = parseInt(input.value, 10);
            if (!val || val < 1 || val > 99) return;
            let milestones = [];
            try { milestones = JSON.parse(hidden.value); } catch (e) { milestones = []; }
            if (milestones.includes(val)) { input.value = ''; return; }
            milestones.push(val);
            hidden.value = JSON.stringify(milestones);
            input.value = '';
            this.renderAnniversaryChips();
        },

        removeAnniversaryMilestone: function (val) {
            const hidden = document.getElementById('anniversary-milestones-val');
            if (!hidden) return;
            let milestones = [];
            try { milestones = JSON.parse(hidden.value); } catch (e) { milestones = []; }
            milestones = milestones.filter(function (m) { return m !== val; });
            hidden.value = JSON.stringify(milestones);
            this.renderAnniversaryChips();
        },

        cleanupOrphanedCalendars: async function () {
            var btn = document.getElementById('cleanup-cal-btn');
            var result = document.getElementById('cleanup-cal-result');
            if (btn) { btn.disabled = true; btn.textContent = '⏳ Probíhá...'; }
            if (result) result.textContent = '';

            try {
                var res = await callServer('cleanupOrphanedCalendars');
                if (res && res.success) {
                    var count = (res.cleaned || []).length;
                    if (count === 0) {
                        if (result) result.innerHTML = '<span style="color:#16a34a; font-weight:600;">✓ Žádné osiřelé kalendáře nenalezeny</span>';
                    } else {
                        var names = res.cleaned.map(function(c) { return c.name; }).join(', ');
                        if (result) result.innerHTML = '<span style="color:#dc2626; font-weight:600;">🗑️ Smazáno ' + count + ' kalendářů: ' + names + '</span>';
                    }
                    if (res.errors && res.errors.length > 0) {
                        var errNames = res.errors.map(function(e) { return e.name; }).join(', ');
                        if (result) result.innerHTML += '<br><span style="color:#f59e0b;">⚠️ Chyby: ' + errNames + '</span>';
                    }
                } else {
                    if (result) result.innerHTML = '<span style="color:#dc2626;">Chyba: ' + ((res && res.error) || 'Neznámá') + '</span>';
                }
            } catch (e) {
                if (result) result.innerHTML = '<span style="color:#dc2626;">Chyba: ' + e.toString() + '</span>';
            }
            if (btn) { btn.disabled = false; btn.textContent = '🗑️ Spustit čištění'; }
        },

        saveVacationSettings: async function () {
            const form = document.getElementById('settings-vacation-form');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            // Přidat hodnotu require_dept_leader_approval (mimo form)
            const rdlaVal = document.getElementById('require-dept-leader-approval-val');
            if (rdlaVal) data.require_dept_leader_approval = rdlaVal.value;
            // Přidat anniversary milestones
            const annVal = document.getElementById('anniversary-milestones-val');
            if (annVal) data.anniversary_milestones = annVal.value;

            // Sestavit calendar_sync_map z checkboxů
            const syncMap = {};
            document.querySelectorAll('.sync-map-check').forEach(chk => {
                if (chk.checked) {
                    const manager = chk.dataset.manager;
                    const target = chk.dataset.target;
                    if (!syncMap[manager]) syncMap[manager] = [];
                    syncMap[manager].push(target);
                }
            });
            data.calendar_sync_map = JSON.stringify(syncMap);

            showLoader("Ukládám nastavení...");
            try {
                const res = await callServer('saveVacationConfig', data);
                if (res.success) {
                    await this.refreshAllData();
                    // Sync with main app
                    if (typeof refreshApp === 'function') refreshApp({ full: true });
                } else {
                    showAdminToast("Chyba: " + res.error);
                }
            } catch (e) {
                showAdminToast("Chyba: " + e);
            } finally {
                hideLoader();
            }
        },

        /**
         * Auto-vyplní e-mail z jména a příjmení ve formátu jmeno.prijmeni@lidl.cz
         * Spouští se při psaní – přepíše pole jen pokud je prázdné nebo stále odpovídá
         * automaticky generovanému vzoru (@lidl.cz)
         */
        autoFillEmail: function () {
            const emailInput = document.getElementById('u-email');
            if (!emailInput) return;

            // Nepřepisuj, pokud uživatel už zadal jinou adresu (mimo @lidl.cz)
            const current = emailInput.value;
            if (current && !current.endsWith('@lidl.cz')) return;

            const fname = (document.getElementById('u-fname')?.value || '').trim();
            const lname = (document.getElementById('u-lname')?.value || '').trim();
            if (!fname || !lname) return;

            // Odstraň diakritiku, lowercase, nechej jen a-z
            const norm = s => s.normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/[^a-z]/g, '');

            emailInput.value = norm(fname) + '.' + norm(lname) + '@lidl.cz';
        },

        /**
         * Přepočítá a zobrazí individuální fond dovolené v modalu uživatele.
         * Reaguje na změny datumu nástupu a staré dovolené.
         */
        updateVacationFundPreview: function () {
            const preview = document.getElementById('u-vacation-fund-preview');
            if (!preview) return;

            const dateStartInput = document.getElementById('u-start');
            const carriedOverInput = document.getElementById('u-carried-over');
            const carriedOver = parseFloat(carriedOverInput?.value || 0) || 0;

            const vacConfig = this.vacationConfig || { system_type: 'GLOBAL', global_days: 30, base_days: 25, max_extra_days: 5 };
            const currYear = new Date().getFullYear();

            // Základní roční nárok dle systému
            let baseEntitlement;
            if ((vacConfig.system_type || 'GLOBAL') === 'INDIVIDUAL') {
                let years = 0;
                const dateStartVal = dateStartInput?.value;
                if (dateStartVal) {
                    const sd = new Date(dateStartVal);
                    if (!isNaN(sd.getTime())) {
                        years = currYear - sd.getFullYear();
                        if (years < 0) years = 0;
                    }
                }
                baseEntitlement = Number(vacConfig.base_days || 25) + Math.min(years, Number(vacConfig.max_extra_days || 5));
            } else {
                baseEntitlement = Number(vacConfig.global_days || 30);
            }

            // Poměrové krácení při nástupu v aktuálním roce
            let proportional = baseEntitlement;
            let monthsNotWorked = 0;
            const dateStartVal = dateStartInput?.value;
            if (dateStartVal) {
                const sd = new Date(dateStartVal);
                if (!isNaN(sd.getTime()) && sd.getFullYear() === currYear) {
                    monthsNotWorked = sd.getMonth();
                    if (monthsNotWorked > 0) {
                        proportional = baseEntitlement - (baseEntitlement / 12) * monthsNotWorked;
                        proportional = Math.round(proportional * 2) / 2;
                    }
                }
            }

            const total = proportional + carriedOver;

            // Sestavit popisný text
            let detail = '';
            if (monthsNotWorked > 0 && carriedOver > 0) {
                detail = ` (${proportional} poměrově z ${baseEntitlement} + ${carriedOver} přeneseno)`;
            } else if (monthsNotWorked > 0) {
                detail = ` (poměrně z ${baseEntitlement} dnů, ${monthsNotWorked} ${monthsNotWorked === 1 ? 'měsíc' : monthsNotWorked < 5 ? 'měsíce' : 'měsíců'} nekráceno)`;
            } else if (carriedOver > 0) {
                detail = ` (${baseEntitlement} + ${carriedOver} přeneseno)`;
            }

            preview.textContent = total + ' dní' + detail;
        },

        saveUser: function () {
            const form = document.getElementById('user-form');
            if (!form || !form.checkValidity()) { form && form.reportValidity(); return; }

            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);

            const isNew = !data.user_id;

            if (isNew) {
                // ── OPTIMISTIC CREATE ──────────────────────────────────────
                // 1. Sestav dočasný objekt uživatele a přidej ho do lokálního pole
                const tempId = '_tmp_' + Date.now();
                const optimisticUser = {
                    user_id: tempId,
                    email: data.email || '',
                    first_name: data.first_name || '',
                    last_name: data.last_name || '',
                    section_id: data.section_id || '',
                    department_id: data.department_id || '',
                    group_id: data.group_id || '',
                    position_id: data.position_id || '',
                    system_role: data.system_role || 'USER',
                    org_role: 'MEMBER',
                    active: data.active || 'true',
                    date_start: data.date_start || '',
                    date_end: data.date_end || '',
                    auth_status: '',
                    vacation_days_carried_over: data.vacation_days_carried_over || '',
                    is_derived_active: true,
                    _optimistic: true
                };

                // 2. Ihned zobraz v UI (modal se zavře, tabulka se přerenduje)
                this.users.push(optimisticUser);
                this.closeModal();
                this.renderCurrentTab();

                // 3. Na pozadí ulož na server
                callServer('updateUser', data)
                    .then(result => {
                        if (result && result.success) {
                            // Nahraď dočasný záznam skutečnými daty ze serveru
                            return this.refreshAllData().then(() => {
                                // Jistota: smažeme dočasný záznam, pokud se náhodou nenačetl (např. ztráta admin práv)
                                if (result.data && result.data.id) {
                                    const idx = this.users.findIndex(u => u.user_id === tempId);
                                    if (idx !== -1) {
                                        this.users[idx].user_id = result.data.id;
                                        delete this.users[idx]._optimistic;
                                    }
                                }
                                this.renderCurrentTab();
                                if (typeof refreshApp === 'function') refreshApp({ full: true });
                            });
                        } else {
                            // Rollback: smaž dočasný záznam a ukaž chybu
                            this.users = this.users.filter(u => u.user_id !== tempId);
                            this.renderCurrentTab();
                            showAdminToast('Chyba při ukládání: ' + (result ? result.error : 'Neznámá chyba'));
                        }
                    })
                    .catch(e => {
                        this.users = this.users.filter(u => u.user_id !== tempId);
                        this.renderCurrentTab();
                        showAdminToast('Chyba komunikace: ' + e);
                    });

            } else {
                // ── OPTIMISTIC UPDATE ──────────────────────────────────────
                // 1. Zapamatuj si originál pro případný rollback
                const existingIdx = this.users.findIndex(u => u.user_id === data.user_id);
                const originalUser = existingIdx !== -1 ? { ...this.users[existingIdx] } : null;

                // 2. Ihned aktualizuj lokální stav
                if (existingIdx !== -1) {
                    this.users[existingIdx] = { ...this.users[existingIdx], ...data, _optimistic: true };
                }
                this.closeModal();
                this.renderCurrentTab();

                // 3. Na pozadí ulož na server
                callServer('updateUser', data)
                    .then(result => {
                        if (result && result.success) {
                            return this.refreshAllData().then(() => {
                                // Jistota: i kdyby se refreshAllData nezdařil načíst nové uživatele (např. ztráta admin práv),
                                // smažeme optimistický příznak lokálně, ať nezůstane točící se kolečko navždy.
                                const idx = this.users.findIndex(u => u.user_id === data.user_id);
                                if (idx !== -1) delete this.users[idx]._optimistic;

                                this.renderCurrentTab();
                                if (typeof refreshApp === 'function') refreshApp({ full: true });
                                if (plannerData && plannerData.user && data.user_id === plannerData.user.user_id) {
                                    if (typeof updateUserProfile === 'function') updateUserProfile(plannerData.user);
                                }
                            });
                        } else {
                            // Rollback
                            if (existingIdx !== -1 && originalUser) this.users[existingIdx] = originalUser;
                            this.renderCurrentTab();
                            showAdminToast('Chyba: ' + (result ? result.error : 'Neznámá chyba'));
                        }
                    })
                    .catch(e => {
                        if (existingIdx !== -1 && originalUser) this.users[existingIdx] = originalUser;
                        this.renderCurrentTab();
                        showAdminToast('Chyba: ' + e);
                    });
            }
        },

        toggleRbacSection: function (btn, catName) {
            const section = btn.closest('.rbac-section-v2');
            if (!section) return;

            const isExpanding = section.classList.contains('is-collapsed');
            section.classList.toggle('is-collapsed');

            // Synchronizace stavu v paměti
            if (isExpanding) {
                this._expandedRbac.add(catName);
            } else {
                this._expandedRbac.delete(catName);
            }
        },

        saveRbac: async function () {
            const inputs = document.querySelectorAll('#admin-panel-rbac input[type="checkbox"], #admin-panel-rbac select.rbac-scope-select');
            const config = {};
            inputs.forEach(el => {
                const key = el.getAttribute('data-key');
                const role = el.getAttribute('data-role');
                if (!config[key]) config[key] = {};

                if (el.tagName === 'SELECT') {
                    config[key][role] = el.value;
                } else {
                    config[key][role] = el.checked;
                }
            });

            showLoader('Ukládám oprávnění...');
            try {
                const result = await callServer('saveRbacConfig', config);
                if (result && result.success) {
                    showAdminToast('Oprávnění byla úspěšně uložena.', 'success');
                } else {
                    showAdminToast('Chyba: ' + (result ? result.error : 'Neznámá chyba'));
                }
            } catch (e) {
                showAdminToast('Chyba komunikace: ' + e);
            } finally {
                hideLoader();
            }
        },

        // ═══════════════════════════════════════════════════════════════════
        // MAPY KANCELÁŘÍ

        _mapsState: {
            sectionId: null,
            maps: [],
            editingMap: null,   // kopie mapy právě editované
            brush: 'desk',
            selectedCell: null, // { row, col } vybraný stůl pro konfiguraci
            isDragging: false
        },

        /**

         */
        renderMapsPanel: function () {
            const panel = document.getElementById('admin-panel-maps');
            if (!panel) return;

            // ── SCOPED PERMISSIONS PRO MAPY ──
            let scope = typeof window.hasPermission === 'function' ? window.hasPermission('manage_maps') : 'NONE';
            if (scope === true) scope = 'ALL';

            if (scope === 'NONE') {
                panel.innerHTML = '<div style="padding:40px; text-align:center; color:#ef4444; font-weight:800;">Nemáte oprávnění spravovat mapy kanceláří.</div>';
                return;
            }

            const currentUser = (typeof plannerData !== 'undefined' && plannerData.user) ? plannerData.user : null;
            let sections = (this.data && this.data.sections || []).filter(s => s.active !== 'false');

            if (scope !== 'ALL' && currentUser) {
                if (scope === 'OWN_SECTION') {
                    sections = sections.filter(s => s.section_id === currentUser.section_id);
                } else if (scope === 'OWN_DEPARTMENT') {
                    const depts = (this.data && this.data.departments || []).filter(d => d.department_id === currentUser.department_id);
                    const secIds = new Set(depts.map(d => d.section_id));
                    sections = sections.filter(s => secIds.has(s.section_id));
                }
            }

            const sectionOptions = sections.map(s =>
                `<option value="${s.section_id}" ${this._mapsState.sectionId === s.section_id ? 'selected' : ''}>${s.name}</option>`
            ).join('');

            panel.innerHTML = `
<div class="maps-panel">
  <div class="maps-header">
    <h2>🗺️ Mapy kanceláří</h2>
    <div class="maps-section-select">
      <span>Úsek:</span>
      <select id="maps-section-sel" onchange="admin.onMapsSectionChange(this.value)">

        ${sectionOptions}

  </div>
  <div id="maps-content"></div>
</div>`;

            if (this._mapsState.sectionId) {
                this.loadMaps(this._mapsState.sectionId);
            } else if (sections.length === 1) {
                // Automaticky vybrat pokud je jen jeden úsek

                document.getElementById('maps-content').innerHTML =

            }

        onMapsSectionChange: function (sectionId) {

                this.loadMaps(sectionId);
            } else {
                document.getElementById('maps-content').innerHTML =
                    `<div class="maps-no-section"><div style="font-size:32px;margin-bottom:10px;">🗺️</div>Vyberte úsek pro zobrazení map kanceláří.</div>`;

        },

        loadMaps: async function (sectionId) {
            const content = document.getElementById('maps-content');
            if (!content) return;
            content.innerHTML = `<div style="padding:30px;text-align:center;color:#94a3b8;">Načítám mapy…</div>`;
            try {

                    this._mapsState.maps = result.data || [];

        /**
         * Otevře editor mapy (existující nebo novou).
         */
        openMapEditor: function (mapId) {
            let map;
            if (mapId) {
                const existing = this._mapsState.maps.find(m => m.map_id === mapId);
                if (!existing) return;
                // Hluboká kopie
                map = JSON.parse(JSON.stringify(existing));
            } else {
                // Nová mapa — inicializuj prázdné buňky
                const rows = 6, cols = 10;
                map = {
                    map_id: '',
                    section_id: this._mapsState.sectionId,
                    name: 'Nová mapa kanceláře',
                    rows, cols,
                    cells: this._initCells(rows, cols)
                };
            }
            this._mapsState.editingMap = map;
            this._mapsState.selectedCell = null;
            this._mapsState.brush = 'desk';
            this.renderMapsContent();
        },

        /**
         * Inicializuje prázdné buňky pro grid rows×cols.
         */
        _initCells: function (rows, cols) {
            const cells = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    cells.push({ id: `r${r}c${c}`, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' });
                }
            }
            return cells;
        },

        /**
         * Synchronizuje pole cells na nový rows×cols rozměr (zachová existující buňky).
         */
        _resizeCells: function (map, newRows, newCols) {
            const oldCells = {};
            (map.cells || []).forEach(c => { oldCells[`r${c.row}c${c.col}`] = c; });
            const cells = [];
            for (let r = 0; r < newRows; r++) {
                for (let c = 0; c < newCols; c++) {
                    const key = `r${r}c${c}`;
                    cells.push(oldCells[key] || { id: key, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' });
                }
            }
            map.cells = cells;
            map.rows = newRows;
            map.cols = newCols;
        },

         */
        renderMapEditor: function () {
            const content = document.getElementById('maps-content');
            if (!content) return;
            const map = this._mapsState.editingMap;
            if (!map) return;

            const users = (this.users || []).filter(u => u.active !== 'false' && !u._optimistic);

            const brushBtns = [

                <button class="map-brush-btn brush-${b.type}${this._mapsState.brush === b.type ? ' active' : ''}"

            content.innerHTML = `

        },

        _buildMapUserListHtml: function (map) {
            const desksWithUsers = (map.cells || [])
                .filter(c => c.type === 'desk' && c.permanent_user_id)
                .sort((a, b) => (a.label || '').localeCompare(b.label || '', undefined, { numeric: true }));

            if (desksWithUsers.length === 0) {
                return `
                    <div class="map-sidebar-empty">

                const u = (this.users || []).find(x => x.user_id === c.permanent_user_id);

        _buildGridHtml: function (map) {
            const cellSize = 40, gap = 3;
            const gridStyle = `grid-template-columns: repeat(${map.cols}, ${cellSize}px); grid-template-rows: repeat(${map.rows}, ${cellSize}px);`;
            let cells = '';
            for (let r = 0; r < map.rows; r++) {
                for (let c = 0; c < map.cols; c++) {
                    const cell = (map.cells || []).find(x => x.row === r && x.col === c)
                        || { id: `r${r}c${c}`, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' };
                    const sel = this._mapsState.selectedCell;
                    const isSelected = sel && sel.row === r && sel.col === c;
                    const hasUser = cell.type === 'desk' && cell.permanent_user_id;
                    let inner = '';

                        inner = `<span class="map-cell-label">${cell.label || '?'}</span>`;
                        if (hasUser) {
                            const u = (this.users || []).find(x => x.user_id === cell.permanent_user_id);
