                mapSection.style.display = 'none';
            }
        }
    }

    function selectAttendanceStatus(statusId) {
        if (!_attModal.userId || !_attModal.canEdit) return;

        var userId = _attModal.userId;
        var date = _attModal.date;

        // NOVÉ: Pokud je "před-kliknutý" rozsah (Týden/Měsíc)
        if (_attModal.rangeAction === 'WEEK') {
            applyAttendanceToWeek(statusId);
            return;
        }
        if (_attModal.rangeAction === 'MONTH') {
            applyAttendanceToMonth(statusId);
            return;
        }

        // Pokud jsme v procesu zapínání hromadného zadávání, přeskočíme standardní jednorázové uložení
        if (_batchActionRequest === 'ENTRY') {
            const slot = _attModal.slot || 'ALL_DAY';
            _batchMode = { active: true, statusId: statusId, slot: slot, action: 'ENTRY' };
            _batchActionRequest = null;
            document.getElementById('attendance-modal').classList.remove('visible');
            const banner = document.getElementById('batch-mode-banner');
            if (banner) {
                banner.classList.add('visible');
                document.body.classList.add('batch-mode');
                setBatchAction('ENTRY');
            }

            // Smazat případné opačné sloty lokálně i na serveru
            if (slot === 'ALL_DAY') {
                if (_attendanceData[userId + '_' + date + '_AM']) queueAttendanceDelete(userId, date, 'AM');
                if (_attendanceData[userId + '_' + date + '_PM']) queueAttendanceDelete(userId, date, 'PM');
                delete _attendanceData[userId + '_' + date + '_AM'];
                delete _attendanceData[userId + '_' + date + '_PM'];
                delete _globalAttendanceData[userId + '_' + date + '_AM'];
                delete _globalAttendanceData[userId + '_' + date + '_PM'];
            } else {
                if (_attendanceData[userId + '_' + date + '_ALL_DAY']) queueAttendanceDelete(userId, date, 'ALL_DAY');
                delete _attendanceData[userId + '_' + date + '_ALL_DAY'];
                delete _globalAttendanceData[userId + '_' + date + '_ALL_DAY'];
            }

            var entry = { user_id: userId, date: date, slot: slot, status_id: statusId };
            _attendanceData[userId + '_' + date + '_' + slot] = entry;

            queueAttendanceSave(entry);

            var cell = getCellElement(entry.user_id, entry.date);
            if (cell) {
                renderAttendanceCell(cell, entry.user_id, entry.date);
                var chip = cell.querySelector('[data-slot="' + entry.slot + '"]');
                if (chip) chip.classList.add('saving'); // simulujeme ukládání pro konzistenci
            }
            _refreshVacationBalance(entry.user_id);
            updateDailyStats();
            _maybeClearReservationOnStatusChange(userId, date);

            return;
        }

        if (_attModal.mode === 'FULL') {
            // Klasické celodenní zadávání
            _attModal.selectedStatusId = statusId;
            var entry = { user_id: userId, date: date, slot: 'ALL_DAY', status_id: statusId };

            // Smazat případné půldenní, pokud zadáváme celodenní → i na serveru!
            var hadAm = !!_attendanceData[userId + '_' + date + '_AM'];
            var hadPm = !!_attendanceData[userId + '_' + date + '_PM'];
            delete _attendanceData[userId + '_' + date + '_AM'];
            delete _attendanceData[userId + '_' + date + '_PM'];
            delete _globalAttendanceData[userId + '_' + date + '_AM'];
            delete _globalAttendanceData[userId + '_' + date + '_PM'];
            if (hadAm) queueAttendanceDelete(userId, date, 'AM');
            if (hadPm) queueAttendanceDelete(userId, date, 'PM');
            _attModal.amStatusId = null;
            _attModal.pmStatusId = null;

            _attendanceData[userId + '_' + date + '_ALL_DAY'] = entry;
            saveAndReflectEntry(entry);
            _updateStatusPreview();
            // Zkontroluj zda rezervace stolu stále platí
            _maybeClearReservationOnStatusChange(userId, date);
        } else {
            // Půldenní sequential výběr (1. klik AM, 2. klik PM)
            var slot = _attModal.nextHalfSlot;
            var entry = { user_id: userId, date: date, slot: slot, status_id: statusId };

            // Smazat celodenní, pokud zadáváme půldenní → i na serveru!
            var hadAllDay = !!_attendanceData[userId + '_' + date + '_ALL_DAY'];
            delete _attendanceData[userId + '_' + date + '_ALL_DAY'];
            delete _globalAttendanceData[userId + '_' + date + '_ALL_DAY'];
            if (hadAllDay) queueAttendanceDelete(userId, date, 'ALL_DAY');
            _attModal.selectedStatusId = null;

            _attendanceData[userId + '_' + date + '_' + slot] = entry;
            saveAndReflectEntry(entry);
            // Zkontroluj zda rezervace stolu stále platí
            _maybeClearReservationOnStatusChange(userId, date);

            if (slot === 'AM') _attModal.amStatusId = statusId; else _attModal.pmStatusId = statusId;

            // Přepnout na další slot nebo zůstat
            if (_attModal.nextHalfSlot === 'AM') {
                _attModal.nextHalfSlot = 'PM';
                _attModal.slot = 'PM';
                const helperText = document.getElementById('slot-helper-text');
                if (helperText) helperText.textContent = 'VYBERTE STATUS PRO ODPOLEDNE';
                _renderStatusGrid(_attModal.canEdit);
            } else {
                // Po druhém kliknutí (PM) zůstává v PM módu (ale status se mohl změnit)
            }
            _updateStatusPreview();
        }
        // Pokud jsme byli v režimu čekání na status pro hromadné zadávání
        if (typeof _batchActionRequest !== 'undefined' && _batchActionRequest === 'ENTRY') {
            _batchMode = {
                active: true,
                statusId: statusId,
                slot: _attModal.slot || 'ALL_DAY',
                action: 'ENTRY'
            };
            _batchActionRequest = null; // Reset

            document.getElementById('attendance-modal').classList.remove('visible');
            const banner = document.getElementById('batch-mode-banner');
            if (banner) {
                banner.classList.add('visible');
                document.body.classList.add('batch-mode');
                setBatchAction('ENTRY');
            }
            return; // Důležité: nepokračovat v běžném zápisu do jedné buňky
        }

        document.getElementById('att-apply-row').classList.add('visible');
        document.getElementById('att-clear-btn').classList.add('visible');

        // Hromadná tlačítka jsou nyní trvale vidět, pokud canEdit (zajištěno v openModal)

        // Auto-close nebo zobrazit/skrýt mapu kanceláře
        var isFullDay = (_attModal.mode === 'FULL');
        var isSecondHalf = (_attModal.mode === 'HALF' && slot === 'PM');
        var needsDesk = _statusNeedsDeskReservation(statusId) && plannerData && plannerData.officeMap;
        var needsWorkTime = _shouldShowWorkStartTimeBox(statusId);

        // Zobrazit nebo skrýt box pro čas příchodu
        if (needsWorkTime) {
            _showWorkStartTimeBox(slot || 'ALL_DAY');
        } else {
            _hideWorkStartTimeBox();
        }

        if (isFullDay || isSecondHalf) {
            if (needsDesk) {
                setTimeout(function () { _showMapInModal(_attModal.date); }, 100);
            } else if (needsWorkTime) {
                // Nezavírat modal – uživatel upraví čas a klikne Hotovo
            } else {
                setTimeout(closeAttendanceModal, 150);
            }
        } else if (_attModal.mode === 'HALF' && slot === 'AM') {
            // Půldenní AM: aktivuj nebo deaktivuj mapu dle statusu
            if (needsDesk) {
                _showMapInModal(_attModal.date);
            } else {
                var mapSection = document.getElementById('att-map-section');
                if (mapSection) {
                    mapSection.classList.add('att-map-inactive');
                    _renderMapInModal(_attModal.date, false);
                    var subtitle = document.getElementById('att-map-subtitle');
                    if (subtitle) subtitle.textContent = 'Vyberte status Kancelář pro aktivaci';
                }
            }
        }
    }

    function toggleRangeAction(action) {
        if (!_attModal.canEdit) return;
        if (_attModal.rangeAction === action) {
            _attModal.rangeAction = null;
        } else {
            _attModal.rangeAction = action;
        }

        // UI Feedback
        const btnWeek = document.getElementById('btn-apply-week');
        const btnMonth = document.getElementById('btn-apply-month');
        if (btnWeek) btnWeek.classList.toggle('active', _attModal.rangeAction === 'WEEK');
        if (btnMonth) btnMonth.classList.toggle('active', _attModal.rangeAction === 'MONTH');
    }

    function closeAttendanceModal() {
        // Pokud je viditelný box pro čas příchodu, aktualizuj záznam a re-ulož
        var workStartBox = document.getElementById('att-work-start-box');
        if (workStartBox && workStartBox.style.display !== 'none') {
            var timeInput = document.getElementById('att-work-start-time');
            var workStartSlot = _attModal._workStartSlot;
            if (timeInput && timeInput.value && _attModal.userId && _attModal.date && workStartSlot) {
                var dk = String(_attModal.date).substring(0, 10);
                var key = _attModal.userId + '_' + dk + '_' + workStartSlot;
                var entry = _attendanceData[key];
                if (entry) {
                    entry.work_start_time = timeInput.value;
                    _attWriteQueue[key] = entry;
                    _persistQueues();
                    clearTimeout(_attSaveTimer);
                    _attSaveTimer = setTimeout(flushAttendanceQueue, 400);
                    // Re-render chipu aby se čas okamžitě zobrazil
                    var cellEl = getCellElement(_attModal.userId, dk);
                    if (cellEl) renderAttendanceCell(cellEl, _attModal.userId, dk);
                }
            }
            workStartBox.style.display = 'none';
        }

        document.getElementById('attendance-modal').classList.remove('visible');

        // Reset stavu hromadného výběru, pokud byl aktivní
        const previewContainer = document.querySelector('.att-status-preview-container');
        if (previewContainer) {
            previewContainer.classList.remove('selection-waiting');
        }
        _batchActionRequest = null;

        // Reset mapy do neaktivního stavu
        var mapSection = document.getElementById('att-map-section');
        if (mapSection) {
            mapSection.classList.add('att-map-inactive');
            var subtitle = document.getElementById('att-map-subtitle');
            if (subtitle) subtitle.textContent = 'Vyberte status pro aktivaci';
        }
        _attModal = { userId: null, date: null, slot: 'ALL_DAY', mode: 'FULL', nextHalfSlot: 'AM', selectedStatusId: null, canEdit: false };
    }

    /**
     * Po každé změně statusu zkontroluje, zda daný den stále obsahuje alespoň jeden
     * kancelářský status. Pokud ne, automaticky odstraní rezervaci stolu pro daný den.
     */
    function _maybeClearReservationOnStatusChange(userId, date) {
        if (!plannerData || !plannerData.officeMap) return;
        if (userId !== plannerData.user.user_id) return;

        var stillNeedsDesk = ['ALL_DAY', 'AM', 'PM'].some(function (slot) {
            var e = _attendanceData[userId + '_' + date + '_' + slot];
            return e && _statusNeedsDeskReservation(e.status_id);
        });

        if (!stillNeedsDesk) {
            var myRes = _mapReservations[userId + '_' + date];
            if (myRes) {
                delete _mapReservations[userId + '_' + date];
                // Překresli buňku (odstraní needs-desk-chip, přidá znovu pokud nutné)
                var cellEl = getCellElement(userId, date);
                if (cellEl) renderAttendanceCell(cellEl, userId, date);
                // Pokud je mapa otevřená v modalu, překresli ji do neaktivního stavu
                var mapSection = document.getElementById('att-map-section');
                if (mapSection && !mapSection.classList.contains('att-map-inactive')) {
                    mapSection.classList.add('att-map-inactive');
                    _renderMapInModal(date, false);
                    var subtitle = document.getElementById('att-map-subtitle');
                    if (subtitle) subtitle.textContent = 'Vyberte status Kancelář pro aktivaci';
                }
                _updateBatchMapBtn();
                // Smaž rezervaci na serveru
                callServer('deleteMapReservation', plannerData.officeMap.map_id, userId, date)
                    .catch(function (e) { console.warn('autoDeleteReservation:', e); });
            }
        }
    }

    // ─── MAPA KANCELÁŘE V MODALU ─────────────────────────────────────────────

    /**
     * Aktivuje mapu kanceláře v modalu (odebere inactive třídu) a vykreslí ji.
     */
    function _showMapInModal(date) {
        var mapSection = document.getElementById('att-map-section');
        if (!mapSection || !plannerData || !plannerData.officeMap) return;
        mapSection.classList.remove('att-map-inactive');
        _renderMapInModal(date, true);
    }

    /**
     * Vykreslí grid mapy kanceláře. active=false → zobrazí šedé neinteraktivní stoly.
     */
    function _renderMapInModal(date, active) {
        var gridEl = document.getElementById('att-map-grid');
        var subtitle = document.getElementById('att-map-subtitle');
        if (!gridEl || !plannerData || !plannerData.officeMap) return;

        var map = plannerData.officeMap;
        var myUserId = _attModal.userId || plannerData.user.user_id;
        var myReservation = active ? (_mapReservations[myUserId + '_' + date] || null) : null;

        // Popisek
        if (active) {
            var hasPermanent = (map.cells || []).some(function (c) { return c.type === 'desk' && c.permanent_user_id === myUserId; });
            if (subtitle) subtitle.textContent = hasPermanent ? 'Vaše místo je předrezervováno' : 'Klikněte na volné místo pro rezervaci';
        }

        // Renderuj grid
        var cellSize = 28, gap = 2;
        var gridStyle = 'grid-template-columns: repeat(' + map.cols + ', ' + cellSize + 'px); grid-template-rows: repeat(' + map.rows + ', ' + cellSize + 'px);';
        var html = '';

        for (var r = 0; r < map.rows; r++) {
            for (var c = 0; c < map.cols; c++) {
                var cell = (map.cells || []).find(function (x) { return x.row === r && x.col === c; });
                if (!cell) cell = { id: 'r' + r + 'c' + c, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' };

                if (cell.type !== 'desk') {
                    html += '<div class="att-map-cell type-' + cell.type + '"></div>';
                    continue;
                }

                var deskClass = active ? _getDeskColorClass(cell, date, myUserId, myReservation) : 'desk-inactive';
                var isSelected = myReservation && myReservation.cell_id === cell.id;
                var isClickable = active && (deskClass === 'desk-free' || deskClass === 'desk-mine');
                var onclick = isClickable ? 'onclick="_handleModalDeskClick(\'' + cell.id + '\',\'' + date + '\')"' : '';

                // Inicíály přiřazeného uživatele
                var userInitials = '';
                if (active) {
                    if (cell.permanent_user_id) {
                        var u = (plannerData.employees || []).find(function (e) { return e.user_id === cell.permanent_user_id; });
                        if (u) userInitials = (u.first_name || '').charAt(0) + (u.last_name || '').charAt(0);
                    } else if (deskClass === 'desk-occupied' || deskClass === 'desk-mine') {
                        var reservedBy = Object.entries(_mapReservations).find(function (kv) {
                            return kv[1].cell_id === cell.id && kv[1].date === date;
                        });
                        if (reservedBy) {
                            var reservedUserId = reservedBy[0].split('_')[0];
                            var ru = (plannerData.employees || []).find(function (e) { return e.user_id === reservedUserId; });
                            if (ru) userInitials = (ru.first_name || '').charAt(0) + (ru.last_name || '').charAt(0);
                        }
                    }
                }

                html += '<div class="att-map-cell type-desk ' + deskClass + (isSelected ? ' desk-selected' : '') + '" ' + onclick + '>' +
                    '<span class="att-map-cell-label">' + (cell.label || '?') + '</span>' +
                    (userInitials ? '<span class="att-map-cell-user">' + userInitials + '</span>' : '') +
                    '</div>';
            }
        }

        gridEl.style.cssText = 'display:inline-grid; gap:' + gap + 'px; ' + gridStyle;
        gridEl.innerHTML = html;
    }

    /**
     * Vrátí CSS třídu barvy stolu podle stavu.
     */
    function _getDeskColorClass(cell, date, myUserId, myReservation) {
        // 1. Moje aktivní rezervace na tomto stolu
        if (myReservation && myReservation.cell_id === cell.id) return 'desk-mine';

        // 2. Moje trvalé místo
        if (cell.permanent_user_id === myUserId) return 'desk-mine';

        // 3. Někdo jiný má rezervaci na tomto stolu
        var otherReservation = Object.entries(_mapReservations).find(function (kv) {
            return kv[1].cell_id === cell.id && kv[1].date === date && kv[0].split('_')[0] !== myUserId;
        });
        if (otherReservation) return 'desk-occupied';

        // 4. Stůl má trvalého uživatele → zkontroluj jeho status
        if (cell.permanent_user_id && cell.permanent_user_id !== myUserId) {
            var puId = cell.permanent_user_id;
            var puAllDay = _attendanceData[puId + '_' + date + '_ALL_DAY'];
            var puAm = _attendanceData[puId + '_' + date + '_AM'];
            var puPm = _attendanceData[puId + '_' + date + '_PM'];
            var puEntries = [puAllDay, puAm, puPm].filter(Boolean);
            if (puEntries.length === 0) return 'desk-pre-no-status'; // oranžová
            var comesToOffice = puEntries.some(function (e) {
                return _statusNeedsDeskReservation(e.status_id);
            });
            return comesToOffice ? 'desk-occupied' : 'desk-pre-other'; // červená nebo tmavě modrá
        }

        // 5. Volné
        return 'desk-free';
    }

    /**
     * Obsluha kliknutí na stůl v modalu.
     */
    function _handleModalDeskClick(cellId, date) {
        var myUserId = _attModal.userId || plannerData.user.user_id;
        var myReservation = _mapReservations[myUserId + '_' + date] || null;

        if (myReservation && myReservation.cell_id === cellId) {
            // Klik na vlastní rezervaci → zrušit
            _deleteModalReservation(date);
        } else {
            // Klik na volný stůl → rezervovat
            _saveModalReservation(cellId, date);
        }
    }

    function _saveModalReservation(cellId, date) {
        var myUserId = _attModal.userId || plannerData.user.user_id;
        var map = plannerData.officeMap;
        var data = { map_id: map.map_id, cell_id: cellId, user_id: myUserId, date: date };

        // Optimistický update cache
        _mapReservations[myUserId + '_' + date] = { reservation_id: '', map_id: map.map_id, cell_id: cellId, date: date };
        // Překresli mapu (zobrazí moji rezervaci)
        _renderMapInModal(date, true);
        // Překresli buňku v kalendáři → odebere needs-desk-chip
        var cellEl = getCellElement(myUserId, date);
        if (cellEl) renderAttendanceCell(cellEl, myUserId, date);
        // Aktualizuj counter v banneru
        _updateBatchMapBtn();

        callServer('saveMapReservation', data).then(function (res) {
            if (res && res.success && res.id && _mapReservations[myUserId + '_' + date]) {
                _mapReservations[myUserId + '_' + date].reservation_id = res.id;
            }
        }).catch(function (e) { console.warn('saveMapReservation:', e); });
    }

    function _deleteModalReservation(date) {
        var myUserId = _attModal.userId || plannerData.user.user_id;
        var map = plannerData.officeMap;

        delete _mapReservations[myUserId + '_' + date];
        _renderMapInModal(date, true);
        // Obnov buňku v kalendáři (přidá needs-desk-chip pokud potřeba)
        var cellEl = getCellElement(myUserId, date);
        if (cellEl) renderAttendanceCell(cellEl, myUserId, date);
        _updateBatchMapBtn();

        callServer('deleteMapReservation', map.map_id, myUserId, date)
            .catch(function (e) { console.warn('deleteMapReservation:', e); });
    }

    /**
     * Přeskočit výběr místa → zavřít modal.
     */
    function skipDeskSelection() {
        closeAttendanceModal();
    }

    // ─── BATCH MAP MODAL ──────────────────────────────────────────────────────

    /**
     * Aktualizuje tlačítko "Mapa" v banneru – zobrazí počet dnů bez rezervace.
     * Počítá dny kde vlastní uživatel má kancelářský status ALE nemá rezervaci stolu.
     */
    function _updateBatchMapBtn() {
        var mapBtn = document.getElementById('batch-map-btn');
        if (!mapBtn || mapBtn.style.display === 'none') return;
        if (!plannerData || !plannerData.officeMap || !_batchMode.active) return;

        var myUserId = plannerData.user.user_id;
        var daysInMonth = new Date(currYear, currMonth + 1, 0).getDate();
        var countMissing = 0;

        for (var d = 1; d <= daysInMonth; d++) {
            var dd = String(d).padStart(2, '0');
            var mm = String(currMonth + 1).padStart(2, '0');
            var dateStr = currYear + '-' + mm + '-' + dd;
            var dw = new Date(dateStr + 'T12:00:00').getDay();
            if (dw === 0 || dw === 6) continue;

            var hasOfficeStatus = ['ALL_DAY', 'AM', 'PM'].some(function (slot) {
                var e = _attendanceData[myUserId + '_' + dateStr + '_' + slot];
                return e && _statusNeedsDeskReservation(e.status_id);
            });
            if (!hasOfficeStatus) continue;

            // Má trvalé místo?
            var hasPermanent = (plannerData.officeMap.cells || []).some(function (c) {
                return c.type === 'desk' && c.permanent_user_id === myUserId;
            });
            if (hasPermanent) continue;

            if (!_mapReservations[myUserId + '_' + dateStr]) countMissing++;
        }

        if (countMissing > 0) {
            mapBtn.innerHTML = '&#128506; Mapa <span class="batch-map-btn-badge">' + countMissing + '</span>';
        } else {
            mapBtn.innerHTML = '&#128506; Mapa <span class="batch-map-btn-badge ok">✓</span>';
        }
    }

    /**
     * Nastaví šířku batch map dialogu podle počtu sloupců mapy.
     * Výška roste přirozeně (flex layout), footer je vždy viditelný.
     */
    function _sizeBatchMapDialog(map) {
        var dialog = document.querySelector('.batch-map-dialog');
        if (!dialog || !map) return;

        var cellSize = 40, gap = 4, padding = 36;
        var gridW = map.cols * cellSize + (map.cols - 1) * gap;
        var desiredW = Math.max(gridW + padding, 420); // min 420px pro chips strip

        var maxW = Math.min(window.innerWidth * 0.96, 900);
        dialog.style.width = Math.min(desiredW, maxW) + 'px';
        dialog.style.height = ''; // výška plyne z obsahu, omezena CSS max-height: 96vh
    }

    var _batchMapState = {
        dates: [],          // pracovní dny s kancelářským statusem v aktuálním měsíci
        currentIdx: 0,      // index aktuálně zobrazovaného dne
        pendingCellId: null, // vybraný stůl čekající na potvrzení
        pendingDate: null,   // datum pro "jen tento den"
    };

    /**
     * Otevře batch map modal.
     * Vybere všechny dny v měsíci, kde aktuální uživatel má kancelářský status
     * (nebo kde byl v batch módu přidělen kancelářský status), seřazené chronologicky.
     */
    function openBatchMapModal() {
        if (!plannerData || !plannerData.officeMap) return;

        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;
        var daysInMonth = new Date(currYear, currMonth + 1, 0).getDate();

        // Sbíráme dny s kancelářským statusem + přidáme všechny pracovní dny,
        // aby uživatel mohl navíc rezervovat libovolný den
        var dates = [];
        for (var d = 1; d <= daysInMonth; d++) {
            var dd = String(d).padStart(2, '0');
            var mm = String(currMonth + 1).padStart(2, '0');
            var dateStr = currYear + '-' + mm + '-' + dd;

            // Přeskočit víkendy
            var dw = new Date(dateStr + 'T12:00:00').getDay();
            if (dw === 0 || dw === 6) continue;

            // Zkontrolovat zda má uživatel kancelářský status v daný den
            var hasOfficeStatus = false;
            ['ALL_DAY', 'AM', 'PM'].forEach(function (slot) {
                var key = myUserId + '_' + dateStr + '_' + slot;
                var entry = _attendanceData[key];
                if (entry && _statusNeedsDeskReservation(entry.status_id)) {
                    hasOfficeStatus = true;
                }
            });

            if (hasOfficeStatus) {
                dates.push(dateStr);
            }
        }

        // Pokud žádné dny s kancelářským statusem, zobrazit alespoň aktuální měsíc (pracovní dny)
        if (dates.length === 0) {
            // Zobrazit všechny pracovní dny tohoto měsíce
            for (var d = 1; d <= daysInMonth; d++) {
                var dd = String(d).padStart(2, '0');
                var mm = String(currMonth + 1).padStart(2, '0');
                var dateStr = currYear + '-' + mm + '-' + dd;
                var dw = new Date(dateStr + 'T12:00:00').getDay();
                if (dw === 0 || dw === 6) continue;
                dates.push(dateStr);
            }
        }

        _batchMapState.dates = dates;

        // Začít od prvního dne bez rezervace, nebo od prvního dne
        var startIdx = 0;
        for (var i = 0; i < dates.length; i++) {
            var res = _mapReservations[myUserId + '_' + dates[i]];
            if (!res) {
                startIdx = i;
                break;
            }
        }
        _batchMapState.currentIdx = startIdx;

        var modal = document.getElementById('batch-map-modal');
        if (modal) {
            modal.style.display = 'flex';
            // Dynamická velikost dialogu podle mapy
            _sizeBatchMapDialog(map);
        }

        // Resetovat selection bar do idle stavu
        _batchMapState.pendingCellId = null;
        _batchMapState.pendingDate = null;
        var bar = document.getElementById('batch-map-selection-bar');
        if (bar) bar.classList.add('bms-idle');
        var deskEl = document.getElementById('batch-map-selection-desk');
        if (deskEl) deskEl.textContent = 'Klikněte na volný stůl pro výběr';
        var subEl = document.getElementById('batch-map-selection-sub');
        if (subEl) subEl.textContent = '';

        _renderBatchMapModal();
    }

    function closeBatchMapModal() {
        var modal = document.getElementById('batch-map-modal');
        if (modal) modal.style.display = 'none';
    }

    function batchMapPrevDay() {
        if (_batchMapState.currentIdx > 0) {
            batchMapCancelSelection();
            _batchMapState.currentIdx--;
            _renderBatchMapModal();
        }
    }

    function batchMapNextDay() {
        if (_batchMapState.currentIdx < _batchMapState.dates.length - 1) {
            batchMapCancelSelection();
            _batchMapState.currentIdx++;
            _renderBatchMapModal();
        }
    }

    function batchMapGoToDay(idx) {
        batchMapCancelSelection();
        _batchMapState.currentIdx = idx;
        _renderBatchMapModal();
    }

    function batchMapSkipDesk() {
        // Přejdi na další den bez rezervace nebo zavři
        var myUserId = plannerData.user.user_id;
        var dates = _batchMapState.dates;
        for (var i = _batchMapState.currentIdx + 1; i < dates.length; i++) {
            var res = _mapReservations[myUserId + '_' + dates[i]];
            if (!res) {
                _batchMapState.currentIdx = i;
                _renderBatchMapModal();
                return;
            }
        }
        closeBatchMapModal();
    }

    /**
     * Vykreslí celý obsah batch map modalu pro aktuální den.
     */
    function _renderBatchMapModal() {
        var dates = _batchMapState.dates;
        var idx = _batchMapState.currentIdx;
        var date = dates[idx];
        if (!date || !plannerData || !plannerData.officeMap) return;

        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;

        // Datum label
        var dateObj = new Date(date + 'T12:00:00');
        var dayNames = ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'];
        var monthNames = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
        var label = dayNames[dateObj.getDay()] + ' ' + dateObj.getDate() + '. ' + monthNames[dateObj.getMonth()];
        var labelEl = document.getElementById('batch-map-date-label');
        if (labelEl) labelEl.textContent = label;

        // Stav rezervace pro aktuální den
        var myRes = _mapReservations[myUserId + '_' + date];
        var statusEl = document.getElementById('batch-map-res-status');
        if (statusEl) {
            if (myRes) {
                statusEl.textContent = 'Stůl rezervován';
                statusEl.className = 'batch-map-res-status has-res';
            } else {
                statusEl.textContent = 'Bez rezervace';
                statusEl.className = 'batch-map-res-status no-res';
            }
        }

        // Navigační šipky
        var prevBtn = document.querySelector('.batch-map-nav-btn:first-child');
        var nextBtn = document.querySelector('.batch-map-nav-btn:last-of-type');
        if (prevBtn) prevBtn.disabled = (idx <= 0);
        if (nextBtn) nextBtn.disabled = (idx >= dates.length - 1);

        // Strip dnů
        _renderBatchMapDaysStrip();

        // Mapa
        _renderBatchMapGrid(date);
    }

    function _renderBatchMapDaysStrip() {
        var strip = document.getElementById('batch-map-days-strip');
        if (!strip) return;

        var myUserId = plannerData.user.user_id;
        var dates = _batchMapState.dates;
        var idx = _batchMapState.currentIdx;
        var dayNames = ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'];

        strip.innerHTML = '';
        dates.forEach(function (date, i) {
            var dateObj = new Date(date + 'T12:00:00');
            var res = _mapReservations[myUserId + '_' + date];

            var chip = document.createElement('div');
            chip.className = 'batch-map-day-chip' + (i === idx ? ' active' : '');
            chip.onclick = (function (ii) { return function () { batchMapGoToDay(ii); }; })(i);

            var dotClass = res ? 'has-res' : 'no-res';

            chip.innerHTML =
                '<span class="bmd-chip-day">' + dayNames[dateObj.getDay()] + '</span>' +
                '<span class="bmd-chip-num">' + dateObj.getDate() + '</span>' +
                '<span class="bmd-chip-dot ' + dotClass + '"></span>';

            strip.appendChild(chip);
        });

        // Scroll active chip into view
        var activeChip = strip.querySelector('.active');
        if (activeChip) activeChip.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    }

    function _renderBatchMapGrid(date) {
        var gridEl = document.getElementById('batch-map-grid');
        if (!gridEl || !plannerData || !plannerData.officeMap) return;

        var map = plannerData.officeMap;
        var rows = parseInt(map.rows) || 0;
        var cols = parseInt(map.cols) || 0;
        var myUserId = plannerData.user.user_id;
        var myRes = _mapReservations[myUserId + '_' + date];

        gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', 40px)';
        gridEl.style.gridTemplateRows = 'repeat(' + rows + ', 40px)';
        gridEl.innerHTML = '';

        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var cell = (map.cells || []).find(function (x) { return x.row === r && x.col === c; });
                if (!cell) cell = { id: 'r' + r + 'c' + c, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' };

                var div = document.createElement('div');
                div.className = 'batch-map-cell';

                if (cell.type === 'desk') {
                    var colorClass = _getBatchDeskColorClass(cell, date, myUserId, myRes);
                    div.className += ' bmc-desk ' + colorClass;
                    if (myRes && myRes.cell_id === cell.id) {
                        div.className += ' bmd-mine-selected';
                    }
                    // Zvýrazni pending (vybraný) stůl
                    if (_batchMapState.pendingCellId === cell.id) {
                        div.className += ' bmd-pending';
                    }

                    // Inicíály uživatele
                    var initials = '';
                    if (cell.permanent_user_id) {
                        var pu = (plannerData.employees || []).find(function (e) { return e.user_id === cell.permanent_user_id; });
                        if (pu) initials = (pu.first_name || '').charAt(0) + (pu.last_name || '').charAt(0);
                    } else if (colorClass === 'bmd-occupied' || colorClass === 'bmd-mine') {
                        var reservedEntry = Object.entries(_mapReservations).find(function (kv) {
                            return kv[1].cell_id === cell.id && kv[1].date === date;
                        });
                        if (reservedEntry) {
                            var resUId = reservedEntry[0].split('_')[0];
                            var resUser = (plannerData.employees || []).find(function (e) { return e.user_id === resUId; });
                            if (resUser) initials = (resUser.first_name || '').charAt(0) + (resUser.last_name || '').charAt(0);
                        }
                    }

                    div.innerHTML = '<span style="font-size:10px;font-weight:700;display:block;">' + (cell.label || '') + '</span>' +
                        (initials ? '<span style="font-size:8px;opacity:0.7;">' + initials + '</span>' : '');
                    div.title = cell.label || '';

                    if (colorClass !== 'bmd-occupied') {
                        div.onclick = (function (cellId) {
                            return function () { _handleBatchMapDeskClick(cellId, date); };
                        })(cell.id);
                    }
                } else if (cell.type === 'wall') {
                    div.className += ' bmc-wall';
                } else {
                    div.className += ' bmc-empty';
                }

                gridEl.appendChild(div);
            }
        }
    }

    /**
     * Vrátí CSS třídu barvy pro stůl v batch map modalu.
     */
    function _getBatchDeskColorClass(cell, date, myUserId, myRes) {
        // 1. Moje aktivní rezervace na tomto stolu
        if (myRes && myRes.cell_id === cell.id) return 'bmd-mine';

        // 2. Moje trvalé místo
        if (cell.permanent_user_id === myUserId) return 'bmd-mine';

        // 3. Někdo jiný má rezervaci na tomto stolu
        var otherReservation = Object.entries(_mapReservations).find(function (kv) {
            return kv[1].cell_id === cell.id && kv[1].date === date && kv[0].split('_')[0] !== myUserId;
        });
        if (otherReservation) return 'bmd-occupied';

        // 4. Stůl má trvalého uživatele → zkontroluj jeho status
        if (cell.permanent_user_id && cell.permanent_user_id !== myUserId) {
            var puId = cell.permanent_user_id;
            var puEntries = ['ALL_DAY', 'AM', 'PM'].map(function (slot) {
                return _attendanceData[puId + '_' + date + '_' + slot];
            }).filter(Boolean);
            if (puEntries.length === 0) return 'bmd-prereserved-match';
            var comesToOffice = puEntries.some(function (e) { return _statusNeedsDeskReservation(e.status_id); });
            return comesToOffice ? 'bmd-occupied' : 'bmd-prereserved-nomatch';
        }

        // 5. Volné
        return 'bmd-free';
    }

    /**
     * Zpracuje kliknutí na stůl v batch map modalu.
     * Pokud stůl je moje rezervace → zruší ji.
     * Pokud stůl je volný → zobrazí selection bar se dvěma možnostmi.
     * Pokud klikneme na stejný stůl co je pending → deselect.
     */
    function _handleBatchMapDeskClick(cellId, date) {
        if (!plannerData || !plannerData.officeMap) return;
        var myUserId = plannerData.user.user_id;
        var myRes = _mapReservations[myUserId + '_' + date];

        // Klik na stůl s mojí rezervací → zrušit
        if (myRes && myRes.cell_id === cellId) {
            batchMapCancelSelection();
            _batchMapDeleteReservation(date);
            return;
        }

        // Klik na pending stůl znovu → deselect
        if (_batchMapState.pendingCellId === cellId) {
            batchMapCancelSelection();
            return;
        }

        // Klik na volný stůl → zobraz selection bar
        _batchMapState.pendingCellId = cellId;
        _batchMapState.pendingDate = date;

        var mapCell = (plannerData.officeMap.cells || []).find(function (c) { return c.id === cellId; });
        var cellLabel = mapCell ? (mapCell.label || cellId) : cellId;
        var eligibleDates = _batchMapGetEligibleDates(cellId);
        var allCount = eligibleDates.length;
        // Aktuální den je vždy rezervovatelný (není v eligible → je moje, nebo je obsazený), zjistíme extra
        var canCurrent = !myRes; // aktuální den nemá moji rezervaci

        // Aktualizuj grid (highlight pending stůl)
        _renderBatchMapGrid(date);

        // Aktivuj selection bar (přepni z idle do active)
        var bar = document.getElementById('batch-map-selection-bar');
        var deskEl = document.getElementById('batch-map-selection-desk');
        var subEl = document.getElementById('batch-map-selection-sub');
        var oneBtn = document.getElementById('batch-map-sel-one-btn');
        var allBtn = document.getElementById('batch-map-sel-all-btn');

        if (deskEl) deskEl.textContent = 'Stůl ' + cellLabel;
        if (subEl) subEl.textContent = 'Dostupný pro rezervaci';
        if (oneBtn) oneBtn.textContent = 'Jen tento den';
        if (allBtn) {
            if (allCount > 0) {
                allBtn.textContent = 'Rezervovat pro: ' + allCount + (allCount === 1 ? ' den' : allCount < 5 ? ' dny' : ' dnů');
                allBtn.style.display = '';
            } else {
                allBtn.style.display = 'none';
            }
        }
        if (bar) bar.classList.remove('bms-idle');
    }

    /** Potvrdí rezervaci jen pro aktuální den */
    function batchMapConfirmOne() {
        var cellId = _batchMapState.pendingCellId;
        var date = _batchMapState.pendingDate;
        if (!cellId || !date) return;
        batchMapCancelSelection();
        _batchMapSaveOneReservation(cellId, date);
    }

    /** Potvrdí hromadnou rezervaci pro všechny eligible dny */
    function batchMapConfirmAll() {
        var cellId = _batchMapState.pendingCellId;
        if (!cellId) return;
        batchMapCancelSelection();
        _batchMapSaveMassReservation(cellId);

    /** Zruší výběr stolu (vrátí selection bar do idle stavu, odebere highlight) */
    function batchMapCancelSelection() {
        _batchMapState.pendingCellId = null;
        _batchMapState.pendingDate = null;
        var bar = document.getElementById('batch-map-selection-bar');
        if (bar) bar.classList.add('bms-idle');
        var deskEl = document.getElementById('batch-map-selection-desk');
        if (deskEl) deskEl.textContent = 'Klikněte na volný stůl pro výběr';

    /**
     * Vrátí seznam eligible datumů pro hromadnou rezervaci stolu cellId.
     */
    function _batchMapGetEligibleDates(cellId) {
        if (!plannerData || !plannerData.officeMap) return [];
        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;
        var mapCell = (map.cells || []).find(function (c) { return c.id === cellId; });
        var dates = _batchMapState.dates;

        return dates.filter(function (d) {
            var myRes = _mapReservations[myUserId + '_' + d];
            if (myRes && myRes.cell_id !== cellId) return false;
            if (myRes && myRes.cell_id === cellId) return false;

            var occupied = Object.entries(_mapReservations).some(function (kv) {
                return kv[1].cell_id === cellId && kv[1].date === d && kv[0].split('_')[0] !== myUserId;
            });
            if (occupied) return false;

            if (mapCell && mapCell.permanent_user_id && mapCell.permanent_user_id !== myUserId) {
                var puId = mapCell.permanent_user_id;
                var comesToOffice = ['ALL_DAY', 'AM', 'PM'].some(function (slot) {
                    var e = _attendanceData[puId + '_' + d + '_' + slot];
                    return e && _statusNeedsDeskReservation(e.status_id);
                });
                if (comesToOffice) return false;
            }
            return true;
        });
    }

    /**
     * Rezervuje stůl jen pro jeden den (bez hromadné logiky).
     */
    function _batchMapSaveOneReservation(cellId, date) {
        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;

        _mapReservations[myUserId + '_' + date] = {
            reservation_id: '', map_id: map.map_id, cell_id: cellId, date: date, user_id: myUserId
        };
        _renderBatchMapModal();
        _updateBatchMapBtn();

        var calCellEl = getCellElement(myUserId, date);
        if (calCellEl) renderAttendanceCell(calCellEl, myUserId, date);

        callServer('saveMapReservation', { map_id: map.map_id, cell_id: cellId, user_id: myUserId, date: date })
            .then(function (res) {
                if (res && res.success && res.id && _mapReservations[myUserId + '_' + date]) {
                    _mapReservations[myUserId + '_' + date].reservation_id = res.id;
                }
            }).catch(function (e) { console.warn('batchMapSaveOneReservation error:', e); });
    }

    /**
     * Hromadná rezervace stolu cellId na všechny eligible dny.
     */
    function _batchMapSaveMassReservation(cellId) {
        if (!plannerData || !plannerData.officeMap) return;
        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;

        var eligibleDates = _batchMapGetEligibleDates(cellId);

        if (eligibleDates.length === 0) {
            // Stůl je obsazen ve všech dostupných dnech
            return;
        }

        // Optimistický update pro všechny eligible dny
        eligibleDates.forEach(function (d) {
            _mapReservations[myUserId + '_' + d] = {
                reservation_id: '',
                map_id: map.map_id,
                cell_id: cellId,
                date: d,
                user_id: myUserId
            };
            // Odeber červený border v kalendáři
            var calCellEl = getCellElement(myUserId, d);
            if (calCellEl) renderAttendanceCell(calCellEl, myUserId, d);
        });

        _renderBatchMapModal();
        _updateBatchMapBtn();

        // Ulož na server paralelně
        var saves = eligibleDates.map(function (d) {
            return callServer('saveMapReservation', {
                map_id: map.map_id,
                cell_id: cellId,
                user_id: myUserId,
                date: d
            }).then(function (res) {
                if (res && res.success && res.id && _mapReservations[myUserId + '_' + d]) {
                    _mapReservations[myUserId + '_' + d].reservation_id = res.id;
                }
            }).catch(function (e) {
                console.warn('batchMapSaveReservation error for ' + d + ':', e);
            });
        });

        // Po dokončení všech uložení aktualizuj strip (tečky)
        Promise.all(saves).then(function () {
            _renderBatchMapDaysStrip();
        });
    }

    function _batchMapDeleteReservation(date) {
        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;
        var myRes = _mapReservations[myUserId + '_' + date];
        if (!myRes) return;

        delete _mapReservations[myUserId + '_' + date];
        _renderBatchMapModal();
        _updateBatchMapBtn();

        // Obnov červený rámeček v kalendáři
        var cellEl = getCellElement(myUserId, date);
        if (cellEl) renderAttendanceCell(cellEl, myUserId, date);

        callServer('deleteMapReservation', map.map_id, myUserId, date).catch(function (e) {
            console.warn('batchMapDeleteReservation error:', e);
        });
    }

    /**
     * Okamžitě přepočítá a aktualizuje zobrazení konta dovolené pro daného zaměstnance.
     * Volá se po každém uložení/smazání statusu v vacation view.
     */
    function _refreshVacationBalance(userId) {
        if (currentView !== 'vacation') return;
        const safeId = userId.replace(/[^a-zA-Z0-9]/g, '_');
        const badgesEl = document.getElementById('vac-badges-' + safeId);
        if (!badgesEl) return;

        const emp = plannerData && plannerData.employees
            ? plannerData.employees.find(e => e.user_id === userId)
            : null;
        if (!emp) return;

        const vacStatIds = (plannerData.statuses || [])
            .filter(s => s.is_vacation === 'true' || s.is_vacation === true || s.name.includes('Dovolená'))
            .map(s => s.status_id);
        const yearPrefix = String(currYear) + '-';
        const monthPrefix = yearPrefix + String(currMonth + 1).padStart(2, '0') + '-';
        const monthShorts = ["Led", "Úno", "Bře", "Dub", "Kvě", "Čvn", "Čvc", "Srp", "Zář", "Říj", "Lis", "Pro"];

        // Pro aktuální měsíc čti VÝHRADNĚ z _attendanceData (freshest po kliknutí/mazání)
        // Pro ostatní měsíce v roce čti z _globalAttendanceData
        let usedYear = 0;
        let usedMonth = 0;

        // 1) Spočítej ostatní měsíce z _globalAttendanceData
        Object.values(_globalAttendanceData).forEach(entry => {
            if (!entry || entry.user_id !== userId) return;
            if (!vacStatIds.includes(entry.status_id)) return;
            const dateStr = String(entry.date);
            if (dateStr.startsWith(monthPrefix)) return; // aktuální měsíc přeskočit
            const val = (entry.slot === 'ALL_DAY' || !entry.slot) ? 1 : 0.5;
            if (dateStr.startsWith(yearPrefix)) usedYear += val;
        });

        // 2) Spočítej aktuální měsíc z _attendanceData (vždy aktuální po mazání/přidání)
        Object.values(_attendanceData).forEach(entry => {
            if (!entry || entry.user_id !== userId) return;
            if (!vacStatIds.includes(entry.status_id)) return;
            const dateStr = String(entry.date);
            if (!dateStr.startsWith(monthPrefix)) return; // jen aktuální měsíc
            const val = (entry.slot === 'ALL_DAY' || !entry.slot) ? 1 : 0.5;
            usedMonth += val;
            usedYear += val;
        });

        usedYear = Math.round(usedYear * 2) / 2;
        usedMonth = Math.round(usedMonth * 2) / 2;
        const remaining = (emp.vacation_entitlement || 0) - usedYear;

        const monthNames = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
        badgesEl.innerHTML = `
            <div class="vac-line">
                <span class="emp-name clickable-name">${emp.first_name} ${emp.last_name}</span>
                <span class="vac-stat vac-stat-remaining"><span class="vac-stat-label">Zůstatek</span><span class="vac-stat-num">${remaining}</span></span>
            </div>
            <div class="vac-line">
                <span class="vac-stat vac-stat-month"><span class="vac-stat-label">${monthNames[currMonth]}</span><span class="vac-stat-num">${usedMonth}</span></span>
                <span class="vac-center-label">← Vybráno →</span>
                <span class="vac-stat vac-stat-year"><span class="vac-stat-label">Celkem</span><span class="vac-stat-num">${usedYear}</span></span>
            </div>`;
    }

    function _buildBulkEntries(dateList, statusId) {
        var slot = _attModal.slot || 'ALL_DAY';
        var sid = statusId || _attModal.selectedStatusId;
        return dateList.map(function (dateStr) {
            return { user_id: _attModal.userId, date: dateStr, slot: slot, status_id: sid };
        });
    }

    function _applyBulkOptimistic(entries) {
        if (!plannerData) return;
        const affectedUsers = new Set();
        entries.forEach(function (entry) {
            _attendanceData[entry.user_id + '_' + entry.date + '_' + entry.slot] = entry;
            queueAttendanceSave(entry);
            var cell = getCellElement(entry.user_id, entry.date);
            if (cell) {
                renderAttendanceCell(cell, entry.user_id, entry.date);
                var chip = cell.querySelector('[data-slot="' + entry.slot + '"]');
                if (chip) chip.classList.add('saving');
            }
            affectedUsers.add(entry.user_id);
        });
        affectedUsers.forEach(uid => _refreshVacationBalance(uid));
    }

    function applyAttendanceToWeek(statusId) {
        if (!_attModal.userId || !statusId) return;
        var d = new Date(_attModal.date + 'T12:00:00');
        var dow = d.getDay(); // 0-6
        if (dow === 0 || dow === 6) {
            closeAttendanceModal();
            return;
        }

        var dates = [];
        var temp = new Date(d);
        // Od vybraného dne do pátku (5)
        while (temp.getDay() !== 6 && temp.getDay() !== 0) {
            var ds = temp.getFullYear() + '-' + String(temp.getMonth() + 1).padStart(2, '0') + '-' + String(temp.getDate()).padStart(2, '0');
            dates.push(ds);
            temp.setDate(temp.getDate() + 1);
        }

        _applyBulkOptimistic(_buildBulkEntries(dates, statusId));
        closeAttendanceModal();
    }

    function applyAttendanceToMonth(statusId) {
        if (!_attModal.userId || !statusId) return;
        var startD = new Date(_attModal.date + 'T12:00:00');
        var month = startD.getMonth();

        var dates = [];
        var temp = new Date(startD);
        // Od vybraného dne do konce měsíce (pracovní dny)
        while (temp.getMonth() === month) {
            if (temp.getDay() !== 0 && temp.getDay() !== 6) {
                var ds = temp.getFullYear() + '-' + String(temp.getMonth() + 1).padStart(2, '0') + '-' + String(temp.getDate()).padStart(2, '0');
                dates.push(ds);
            }
            temp.setDate(temp.getDate() + 1);
        }
        _applyBulkOptimistic(_buildBulkEntries(dates, statusId));
        closeAttendanceModal();
    }

    function setBatchAction(action) {
        if (!_batchMode.active) return;
        _batchMode.action = action;

        const statusId = _batchMode.statusId;
        const status = plannerData.statuses.find(function (s) { return s.status_id === statusId; }) || {};
        const slotNames = { ALL_DAY: 'Celý den', AM: '½ dop', PM: '½ odp' };

        const iconEl = document.getElementById('batch-pill-icon');
        const nameEl = document.getElementById('batch-pill-name');
        const labelEl = document.getElementById('batch-pill-label');
        const msgEl = document.getElementById('batch-pill-msg');
        const mapBtn = document.getElementById('batch-map-btn');

        if (action === 'DELETE') {
            if (iconEl) {
                iconEl.innerHTML = '🗑️';
                iconEl.style.background = '#e11d48';
                iconEl.style.color = 'white';
            }
            if (labelEl) labelEl.innerText = 'AKTIVNÍ REŽIM';
            if (nameEl) nameEl.innerText = 'Hromadné mazání';
            if (msgEl) msgEl.innerText = 'Kliknutím do kalendáře smažete celý den';
            if (mapBtn) mapBtn.style.display = 'none';
        } else {
            if (iconEl) {
                iconEl.innerHTML = status.abbreviation || '';
                iconEl.style.background = status.color || '#94a3b8';
                iconEl.style.color = status.text_color || '#fff';
            }
            if (labelEl) labelEl.innerText = 'AKTIVNÍ STATUS (' + slotNames[_batchMode.slot] + ')';
            if (nameEl) nameEl.innerText = status.name || '';
            if (msgEl) msgEl.innerText = 'Klikáním do kalendáře vkládejte status';

            // Zobraz tlačítko Mapa jen pokud status vyžaduje rezervaci stolu a mapa existuje
            if (mapBtn) {
                var needsDesk = _statusNeedsDeskReservation(statusId);
                var hasMap = plannerData && plannerData.officeMap;
                mapBtn.style.display = (needsDesk && hasMap) ? 'flex' : 'none';
                if (needsDesk && hasMap) {
                    setTimeout(_updateBatchMapBtn, 0); // aktualizuj counter po nastavení display
                }
            }
        }
    }

    async function stopBatchMode() {
        _batchMode = { active: false, statusId: null, slot: 'ALL_DAY', action: 'ENTRY' };
        document.getElementById('batch-mode-banner').classList.remove('visible');
        document.body.classList.remove('batch-mode');
        closeBatchMapModal();

        // Sekvenční flush — nejprve zápisy, pak mazání (zabraňuje server lock kolizi)
        if (Object.keys(_attWriteQueue).length > 0) {
            await flushAttendanceQueue();
        }
        if (Object.keys(_attDeleteQueue).length > 0) {
            await flushAttendanceDeleteQueue();
        }
    }

    // ─── VACATION APPROVAL ───────────────────────────────────────────────────────

    /**
     * Zjistí, zda přihlášený uživatel má oprávnění schvalovat dovolené.
     */
    function _isVacationApprover() {
        if (!plannerData || !plannerData.user) return false;
        const scope = hasPermission('approve_vacation_scope');
        if (scope === 'NONE' || scope === false) return false;
        return true;
    }

    /**
     * Vrátí všechny pending dovolené pro daného uživatele z _attendanceData.
     */
    function _getPendingEntriesForUser(userId) {
        var result = [];
        Object.keys(_attendanceData).forEach(function (key) {
            var e = _attendanceData[key];
            if (e && e.user_id === userId && e.approved === 'pending') {
                result.push(e);
            }
        });
        return result;
    }

    /**
     * Formátuje datum YYYY-MM-DD jako "Pá 6. 3.".
     */
    function _formatApprovalDate(dateStr) {
        if (!dateStr) return '—';
        var d = new Date(dateStr + 'T12:00:00');
        if (isNaN(d.getTime())) return dateStr;
        var days = ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'];
        return days[d.getDay()] + ' ' + d.getDate() + '. ' + (d.getMonth() + 1) + '.';
    }

    /**
     * Otevře approval banner z notifikace.
     */
    function openVacationApprovalFromNotif(notifId) {
        if (_notifPanelOpen) toggleNotifPanel();
        var notif = (_notifData || []).find(function (n) { return n.notif_id === notifId; });
        if (!notif || !notif.vacation_request) return;
        var requesterId = notif.vacation_request.requester_id;
        var entries = _getPendingEntriesForUser(requesterId);
        if (entries.length === 0) {
            entries = (notif.vacation_request.entries || []).map(function (e) {
                return { user_id: requesterId, date: e.date, slot: e.slot || 'ALL_DAY', attendance_id: e.attendance_id, status_id: e.status_id, approved: 'pending' };
            });
        }
        var requesterName = notif.vacation_request.requester_name || '';
        openVacationApprovalBanner(entries, requesterId, requesterName);
    }

    /**
     * Otevře approval banner – schvalovatel pak kliká přímo na buňky v kalendáři.
     */
    function openVacationApprovalBanner(entries, requesterId, requesterName) {
        var rid = requesterId || (entries[0] && entries[0].user_id) || null;
        _approvalMode = { active: true, entries: entries.slice(), requesterId: rid, decisions: {}, mode: 'approve' };

        var nameEl = document.getElementById('vab-pill-name');
        if (nameEl) {
            if (requesterName) {
                nameEl.textContent = requesterName;
            } else if (rid && plannerData && plannerData.employees) {
                var emp = plannerData.employees.find(function (e) { return e.user_id === rid; });
                nameEl.textContent = emp ? (emp.first_name + ' ' + emp.last_name) : rid;
            } else {
                nameEl.textContent = '—';
            }
        }

        _setApprovalModeButtons('approve');
        _updateApprovalBannerMsg();
        var banner = document.getElementById('vacation-approval-banner');
        if (banner) banner.classList.add('visible');
    }

    /**
     * Přepne aktivní akci v banneru (approve / reject).
     */
    function setVacationApprovalMode(mode) {
        _approvalMode.mode = mode;
        _setApprovalModeButtons(mode);
    }

    function _setApprovalModeButtons(mode) {
        var btnApprove = document.getElementById('vab-mode-approve');
        var btnReject = document.getElementById('vab-mode-reject');
        if (btnApprove) btnApprove.classList.toggle('vab-mode-active', mode === 'approve');
        if (btnReject) btnReject.classList.toggle('vab-mode-active', mode === 'reject');
    }

    /**
     * Aktualizuje zprávu v banneru (počet rozhodnutých ze všech).
     */
    function _updateApprovalBannerMsg() {
        var total = _approvalMode.entries.length;
        var decided = Object.keys(_approvalMode.decisions).length;
        var msgEl = document.getElementById('vab-pill-msg');
        if (!msgEl) return;
        if (decided === 0) {
            msgEl.textContent = 'Klikejte na čekající statusy v kalendáři';
        } else {
            msgEl.textContent = decided + '\u00a0/\u00a0' + total + ' rozhodnuto';
        }
    }

    /**
     * Zpracuje kliknutí na buňku v approval módu – přidá staged rozhodnutí.
     * Vrátí true pokud bylo rozhodnutí aplikováno.
     */
    function _handleApprovalCellClick(userId, date, cellEl) {
        if (!_approvalMode.active) return false;
        if (userId !== _approvalMode.requesterId) return false;

        // Najdi pending entry pro tento userId + datum
        var slots = ['ALL_DAY', 'AM', 'PM'];
        var applied = false;
        for (var i = 0; i < slots.length; i++) {
            var key = userId + '_' + date + '_' + slots[i];
            var entry = _attendanceData[key];
            if (entry && entry.approved === 'pending' && entry.attendance_id) {
                var aid = entry.attendance_id;
                var approve = (_approvalMode.mode === 'approve');
                // Toggle: kliknutí znovu odebere rozhodnutí
                if (_approvalMode.decisions[aid] === approve) {
                    delete _approvalMode.decisions[aid];
                } else {
                    _approvalMode.decisions[aid] = approve;
                }
                applied = true;
            }
        }
        if (applied) {
            renderAttendanceCell(cellEl, userId, date);
            _updateApprovalBannerMsg();
        }
        return applied;
    }

    /**
     * Odešle všechna staged rozhodnutí na server a zavře banner.
     */
    async function finishVacationApproval() {
        if (!_approvalMode.active) return;
        var approvedIds = [];
        var rejectedIds = [];
        _approvalMode.entries.forEach(function (e) {
            var aid = e.attendance_id;
            if (!aid) return;
            var dec = _approvalMode.decisions[aid];
            if (dec === true) approvedIds.push(aid);
            if (dec === false) rejectedIds.push(aid);
        });
        if (approvedIds.length === 0 && rejectedIds.length === 0) {
            stopVacationApprovalMode();
            return;
        }
        var banner = document.getElementById('vacation-approval-banner');
        if (banner) banner.classList.add('processing');
        try {
            var res = await callServer('processVacationDecisions', approvedIds, rejectedIds);
            if (res && res.success) {
                // Optimistický update: schválené → approved='true', zamítnuté → smazat z dat
                _approvalMode.entries.forEach(function (e) {
                    var aid = e.attendance_id;
                    if (!aid) return;
                    var dec = _approvalMode.decisions[aid];
                    if (dec === undefined) return;

                    [_attendanceData, _globalAttendanceData].forEach(function (store) {
                        Object.keys(store).forEach(function (key) {
                            if (store[key] && store[key].attendance_id === aid) {
                                if (dec) {
                                    // Schváleno → aktualizuj stav
                                    store[key].approved = 'true';
                                } else {
                                    // Zamítnuto → smaž záznam (server ho také maže)
                                    delete store[key];
                                }
                            }
                        });
                    });
                });

                stopVacationApprovalMode();

                // Invalidace cache pro aktuální měsíc → fresh data při dalším loadAttendance
                var cacheKey = currYear + '_' + currMonth;
                delete _attendanceCache[cacheKey];

                loadNotifications();
            } else {
                if (banner) banner.classList.remove('processing');
                console.warn('finishVacationApproval failed:', res);
            }
        } catch (e) {
            if (banner) banner.classList.remove('processing');
            console.warn('finishVacationApproval error:', e);
        }
    }

    /**
     * Zavře approval banner bez odeslání.
     */
    function stopVacationApprovalMode() {
        _approvalMode = { active: false, entries: [], requesterId: null, decisions: {}, mode: 'approve' };
        var banner = document.getElementById('vacation-approval-banner');
        if (banner) { banner.classList.remove('visible'); banner.classList.remove('processing'); }
        // Překresli buňky aby zmizely staged indikátory
        renderAttendanceInGrid();
    }

    // ─── QUEUE PERSISTENCE (localStorage) ─────────────────────────────────────

    function _persistQueues() {
        try {
            localStorage.setItem('att_write_queue', JSON.stringify(_attWriteQueue));
            localStorage.setItem('att_delete_queue', JSON.stringify(_attDeleteQueue));
        } catch (e) { console.warn('_persistQueues: localStorage write failed:', e); }
    }

    function _restoreQueues() {
        try {
            var saved = localStorage.getItem('att_write_queue');
            if (saved) {
                var parsed = JSON.parse(saved);
                if (parsed && typeof parsed === 'object') Object.assign(_attWriteQueue, parsed);
            }
            var savedDel = localStorage.getItem('att_delete_queue');
            if (savedDel) {
                var parsedDel = JSON.parse(savedDel);
                if (parsedDel && typeof parsedDel === 'object') Object.assign(_attDeleteQueue, parsedDel);
            }
        } catch (e) { console.warn('_restoreQueues: localStorage read failed:', e); }
    }

    function _clearPersistedQueue(type) {
        try {
            if (type === 'save') localStorage.removeItem('att_write_queue');
            else if (type === 'delete') localStorage.removeItem('att_delete_queue');
        } catch (e) { /* noop */ }
    }

    function _getRetryDelay(retryCount) {
        // 2s → 4s → 8s → 16s → 30s cap
        return Math.min(2000 * Math.pow(2, retryCount), 30000);
    }

    function _hasPendingQueueItems() {
        return Object.keys(_attWriteQueue).length > 0 ||
            Object.keys(_attDeleteQueue).length > 0 ||
            _attInFlight.length > 0 ||
            _attDeleteInFlight.length > 0;
    }

    // ─── WRITE QUEUE ────────────────────────────────────────────────────────────

    function queueAttendanceSave(entry) {
        var slot = entry.slot || 'ALL_DAY';
        var dk = String(entry.date).substring(0, 10);
        var key = entry.user_id + '_' + dk + '_' + slot;
        var toQueue = { user_id: entry.user_id, date: dk, slot: slot, status_id: entry.status_id };
        if (entry.work_start_time) toQueue.work_start_time = entry.work_start_time;
        _attWriteQueue[key] = toQueue;
        _attendanceData[key] = _attWriteQueue[key];
        _persistQueues();

        // Zapisovat automaticky budeme, pouze pokud NENÍ aktivní batched mode.
        if (!_batchMode.active) {
            clearTimeout(_attSaveTimer);
            _attSaveTimer = setTimeout(flushAttendanceQueue, 400);
        }
    }

    async function flushAttendanceQueue() {
        // Mutex: zabraňuje concurrent flush
        if (_attFlushInProgress) return;
        // Pokud právě probíhá načítání, odložíme flush — zabraňuje ztrátě zápisů (race condition)
        if (_attLoadInProgress) {
            setTimeout(flushAttendanceQueue, 200);
            return;
        }
        var toSend = Object.values(_attWriteQueue);
        if (toSend.length === 0) return;

        _attFlushInProgress = true;
        _attInFlight = toSend.slice(); // snapshot pro in-flight tracking

        showSyncToast('SAVE', toSend.length);

        // Přesunout z fronty do in-flight (fronta může přijímat nové položky během await)
        var sentKeys = Object.keys(_attWriteQueue).slice();
        sentKeys.forEach(function (k) { delete _attWriteQueue[k]; });
        _persistQueues(); // localStorage stále drží in-flight data přes att_in_flight
        try { localStorage.setItem('att_in_flight', JSON.stringify(_attInFlight)); } catch (e) { /* noop */ }

        try {
            var result = await callServer('saveAttendanceEntries', toSend);
            // Odstranit 'saving' indikátor z buněk
            toSend.forEach(function (entry) {
                var cell = getCellElement(entry.user_id, entry.date);
                if (cell) {
                    var chip = cell.querySelector('[data-slot="' + (entry.slot || 'ALL_DAY') + '"]');
                    if (chip) chip.classList.remove('saving');
                }
            });
            if (!result || !result.success) {
                console.warn('saveAttendanceEntries failed:', result ? result.error : 'unknown');
                // Vrátit neúspěšné záznamy zpět do fronty
                toSend.forEach(function (entry) {
                    var k = entry.user_id + '_' + entry.date + '_' + (entry.slot || 'ALL_DAY');
                    if (!_attWriteQueue[k]) _attWriteQueue[k] = entry;
                    var cell = getCellElement(entry.user_id, entry.date);
                    if (cell) {
                        var chip = cell.querySelector('[data-slot="' + (entry.slot || 'ALL_DAY') + '"]');
                        if (chip) chip.classList.add('saving');
                    }
                });
                _persistQueues();
                showSyncToast('SAVE', toSend.length, true);
                if (_attSaveRetryCount < 10) {
                    var delay = _getRetryDelay(_attSaveRetryCount);
                    _attSaveRetryCount++;
                    _attSaveTimer = setTimeout(flushAttendanceQueue, delay);
                } else {
                    showSyncToast('SAVE', toSend.length, true); // persistent error
                    console.error('flushAttendanceQueue: max retries (10) reached, items remain in queue');
                }
            } else {
                _attSaveRetryCount = 0; // reset po úspěchu
                // Vyčistit in-flight z localStorage
                try { localStorage.removeItem('att_in_flight'); } catch (e) { /* noop */ }
                _clearPersistedQueue('save');

                // Zpracování pending schválení — označit lokální záznamy jako 'pending'
                if (result.pendingApproval && result.pendingEntries && result.pendingEntries.length > 0) {
                    result.pendingEntries.forEach(function (pe) {
                        var dk = String(pe.date).substring(0, 10);
                        var key = pe.user_id + '_' + dk + '_' + (pe.slot || 'ALL_DAY');
                        if (_attendanceData[key]) {
                            _attendanceData[key].approved = 'pending';
                            _attendanceData[key].attendance_id = pe.attendance_id || _attendanceData[key].attendance_id;
                        }
                        // Re-render buňky
                        var cell = getCellElement(pe.user_id, dk);
                        if (cell) renderAttendanceCell(cell, pe.user_id, dk);
                    });
                    // Refresh vacation balance
                    var affectedUsers = new Set(result.pendingEntries.map(function (pe) { return pe.user_id; }));
                    affectedUsers.forEach(function (uid) { _refreshVacationBalance(uid); });
                }

                // Invalidace cache pro všechny ovlivněné měsíce
                const distinctMonths = new Set(toSend.map(entry => {
                    const d = new Date(entry.date);
                    return d.getFullYear() + '_' + d.getMonth();
                }));
                distinctMonths.forEach(mKey => {
                    if (_attendanceCache[mKey]) {
                        delete _attendanceCache[mKey];
                        console.log(`[Save] Invalidated cache for month: ${mKey}`);
                    }
                });

                updateDailyStats();
                hideSyncToast('SAVE', toSend.length);

                // Pokud se během flush přidaly nové položky, spustit další flush
                if (Object.keys(_attWriteQueue).length > 0) {
                    _attSaveTimer = setTimeout(flushAttendanceQueue, 100);
                }
            }
        } catch (e) {
            console.warn('flushAttendanceQueue error:', e);
            // Vrátit neúspěšné záznamy zpět do fronty
            toSend.forEach(function (entry) {
                var k = entry.user_id + '_' + entry.date + '_' + (entry.slot || 'ALL_DAY');
                if (!_attWriteQueue[k]) _attWriteQueue[k] = entry;
                var cell = getCellElement(entry.user_id, entry.date);
                if (cell) {
                    var chip = cell.querySelector('[data-slot="' + (entry.slot || 'ALL_DAY') + '"]');
                    if (chip) chip.classList.add('saving');
                }
            });
            _persistQueues();
            showSyncToast('SAVE', toSend.length, true);
            if (_attSaveRetryCount < 10) {
                var delay = _getRetryDelay(_attSaveRetryCount);
                _attSaveRetryCount++;
                _attSaveTimer = setTimeout(flushAttendanceQueue, delay);
            } else {
                console.error('flushAttendanceQueue: max retries (10) reached, items remain in queue');
            }
        } finally {
            _attFlushInProgress = false;
            _attInFlight = [];
        }
    }

    function queueAttendanceDelete(userId, date, slot) {
        var key = userId + '_' + date + '_' + slot;
        _attDeleteQueue[key] = { user_id: userId, date: date, slot: slot };
        _persistQueues();

        if (!_batchMode.active) {
            clearTimeout(_attDeleteTimer);
            _attDeleteTimer = setTimeout(flushAttendanceDeleteQueue, 400);
        }
    }

    async function flushAttendanceDeleteQueue() {
        // Mutex: zabraňuje concurrent flush
        if (_attDeleteFlushInProgress) return;
        if (_attLoadInProgress) {
            setTimeout(flushAttendanceDeleteQueue, 200);
            return;
        }
        var toSend = Object.values(_attDeleteQueue);
        if (toSend.length === 0) return;

        _attDeleteFlushInProgress = true;
        _attDeleteInFlight = toSend.slice();

        showSyncToast('DELETE', toSend.length);

        var sentKeys = Object.keys(_attDeleteQueue).slice();
        sentKeys.forEach(function (k) { delete _attDeleteQueue[k]; });
        _persistQueues();
        try { localStorage.setItem('att_delete_in_flight', JSON.stringify(_attDeleteInFlight)); } catch (e) { /* noop */ }

        try {
            var result = await callServer('clearAttendanceEntries', toSend);
            if (!result || !result.success) {
                console.warn('clearAttendanceEntries failed:', result ? result.error : 'unknown');
                toSend.forEach(function (entry) {
                    var k = entry.user_id + '_' + entry.date + '_' + entry.slot;
                    if (!_attDeleteQueue[k]) _attDeleteQueue[k] = entry;
                });
                _persistQueues();
                showSyncToast('DELETE', toSend.length, true);
                if (_attDeleteRetryCount < 10) {
                    var delay = _getRetryDelay(_attDeleteRetryCount);
                    _attDeleteRetryCount++;
                    _attDeleteTimer = setTimeout(flushAttendanceDeleteQueue, delay);
                } else {
                    console.error('flushAttendanceDeleteQueue: max retries (10) reached, items remain in queue');
                }
            } else {
                _attDeleteRetryCount = 0;
                try { localStorage.removeItem('att_delete_in_flight'); } catch (e) { /* noop */ }
                _clearPersistedQueue('delete');

                // Invalidace cache pro všechny ovlivněné měsíce
                const distinctMonths = new Set(toSend.map(entry => {
                    const d = new Date(entry.date);
                    return d.getFullYear() + '_' + d.getMonth();
                }));
                distinctMonths.forEach(mKey => {
                    if (_attendanceCache[mKey]) {
                        delete _attendanceCache[mKey];
                        console.log(`[Delete] Invalidated cache for month: ${mKey}`);
                    }
                });

                updateDailyStats();
                hideSyncToast('DELETE', toSend.length);

                // Pokud se během flush přidaly nové položky, spustit další flush
                if (Object.keys(_attDeleteQueue).length > 0) {
                    _attDeleteTimer = setTimeout(flushAttendanceDeleteQueue, 100);
                }
            }
        } catch (e) {
            console.warn('flushAttendanceDeleteQueue error:', e);
            toSend.forEach(function (entry) {
                var k = entry.user_id + '_' + entry.date + '_' + entry.slot;
                if (!_attDeleteQueue[k]) _attDeleteQueue[k] = entry;
            });
            _persistQueues();
            showSyncToast('DELETE', toSend.length, true);
            if (_attDeleteRetryCount < 10) {
                var delay = _getRetryDelay(_attDeleteRetryCount);
                _attDeleteRetryCount++;
                _attDeleteTimer = setTimeout(flushAttendanceDeleteQueue, delay);
            } else {
                console.error('flushAttendanceDeleteQueue: max retries (10) reached, items remain in queue');
            }
        } finally {
            _attDeleteFlushInProgress = false;
            _attDeleteInFlight = [];
        }
    }

    // ─── QUEUE SAFETY: beforeunload + visibilitychange ────────────────────────

    window.addEventListener('beforeunload', function (e) {
        // Persist aktuální stav front pro případ hard-close
        _persistQueues();
        if (_hasPendingQueueItems()) {
            e.preventDefault();
            e.returnValue = 'Máte neuložené docházkové statusy. Opravdu chcete odejít?';
            return e.returnValue;
        }
    });

    document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') {
            // Tab se skrývá — okamžitě persistovat a pokusit se flush
            _persistQueues();
            if (Object.keys(_attWriteQueue).length > 0 && !_attFlushInProgress) {
                clearTimeout(_attSaveTimer);
                flushAttendanceQueue();
            }
            if (Object.keys(_attDeleteQueue).length > 0 && !_attDeleteFlushInProgress) {
                clearTimeout(_attDeleteTimer);
                flushAttendanceDeleteQueue();
            }
        }
    });

    // ─────────────────────────────────────────────────────────────────────────

    function initializeApp() {
        // Obnovit fronty z localStorage (mohly zůstat z předchozí session)
        _restoreQueues();
        // Obnovit i in-flight data (page crash během odesílání)
        try {
            var inFlight = localStorage.getItem('att_in_flight');
            if (inFlight) {
                var parsed = JSON.parse(inFlight);
                if (Array.isArray(parsed)) {
                    parsed.forEach(function (entry) {
                        var k = entry.user_id + '_' + entry.date + '_' + (entry.slot || 'ALL_DAY');
                        if (!_attWriteQueue[k]) _attWriteQueue[k] = entry;
                    });
                }
                localStorage.removeItem('att_in_flight');
            }
            var inFlightDel = localStorage.getItem('att_delete_in_flight');
            if (inFlightDel) {
                var parsedDel = JSON.parse(inFlightDel);
                if (Array.isArray(parsedDel)) {
                    parsedDel.forEach(function (entry) {
                        var k = entry.user_id + '_' + entry.date + '_' + (entry.slot || 'ALL_DAY');
                        if (!_attDeleteQueue[k]) _attDeleteQueue[k] = entry;
                    });
                }
                localStorage.removeItem('att_delete_in_flight');
            }
        } catch (e) { console.warn('initializeApp: in-flight restore failed:', e); }

        // Pokud jsou obnovené fronty neprázdné, naplánovat flush po načtení dat
        var hasRestoredItems = Object.keys(_attWriteQueue).length > 0 || Object.keys(_attDeleteQueue).length > 0;
        if (hasRestoredItems) {
            console.log('[Queue] Restored pending items from localStorage — will flush after data load');
        }

        initControls();
        initAdminEvents();
        loadData();
        startHeartbeat(); // Spustit automatickou synchronizaci na pozadí

        // Po načtení dat flush obnovené fronty (loadData je async, počkáme na _attLoadInProgress)
        if (hasRestoredItems) {
            var _restoreFlushCheck = setInterval(function () {
                if (!_attLoadInProgress && plannerData) {
                    clearInterval(_restoreFlushCheck);
                    if (Object.keys(_attWriteQueue).length > 0) flushAttendanceQueue();
                    if (Object.keys(_attDeleteQueue).length > 0) flushAttendanceDeleteQueue();
                }
            }, 500);
            // Safety: přestat čekat po 30s
            setTimeout(function () { clearInterval(_restoreFlushCheck); }, 30000);
        }
    }

    function startHeartbeat() {
        if (_heartbeatTimer) clearInterval(_heartbeatTimer);

    /**
