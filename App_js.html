    function _renderStandaloneMap(date) {
        var gridEl = document.getElementById('map-modal-grid');
        if (!gridEl || !plannerData || !plannerData.officeMap) return;

        var map = plannerData.officeMap;
        var myUserId = plannerData.user.user_id;
        var myReservation = _mapReservations[myUserId + '_' + date] || null;

        var cellSize = 32, gap = 2;
        var gridStyle = 'grid-template-columns: repeat(' + map.cols + ', ' + cellSize + 'px); grid-template-rows: repeat(' + map.rows + ', ' + cellSize + 'px);';
        var html = '';

        for (var r = 0; r < map.rows; r++) {
            for (var c = 0; c < map.cols; c++) {
                var cell = (map.cells || []).find(function (x) { return x.row === r && x.col === c; });
                if (!cell) cell = { id: 'r' + r + 'c' + c, row: r, col: c, type: 'empty', label: '', permanent_user_id: '' };

                if (cell.type !== 'desk') {
                    html += '<div class="att-map-cell type-' + cell.type + '"></div>';
                    continue;
                }

                var deskClass = _getDeskColorClass(cell, date, myUserId, myReservation);
                var isSelected = myReservation && myReservation.cell_id === cell.id;
                var isClickable = (deskClass === 'desk-free' || deskClass === 'desk-mine');
                var onclick = isClickable ? 'onclick="_handleStandaloneMapClick(\'' + cell.id + '\',\'' + date + '\')"' : '';

                // Iniciály
                var userInitials = '';
                if (cell.permanent_user_id) {
                    var u = (plannerData.employees || []).find(function (e) { return e.user_id === cell.permanent_user_id; });
                    if (u) userInitials = (u.first_name || '').charAt(0) + (u.last_name || '').charAt(0);
                } else if (deskClass === 'desk-occupied' || deskClass === 'desk-mine') {
                    var reservedBy = Object.entries(_mapReservations).find(function (kv) {
                        return kv[1].cell_id === cell.id && kv[1].date === date;
                    });
                    if (reservedBy) {
                        var reservedUserId = reservedBy[0].split('_')[0];
                        var ru = (plannerData.employees || []).find(function (e) { return e.user_id === reservedUserId; });
                        if (ru) userInitials = (ru.first_name || '').charAt(0) + (ru.last_name || '').charAt(0);
                    }
                }

                // Tooltip s plným jménem
                var tooltip = '';
                if (userInitials) {
                    var fullName = '';
                    if (cell.permanent_user_id) {
                        var uu = (plannerData.employees || []).find(function (e) { return e.user_id === cell.permanent_user_id; });
                        if (uu) fullName = uu.first_name + ' ' + uu.last_name;
                    } else if (deskClass === 'desk-occupied' || deskClass === 'desk-mine') {
                        var rb = Object.entries(_mapReservations).find(function (kv) {
                            return kv[1].cell_id === cell.id && kv[1].date === date;
                        });
                        if (rb) {
                            var rid = rb[0].split('_')[0];
                            var ruu = (plannerData.employees || []).find(function (e) { return e.user_id === rid; });
                            if (ruu) fullName = ruu.first_name + ' ' + ruu.last_name;
                        }
                    }
                    if (fullName) tooltip = ' title="' + fullName + '"';
                }

                html += '<div class="att-map-cell type-desk ' + deskClass + (isSelected ? ' desk-selected' : '') + '"' + tooltip + ' ' + onclick + '>' +
                    '<span class="att-map-cell-label">' + (cell.label || '?') + '</span>' +
                    (userInitials ? '<span class="att-map-cell-user">' + userInitials + '</span>' : '') +
                    '</div>';
            }
        }

        gridEl.style.cssText = 'display:inline-grid; gap:' + gap + 'px; ' + gridStyle;
        gridEl.innerHTML = html;
        _updateMapMissingAlert();
    }

    function _getUnreservedOfficeDays() {
        if (!plannerData || !plannerData.officeMap) return [];
        var myUserId = plannerData.user.user_id;
        var hasPermanent = (plannerData.officeMap.cells || []).some(function (c) {
            return c.type === 'desk' && c.permanent_user_id === myUserId;
        });
        if (hasPermanent) return [];

        var daysInMonth = new Date(currYear, currMonth + 1, 0).getDate();
        var missing = [];
        for (var d = 1; d <= daysInMonth; d++) {
            var dd = String(d).padStart(2, '0');
            var mm = String(currMonth + 1).padStart(2, '0');
            var dateStr = currYear + '-' + mm + '-' + dd;
            var dw = new Date(dateStr + 'T12:00:00').getDay();
            if (dw === 0 || dw === 6) continue;

            var hasOfficeStatus = ['ALL_DAY', 'AM', 'PM'].some(function (slot) {
                var e = _attendanceData[myUserId + '_' + dateStr + '_' + slot];
                return e && _statusNeedsDeskReservation(e.status_id);
            });
            if (!hasOfficeStatus) continue;
            if (_mapReservations[myUserId + '_' + dateStr]) continue;
            missing.push(dateStr);
        }
        return missing;
    }

    function _updateMapMissingAlert() {
        var alertEl = document.getElementById('map-modal-missing-alert');
        if (!alertEl) return;
        var missing = _getUnreservedOfficeDays();
        if (missing.length === 0) {
            alertEl.style.display = 'none';
            return;
        }
        alertEl.style.display = '';

        var dayChips = missing.map(function (dateStr) {
            var parts = dateStr.split('-');
            var label = parseInt(parts[2], 10) + '.' + parseInt(parts[1], 10) + '.';
            var isActive = dateStr === _mapModalDate ? ' map-day-chip-active' : '';
            return '<button class="map-day-chip' + isActive + '" onclick="onMapModalDateChange(\'' + dateStr + '\'); document.getElementById(\'map-modal-date\').value=\'' + dateStr + '\'; _mapModalDate=\'' + dateStr + '\';">' + label + '</button>';
        }).join('');

        alertEl.innerHTML =
            '<div class="map-missing-alert-top">' +
            '<span class="map-missing-alert-text">' +
            '<span class="map-missing-badge">' + missing.length + '</span>' +
            ' ' + (missing.length === 1 ? 'den bez rezervace místa' : (missing.length < 5 ? 'dny bez rezervace místa' : 'dnů bez rezervace místa')) +
            '</span>' +
            '<button class="map-bulk-reserve-btn" onclick="mapBulkReserve()">Zarezervovat vybrané místo na všechny</button>' +
            '</div>' +
            '<div class="map-day-chips">' + dayChips + '</div>';
    }

    function mapBulkReserve() {
        var missing = _getUnreservedOfficeDays();
        if (missing.length === 0) {
            showToast('Všechna místa jsou zarezervována', 'success');
            return;
        }

        var myUserId = plannerData.user.user_id;
        var map = plannerData.officeMap;
        // Najdi aktuálně vybraný stůl (z mapy — moje rezervace na aktuální den)
        var currentRes = _mapReservations[myUserId + '_' + _mapModalDate];
        if (!currentRes || !currentRes.cell_id) {
            showToast('Nejprve vyberte místo kliknutím na volný stůl', 'warning');
            return;
        }
        var cellId = currentRes.cell_id;

        // Zjisti pro které dny je stůl volný
        var reservable = [];
        missing.forEach(function (dateStr) {
            // Zkontroluj zda na tento stůl nikdo jiný nemá rezervaci
            var taken = Object.entries(_mapReservations).some(function (kv) {
                return kv[1].cell_id === cellId && kv[1].date === dateStr && kv[0].split('_')[0] !== myUserId;
            });
            // Zkontroluj permanent_user na tomto stolu
            var deskCell = (map.cells || []).find(function (c) { return c.id === cellId; });
            if (deskCell && deskCell.permanent_user_id && deskCell.permanent_user_id !== myUserId) {
                // Stůl má trvalého uživatele — zkontroluj zda ten den je pryč
                var puId = deskCell.permanent_user_id;
                var puEntries = ['ALL_DAY', 'AM', 'PM'].map(function (s) { return _attendanceData[puId + '_' + dateStr + '_' + s]; }).filter(Boolean);
                var comesToOffice = puEntries.some(function (e) { return _statusNeedsDeskReservation(e.status_id); });
                if (comesToOffice || puEntries.length === 0) taken = true;
            }
            if (!taken) reservable.push(dateStr);
        });

        if (reservable.length === 0) {
            showToast('Vybrané místo je v ostatních dnech obsazené', 'warning');
            return;
        }

        var skipped = missing.length - reservable.length;

        // Optimistický update + uložení na server
        reservable.forEach(function (dateStr) {
            _mapReservations[myUserId + '_' + dateStr] = { reservation_id: '', map_id: map.map_id, cell_id: cellId, date: dateStr };
            callServer('saveMapReservation', { map_id: map.map_id, cell_id: cellId, user_id: myUserId, date: dateStr })
                .then(function (res) {
                    if (res && res.success && res.id && _mapReservations[myUserId + '_' + dateStr]) {
                        _mapReservations[myUserId + '_' + dateStr].reservation_id = res.id;
                    }
                }).catch(function (e) { console.warn('bulkReserve:', e); });
        });

        // Překresli kalendářní buňky (odstraní červený okraj needs-desk-chip)
        reservable.forEach(function (dateStr) {
            var cellEl = getCellElement(myUserId, dateStr);
            if (cellEl) renderAttendanceCell(cellEl, myUserId, dateStr);
        });

        _renderStandaloneMap(_mapModalDate);
        var msg = 'Zarezervováno ' + reservable.length + ' ' + (reservable.length === 1 ? 'den' : (reservable.length < 5 ? 'dny' : 'dnů'));
        if (skipped > 0) msg += ' (' + skipped + ' přeskočeno — obsazeno)';
        showToast(msg, 'success');
    }

    function _handleStandaloneMapClick(cellId, date) {
        var myUserId = plannerData.user.user_id;
        var myReservation = _mapReservations[myUserId + '_' + date] || null;

        if (myReservation && myReservation.cell_id === cellId) {
            // Zrušit rezervaci
            delete _mapReservations[myUserId + '_' + date];
            _renderStandaloneMap(date);
            var cellEl = getCellElement(myUserId, date);
            if (cellEl) renderAttendanceCell(cellEl, myUserId, date);

            var map = plannerData.officeMap;
            callServer('deleteMapReservation', map.map_id, myUserId, date)
                .catch(function (e) { console.warn('deleteMapReservation:', e); });
        } else {
            // Nová rezervace
            var map = plannerData.officeMap;
            _mapReservations[myUserId + '_' + date] = { reservation_id: '', map_id: map.map_id, cell_id: cellId, date: date };
            _renderStandaloneMap(date);
            var cellEl = getCellElement(myUserId, date);
            if (cellEl) renderAttendanceCell(cellEl, myUserId, date);

            callServer('saveMapReservation', { map_id: map.map_id, cell_id: cellId, user_id: myUserId, date: date })
                .then(function (res) {
                    if (res && res.success && res.id && _mapReservations[myUserId + '_' + date]) {
                        _mapReservations[myUserId + '_' + date].reservation_id = res.id;
                    }
                })
                .catch(function (e) { console.warn('saveMapReservation:', e); });
        }
    }

    function _populateLogFilters() {
        // Uživatelé
        var userSelect = document.getElementById('log-filter-user');
        var users = {};
        _logData.forEach(function (e) { users[e.user_id] = e.user_name; });
        var opts = '<option value="">Všichni uživatelé</option>';
        Object.keys(users).sort(function (a, b) { return users[a].localeCompare(users[b], 'cs'); }).forEach(function (uid) {
            opts += '<option value="' + uid + '">' + users[uid] + '</option>';
        });
        userSelect.innerHTML = opts;

        // Statusy
        var statusSelect = document.getElementById('log-filter-status');
        var statuses = {};
        _logData.forEach(function (e) { statuses[e.status_id] = e.status_name; });
        var sOpts = '<option value="">Všechny statusy</option>';
        Object.keys(statuses).sort(function (a, b) { return statuses[a].localeCompare(statuses[b], 'cs'); }).forEach(function (sid) {
            sOpts += '<option value="' + sid + '">' + statuses[sid] + '</option>';
        });
        statusSelect.innerHTML = sOpts;
    }

    function resetActivityLogFilters() {
        document.getElementById('log-filter-user').value = '';
        document.getElementById('log-filter-status').value = '';

        document.getElementById('log-filter-to').value = '';
        _renderLogTable();
    }

    // Statusy se světlým pozadím — černý text místo bílého
    var _darkTextStatuses = ['Kancelář', 'Dovolená'];

    function _renderLogTable() {
        var tbody = document.getElementById('log-table-body');
        if (!tbody) return;

        var filterUser = document.getElementById('log-filter-user').value;
        var filterStatus = document.getElementById('log-filter-status').value;
        var filterFrom = document.getElementById('log-filter-from').value;
        var filterTo = document.getElementById('log-filter-to').value;

        var filtered = _logData.filter(function (e) {
            if (filterUser && e.user_id !== filterUser) return false;
            if (filterStatus && e.status_id !== filterStatus) return false;
            if (filterFrom && e.date < filterFrom) return false;
            if (filterTo && e.date > filterTo) return false;
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="log-empty-state">Žádné záznamy</td></tr>';
            return;
        }

        var slotLabels = { 'ALL_DAY': 'Celý den', 'AM': 'Dopoledne', 'PM': 'Odpoledne' };
        var html = '';
        filtered.forEach(function (e) {
            var ts = e.created_at ? _formatLogTimestamp(e.created_at) : '—';
            var dateFormatted = e.date ? e.date.split('-').reverse().join('.') : '—';
            var textColor = _darkTextStatuses.indexOf(e.status_name) !== -1 ? '#1e293b' : 'white';
            html += '<tr>' +
                '<td class="log-timestamp">' + ts + '</td>' +
                '<td>' + e.user_name + '</td>' +
                '<td>' + dateFormatted + '</td>' +
                '<td><span class="log-status-badge" style="background:' + (e.status_color || '#94a3b8') + '; color:' + textColor + '">' +
                (e.status_icon ? e.status_icon + ' ' : '') + e.status_name + '</span></td>' +
                '<td><span class="log-slot-badge">' + (slotLabels[e.slot] || e.slot) + '</span></td>' +
                '</tr>';
        });
        tbody.innerHTML = html;
    }

    function _formatLogTimestamp(isoStr) {
        try {
            var d = new Date(isoStr);
            if (isNaN(d.getTime())) return isoStr;
            var dd = String(d.getDate()).padStart(2, '0');
            var mm = String(d.getMonth() + 1).padStart(2, '0');
            var hh = String(d.getHours()).padStart(2, '0');
            var mi = String(d.getMinutes()).padStart(2, '0');
            var ss = String(d.getSeconds()).padStart(2, '0');
            return dd + '.' + mm + '.' + d.getFullYear() + ' ' + hh + ':' + mi + ':' + ss;
        } catch (e) { return isoStr; }
    }

                _userLogData = _userLogData.concat(res.entries || []);
            }

            _userLogOffset = offset + (res.entries || []).length;
            _userLogHasMore = res.hasMore || false;
            _renderUserActivityTable();

            var loadMoreDiv = document.getElementById('user-log-load-more');
            if (loadMoreDiv) loadMoreDiv.style.display = _userLogHasMore ? 'flex' : 'none';
            var countInfo = document.getElementById('user-log-count-info');
            if (countInfo) countInfo.textContent = 'Zobrazeno ' + _userLogData.length + ' z ' + (res.total || _userLogData.length);
        }).catch(function (e) {
            document.getElementById('user-log-table-body').innerHTML = '<tr><td colspan="4" class="log-empty-state">Chyba načítání</td></tr>';
            console.warn('getUserActivityLog error:', e);
        });
    }

    function loadMoreUserActivityEntries() {
        _loadUserActivityEntries(_userLogOffset);
    }

    function filterUserActivityLog() {
        _renderUserActivityTable();
    }

    function resetUserActivityLogFilters() {
        document.getElementById('user-log-filter-q').value = '';
        _renderUserActivityTable();
    }

    function _renderUserActivityTable() {
        var tbody = document.getElementById('user-log-table-body');
        if (!tbody) return;

        var q = document.getElementById('user-log-filter-q').value.toLowerCase().trim();

        var filtered = _userLogData.filter(function (e) {
            if (q) {
                var searchStr = (e.user_name + ' ' + e.email).toLowerCase();
                if (!searchStr.includes(q)) return false;
            }
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="log-empty-state">Žádné záznamy</td></tr>';
            return;
        }

        var html = '';
        filtered.forEach(function (e) {
            var ts = e.last_active ? _formatLogTimestamp(e.last_active) : '—';
            html += '<tr>' +
                '<td class="log-timestamp">' + ts + '</td>' +
                '<td>' + escapeHtml(e.user_name) + '</td>' +
                '<td>' + escapeHtml(e.email) + '</td>' +
                '<td><span class="log-slot-badge">' + escapeHtml(e.dept_name) + '</span></td>' +
                '</tr>';
        });
        tbody.innerHTML = html;
    }

    // Zavřít user log modal klikem na backdrop
    document.getElementById('user-activity-log-modal')?.addEventListener('click', function (e) {
        if (e.target === this) closeUserActivityLogModal();
    });

</script>
