     */
    function switchView(view) {
        const plannerWrapper = document.getElementById('planner-view');
        const monthlyWrapper = document.getElementById('monthly-planner-view');
        const adminView = document.getElementById('admin-view');
        const statsModule = document.getElementById('topbar-stats-module');
        const switcherBtns = document.querySelectorAll('.switcher-btn');

        // Reset všech ikon
        switcherBtns.forEach(btn => btn.classList.remove('active'));

        const promoModule = document.getElementById('topbar-promo-module');
        if (view === 'admin') {
            if (plannerWrapper) plannerWrapper.style.display = 'none';
            if (monthlyWrapper) monthlyWrapper.style.display = 'none';
            if (statsModule) statsModule.style.display = 'none';
            if (promoModule) promoModule.style.display = 'none';
            adminView.classList.add('active');
            currentView = 'admin';
            document.getElementById('admin-icon-btn').classList.add('active');
            if (typeof admin !== 'undefined' && typeof admin.init === 'function') admin.init();
        } else {
            adminView.classList.remove('active');
            currentView = view;

            // Zobrazit statistiku jen v režimech Dashboard a Dovolené
            if (statsModule) {
                statsModule.style.display = (view === 'dashboard' || view === 'vacation') ? 'flex' : 'none';
            }
            // Promo modul — stejná pravidla jako stats (dashboard, vacation, attendance)
            if (promoModule) {
                promoModule.style.display = (view === 'dashboard' || view === 'vacation' || view === 'attendance') ? 'flex' : 'none';
            }

            // Aktivovat správnou ikonu
            if (view === 'dashboard') document.getElementById('btn-nav-dashboard').classList.add('active');
            else if (view === 'vacation') document.getElementById('btn-nav-vacation').classList.add('active');
            else if (view === 'planner') document.getElementById('btn-nav-planner').classList.add('active');

            // Překreslit celý planner (pro aplikaci filtrů a přepnutí popisků zaměstnanců)
            renderPlanner();

        navItems.forEach(item => {

    /**
     * Načtení reálných dat ze serveru (Uživatelé, Oddělení, Role)
     */
    async function loadData() {
        try {
            setSplashMsg("Načítám konfiguraci a data...");
            const response = await callServer('getPlannerData');

            if (response && response.success) {
                plannerData = response;

                setSplashMsg("Ověřuji přístupová práva...");
                updateUserProfile(response.user);
                
                // Inicializace marketingového modulu v topbaru
                _renderMarketingWeeks();

                // Admin icon visibility based on RBAC 'access_admin'
                const adminIcon = document.getElementById('admin-icon-btn');
                if (adminIcon) {
                    if (hasPermission('access_admin')) {
                        adminIcon.style.display = 'flex';
                    } else {
                        adminIcon.style.display = 'none';
                    }
                }

                // Footer map button — skrýt pokud úsek nemá povolené rezervace stolů
                const footerMapBtn = document.getElementById('footer-map-btn');
                if (footerMapBtn) {
                    footerMapBtn.style.display = plannerData.officeMap ? '' : 'none';
                }

                setSplashMsg("Vykresluji kalendář...");
                renderPlanner();

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        setSplashMsg("Hotovo...");
                        hideSplash();
                        loadNotifications();
                    });
                });
            } else {
                const code = response ? response.errorCode : null;
                if (code === "USER_NOT_FOUND") {
                    hideSplash();
                    showAuthScreen('register', response);
                } else if (code === "USER_PENDING") {
                    hideSplash();
                    showAuthScreen('pending', response);
                } else if (code === "USER_REJECTED") {
                    hideSplash();
                    showAuthScreen('rejected', response);
                } else {
                    const err = response ? response.error : "Odpověď ze serveru je null.";
                    console.error("Chyba při načítání dat:", err);
                    setSplashMsg("Chyba: " + err);
                }
            }
        } catch (e) {
            console.error("Chyba loadData (catch):", e);
            setSplashMsg("Kritická chyba systému.");
        }
    }

    /**
     * Aktualizuje modul profilu reálnými daty
     */
    function updateUserProfile(user) {
        const nameEl = document.querySelector('.u-name');
        const accEl = document.querySelector('.u-account');
        const posEl = document.querySelector('.u-pos');

        if (nameEl) nameEl.textContent = `${user.first_name || ''} ${user.last_name || ''}`;
        if (accEl) accEl.textContent = user.email;

        let posName = roleFallback[user.system_role] || 'Zaměstnanec';
        if (user.position_id && plannerData && plannerData.positions) {

    function renderPlanner() {
        if (!plannerData) return;

        const plannerWrapper = document.getElementById('planner-view');
        const monthlyWrapper = document.getElementById('monthly-planner-view');

        if (currentView === 'planner') {
            if (plannerWrapper) plannerWrapper.style.display = 'none';
            if (monthlyWrapper) monthlyWrapper.style.display = 'block';
            renderMonthlyPlanner();
            return;
        } else {
            if (plannerWrapper) plannerWrapper.style.display = 'block';
            if (monthlyWrapper) monthlyWrapper.style.display = 'none';
        }

        const monthNames = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
        const periodEl = document.getElementById('display-period');
        if (periodEl) periodEl.textContent = `${monthNames[currMonth]} ${currYear}`;

        const mpInput = document.getElementById('month-picker-input');
        if (mpInput) {
            mpInput.value = currYear + '-' + String(currMonth + 1).padStart(2, '0');
        }
        const pMpInput = document.getElementById('monthly-month-picker-input');
        if (pMpInput) {
            pMpInput.value = currYear + '-' + String(currMonth + 1).padStart(2, '0');
        }

        const lastDay = new Date(currYear, currMonth + 1, 0);
        const dayCount = lastDay.getDate();
        const today = new Date();

        renderHeaders(currYear, currMonth, dayCount, today);
        renderSectionNameRow();
        renderEmployees(currYear, currMonth, dayCount, today);
        renderAttendanceInGrid(); // Okamžité vykreslení z cache (proti probliknutí)
        loadAttendance(); // Refresh dat ze serveru na pozadí
    }



    /**
     * Zobrazí název úseku přihlášeného uživatele inline v KT label buňce.
     */
    function renderSectionNameRow() {
        const inlineEl = document.getElementById('section-name-inline');
        if (!inlineEl || !plannerData) return;

        const activeSid = getActiveSectionId();
        if (!activeSid || !plannerData.sections) {
            inlineEl.style.display = 'none';
            return;
        }
        const section = plannerData.sections.find(function (s) { return s.section_id === activeSid; });
        if (section && section.name) {
            const isSuperAdmin = plannerData.user && plannerData.user.system_role === 'SUPERADMIN';
            const isViewingOther = _viewSectionId && _viewSectionId !== plannerData.user.section_id;
            const homeIcon = isViewingOther ? '' : '🏢 ';
            const switchIcon = isViewingOther ? '🔀 ' : '';
            inlineEl.innerHTML = switchIcon + homeIcon + section.name +
                (isSuperAdmin ? ' <span style="font-size:9px; opacity:0.6; margin-left:4px;">▼</span>' : '');
            inlineEl.style.display = '';
            inlineEl.style.cursor = isSuperAdmin ? 'pointer' : 'default';
            inlineEl.onclick = isSuperAdmin ? openSectionSwitcher : null;
        } else {
            inlineEl.style.display = 'none';
        }
    }

    function openSectionSwitcher() {
        if (!plannerData || !plannerData.sections) return;
        var sections = plannerData.sections.filter(function (s) { return s.active !== 'false'; });
        if (sections.length <= 1) return;

        var mySection = plannerData.user.section_id;
        var activeSid = getActiveSectionId();

        var html = '<div class="section-switcher-backdrop" onclick="closeSectionSwitcher()">' +
            '<div class="section-switcher-card" onclick="event.stopPropagation()">' +
            '<div class="section-switcher-header">' +
            '<span style="font-size:16px; font-weight:900; color:#1e293b;">Přepnout úsek</span>' +
            '<button class="section-switcher-close" onclick="closeSectionSwitcher()">&times;</button>' +
            '</div>' +
            '<div class="section-switcher-list">';

        sections.sort(function (a, b) { return (a.name || '').localeCompare(b.name || '', 'cs'); });
        sections.forEach(function (s) {
            var isActive = s.section_id === activeSid;
            var isHome = s.section_id === mySection;
            html += '<div class="section-switcher-item' + (isActive ? ' active' : '') + '"' +
                ' onclick="switchToSection(\'' + s.section_id + '\')">' +
                '<span class="section-switcher-name">' +
                (isHome ? '<span title="Můj výchozí úsek">🏠</span> ' : '') +
                s.name + '</span>' +
                (isActive ? '<span class="section-switcher-check">✓</span>' : '') +
                '</div>';
        });

        html += '</div></div></div>';

        var container = document.createElement('div');
        container.id = 'section-switcher-container';
        container.innerHTML = html;
        document.body.appendChild(container);
    }

    function closeSectionSwitcher() {
        var el = document.getElementById('section-switcher-container');
        if (el) el.remove();
    }

    function switchToSection(sectionId) {
        closeSectionSwitcher();
        var mySection = plannerData.user.section_id;
        _viewSectionId = (sectionId === mySection) ? null : sectionId;

        // Překreslit kalendář a statistiku bez server callu
        renderSectionNameRow();
        renderPlanner();
        updateDailyStats();
    }

    function renderHeaders(year, month, count, today) {
        const dayNames = ['NE', 'PO', 'ÚT', 'ST', 'ČT', 'PÁ', 'SO'];

        // 1. KT BOXTY
        let ktHtml = '';
        for (let d = 1; d <= 31; d++) {
            if (d > count) {
                ktHtml += '<div class="cell sticky-header row-kt no-grid"></div>';
                continue;
            }
            const date = new Date(year, month, d);
            if (date.getDay() === 1 || d === 1) {
                let span = 0;
                for (let n = d; n <= count; n++) {
                    if (n > d && new Date(year, month, n).getDay() === 1) break;
                    span++;
                }
                const weekNum = getISOWeek(date);
                const weekStart = new Date(year, month, d, 0, 0, 0);
                const weekEnd = new Date(year, month, d + span - 1, 23, 59, 59);
                const isCurrentWeek = (today >= weekStart && today <= weekEnd);

                ktHtml += `
                <div class="cell sticky-header row-kt" style="grid-column-end: span ${span}">
                    <div class="kt-card ${isCurrentWeek ? 'current' : ''}">KT ${weekNum}</div>
                </div>`;
                d += (span - 1);
            }
        }
        const ktContainer = document.getElementById('kt-row-cells');
        if (ktContainer) ktContainer.innerHTML = ktHtml;

        // 2. DNY
        let daysHtml = '';
        for (let d = 1; d <= count; d++) {
            const date = new Date(year, month, d);
            const dw = date.getDay();
            const isSat = (dw === 6);
            const isSun = (dw === 0);
            const isWeekend = isSat || isSun;
            const iso = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
            const holidayName = plannerData.holidays ? plannerData.holidays[iso.substring(5)] : null;
            const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());

            let cls = 'cell sticky-header row-days day-info clickable';
            if (isSat) cls += ' weekend sat';
            if (isSun) cls += ' weekend sun';
            if (holidayName) cls += ' holiday';
            if (isToday) cls += ' today';

            daysHtml += `
            <div class="${cls}" data-date="${iso}"
                 title="${holidayName || ''}"
                 onclick="statsCurrentDate = new Date('${iso}T12:00:00'); updateDailyStats();">
                <span class="d-num">${d}</span>
                <span class="d-name">${dayNames[dw]}</span>
            </div>`;
        }
        // Fill remainders if month has <31 days
        for (let d = count + 1; d <= 31; d++) {
            daysHtml += '<div class="cell sticky-header row-days no-grid"></div>';
        }

        const dayContainer = document.getElementById('day-row-cells');
        if (dayContainer) dayContainer.innerHTML = daysHtml;
    }

    function renderEmployees(year, month, count, today) {
        let html = '';
        const myUser = (plannerData && plannerData.user) || {};
        const viewScope = hasPermission('view_attendance_scope');

        let { departments, employees, positions, groups, sectionViewConfig } = plannerData;

        // --- FILTRACE ZAMĚSTNANCŮ A ODDĚLENÍ PODLE ÚSEKU ---
        // Zobrazí zaměstnance z aktivního úseku (SUPERADMIN může přepínat)
        const activeSectionId = getActiveSectionId();
        employees = (employees || []).filter(e => e.section_id === activeSectionId);
        departments = (departments || []).filter(d => d.section_id === activeSectionId);

        const posMap = {}; (positions || []).forEach(p => posMap[p.position_id] = p.name);
        const groupMap = {}; (groups || []).forEach(g => groupMap[g.group_id] = g.name);

        const monthStart = new Date(year, month, 1);
        const monthEnd = new Date(year, month + 1, 0);

        // ── Helper: render a single employee row (label + 31 day cells) ──────────
        function empRow(emp) {
            if (!emp) return '';
            const posName = posMap[emp.position_id] || '-';
            const groupName = groupMap[emp.group_id] || '';
            const exitDateStr = emp.date_end;
            const exitDate = exitDateStr ? new Date(exitDateStr) : null;
            const isEndingThisMonth = exitDate && exitDate >= monthStart && exitDate <= monthEnd;
            const isOwnRow = plannerData.user && emp.user_id === plannerData.user.user_id;

            const ownCls = isOwnRow ? ' own-row' : '';
            const isHighlighted = (_highlightedUserId === emp.user_id);
            const highCls = isHighlighted ? ' row-highlighted' : '';

            // Indikátor jmenin (dortík) u jména pro dnešní den
            const todayISO = today.toISOString().split('T')[0];
            const hasNamesdayToday = _hasEmployeeNamedDay(emp.user_id, todayISO);
            const cakeIcon = hasNamesdayToday ? '<span style="margin-right:4px;" title="Má dnes jmeniny!">🎂</span>' : '';

            let r = '';
            if (currentView === 'vacation') {
                const vacStatIds = (plannerData.statuses || [])
                    .filter(s => s.is_vacation === 'true' || s.is_vacation === true || s.name.includes('Dovolená'))
                    .map(s => s.status_id);
                const yearPrefix = String(year) + '-';
                const monthPrefix = yearPrefix + String(month + 1).padStart(2, '0') + '-';
                const monthNames = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];

                let usedYear = 0;
                let usedMonth = 0;
                Object.values(_globalAttendanceData).forEach(entry => {
                    if (entry.user_id !== emp.user_id) return;
                    if (!vacStatIds.includes(entry.status_id)) return;

                    const dateStr = String(entry.date);
                    const val = (entry.slot === 'ALL_DAY' || !entry.slot) ? 1 : 0.5;

                    if (dateStr.startsWith(yearPrefix)) usedYear += val;
                    if (dateStr.startsWith(monthPrefix)) usedMonth += val;
                });
                usedYear = Math.round(usedYear * 2) / 2;
                usedMonth = Math.round(usedMonth * 2) / 2;
                const remaining = (emp.vacation_entitlement || 0) - usedYear;

                r = `<div class="cell sticky-label row-emp${ownCls}${highCls}" data-user-id="${emp.user_id}" onclick="toggleRowHighlight('${emp.user_id}')">
                    <div class="emp-label-container emp-vac-layout">
                        <div class="vac-row" id="vac-badges-${emp.user_id.replace(/[^a-zA-Z0-9]/g, '_')}">
                            <div class="vac-line">
                                <span class="emp-name clickable-name">${emp.first_name} ${emp.last_name}</span>
                                <span class="vac-stat vac-stat-remaining"><span class="vac-stat-label">Zůstatek</span><span class="vac-stat-num">${remaining}</span></span>
                            </div>
                            <div class="vac-line">
                                <span class="vac-stat vac-stat-month"><span class="vac-stat-label">${monthNames[month]}</span><span class="vac-stat-num">${usedMonth}</span></span>
                                <span class="vac-center-label">← Vybráno →</span>
                                <span class="vac-stat vac-stat-year"><span class="vac-stat-label">Celkem</span><span class="vac-stat-num">${usedYear}</span></span>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else {
                const exitBadge = exitDate
                    ? `<span class="emp-exit-badge" title="Ukončeno: ${exitDateStr}">${exitDate.toLocaleDateString('cs-CZ')}</span>`
                    : '';

                // Výročí nástupu — zelený badge 30 dnů před výročím
                let anniversaryBadge = '';
                if (emp.date_start) {
                    const startDate = new Date(emp.date_start);
                    if (!isNaN(startDate.getTime())) {
                        const milestones = (plannerData.anniversaryMilestones || []);
                        const nowMs = today.getTime();
                        for (let mi = 0; mi < milestones.length; mi++) {
                            const annivDate = new Date(startDate.getFullYear() + milestones[mi], startDate.getMonth(), startDate.getDate());
                            const diffDays = (annivDate.getTime() - nowMs) / (1000 * 60 * 60 * 24);
                            if (diffDays >= 0 && diffDays <= 30) {
                                anniversaryBadge = `<span class="emp-anniversary-badge" title="Výročí ${milestones[mi]} let: ${annivDate.toLocaleDateString('cs-CZ')}">${milestones[mi]} let 🎉</span>`;
                                break;
                            }
                        }
                    }
                }

                r = `<div class="cell sticky-label row-emp${ownCls}${highCls}" data-user-id="${emp.user_id}" onclick="toggleRowHighlight('${emp.user_id}')">
                    <div class="emp-label-container">
                        <div class="emp-label-row">
                            <span class="emp-name clickable-name">${emp.first_name} ${emp.last_name}</span>
                            ${groupName ? `<span class="emp-team">${groupName}</span>` : ''}
                        </div>
                        <div class="emp-label-row"><span class="emp-pos">${cakeIcon}${posName}</span>${anniversaryBadge}${exitBadge}</div>
                    </div>
                </div>`;
            }
            for (let d = 1; d <= 31; d++) {
                if (d > count) { r += `<div class="cell row-emp no-grid${highCls}"></div>`; continue; }
                const dw = new Date(year, month, d).getDay();
                const isWeekend = (dw === 0 || dw === 6);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                const canEdit = canEditUserAttendance(emp.user_id);
                r += `<div class="cell row-emp ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}${ownCls}${highCls}${canEdit ? ' clickable' : ''}" data-user-id="${emp.user_id}" data-date="${dateStr}" onclick="handleAttendanceCellClick(event, this)"></div>`;
            }
            return r;
        }

        // ── Helper: filter active employees for the month ─────────────────────────
        function activeForMonth(list) {
            return list.filter(emp => {
                if (emp.date_end) {
                    const exitDate = new Date(emp.date_end);
                    if (!isNaN(exitDate.getTime()) && exitDate < monthStart) return false;
                }
                return true;
            });
        }

        // ── Config-based rendering (if sectionViewConfig has containers) ──────────
        // Při přepnutém úseku (SUPERADMIN) nepoužívat config z jiného úseku
        const isViewingOwnSection = !_viewSectionId || _viewSectionId === (plannerData.user && plannerData.user.section_id);
        const cfg = isViewingOwnSection ? sectionViewConfig : null;
        const useConfig = cfg && cfg.containers && cfg.containers.length > 0;

        if (useConfig) {
            const rendered = new Set(); // track user_ids already rendered

            // Optional: vedoucí úseku jako první (identifikace přes org_role z pozice)
            if (cfg.show_leader_first) {
                const userSectionId = plannerData.user && plannerData.user.section_id;
                const leader = (employees || []).find(e =>
                    (e.org_role === 'SECTION_LEADER' || e.org_role === 'SECTION_DEPUTY') &&
                    (!userSectionId || e.section_id === userSectionId)
                );
                if (leader && !rendered.has(leader.user_id)) {
                    html += empRow(leader);
                    rendered.add(leader.user_id);
                }
            }

            cfg.containers.forEach(container => {
                let groupEmployees = [];
                let groupLabel = container.label;

                if (container.type === 'department') {
                    groupEmployees = (employees || []).filter(e => e.department_id === container.ref_id);
                } else if (container.type === 'team') {
                    groupEmployees = (employees || []).filter(e => e.group_id === container.ref_id);
                } else if (container.type === 'position') {
                    groupEmployees = (employees || []).filter(e => e.position_id === container.ref_id);
                } else if (container.type === 'employee') {
                    const single = (employees || []).find(e => e.user_id === container.ref_id);
                    if (single && !rendered.has(single.user_id)) {
                        html += empRow(single);
                        rendered.add(single.user_id);
                    }
                    return; // employee type: no header, no list iteration
                }

                // Filter for active and not yet rendered
                groupEmployees = activeForMonth(groupEmployees).filter(e => !rendered.has(e.user_id));
                if (groupEmployees.length === 0) return; // skip empty containers

                // Determine order: use items list if defined, else natural order
                if (container.items && container.items.length > 0) {
                    const itemRefIds = container.items.map(i => i.ref_id);
                    const ordered = [];
                    itemRefIds.forEach(refId => {
                        const emp = groupEmployees.find(e => e.user_id === refId);
                        if (emp) ordered.push(emp);
                    });
                    // Append any not in items list at the end
                    groupEmployees.forEach(e => { if (!itemRefIds.includes(e.user_id)) ordered.push(e); });
                    groupEmployees = ordered;
                }

                // Vedoucí oddělení vždy první v rámci oddělení/týmu (identifikace přes org_role)
                if (container.type === 'department' || container.type === 'team') {
                    const leaderIdx = groupEmployees.findIndex(e =>
                        e.org_role === 'DEPT_LEADER' || e.org_role === 'DEPT_DEPUTY'
                    );
                    if (leaderIdx > 0) {
                        const deptLeader = groupEmployees.splice(leaderIdx, 1)[0];
                        groupEmployees.unshift(deptLeader);
                    }
                }

                html += `<div class="dept-header"><div class="dept-label-sticky">${groupLabel}</div></div>`;
                groupEmployees.forEach(emp => {
                    html += empRow(emp);
                    rendered.add(emp.user_id);
                });
            });

        } else {
            // ── Default: render by departments ────────────────────────────────────
            const renderedDefault = new Set();

            // Zaměstnanci bez oddělení (nebo s oddělením které neexistuje v seznamu)
            const deptIds = new Set((departments || []).map(d => d.department_id));
            let noDeptEmployees = activeForMonth(
                (employees || []).filter(emp => !emp.department_id || !deptIds.has(emp.department_id))
            );
            if (noDeptEmployees.length > 0) {
                noDeptEmployees.forEach(emp => {
                    html += empRow(emp);
                    renderedDefault.add(emp.user_id);
                });
            }

            if (departments && departments.length > 0) {
                departments.forEach(dept => {
                    let deptEmployees = activeForMonth(
                        (employees || []).filter(emp => emp.department_id === dept.department_id && !renderedDefault.has(emp.user_id))
                    );
                    if (deptEmployees.length === 0) return; // přeskočit prázdná oddělení
                    // Vedoucí oddělení vždy první (identifikace přes org_role)
                    const leaderIdx = deptEmployees.findIndex(e =>
                        e.org_role === 'DEPT_LEADER' || e.org_role === 'DEPT_DEPUTY'
                    );
                    if (leaderIdx > 0) {
                        const deptLeader = deptEmployees.splice(leaderIdx, 1)[0];
                        deptEmployees.unshift(deptLeader);
                    }
                    html += `<div class="dept-header"><div class="dept-label-sticky">${dept.name}</div></div>`;
                    deptEmployees.forEach(emp => { html += empRow(emp); renderedDefault.add(emp.user_id); });
                });
            }

            if (renderedDefault.size === 0) {
                html = '<div class="dept-header"><div class="dept-label-sticky">Žádní zaměstnanci nenalezeni</div></div>';
            }
        }

        const gridContainer = document.getElementById('grid-content');
        if (gridContainer) gridContainer.innerHTML = html;
    }

    /**
     * Zobrazí auth screen v daném stavu (register / pending / rejected).
     */
    function showAuthScreen(state, data) {
        const screen = document.getElementById('auth-screen');
        if (!screen) return;

        screen.querySelectorAll('.auth-state').forEach(s => s.classList.remove('active'));

        if (state === 'register') {
            const emailEl = document.getElementById('reg-email');
            if (emailEl) emailEl.value = data.email || '';

            // Pokud email není dostupný, skrýt formulář a zobrazit varování
            const noEmailWarning = document.getElementById('reg-no-email-warning');
            const regForm = document.getElementById('reg-form-body');
            if (!data.email) {
                if (noEmailWarning) noEmailWarning.style.display = 'block';
                if (regForm) regForm.style.display = 'none';
            } else {
                if (noEmailWarning) noEmailWarning.style.display = 'none';
                if (regForm) regForm.style.display = 'block';
            }

            const deptSelect = document.getElementById('reg-dept');
            if (deptSelect && data.departments) {
                deptSelect.innerHTML = '<option value="">-- Vyberte oddělení --</option>';
                data.departments.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.department_id;
                    opt.textContent = d.name;
                    deptSelect.appendChild(opt);
                });
            }
            document.getElementById('auth-state-register').classList.add('active');

        } else if (state === 'pending') {
            const emailEl = document.getElementById('pending-email');
            if (emailEl) emailEl.textContent = data.email || '';
            document.getElementById('auth-state-pending').classList.add('active');

        } else if (state === 'rejected') {
            const emailEl = document.getElementById('rejected-email');
            if (emailEl) emailEl.textContent = data.email || '';
            document.getElementById('auth-state-rejected').classList.add('active');
        }

        screen.classList.add('visible');

        // Skrýt hlavní app-shell a vyčistit topbar, aby nic neprostupovalo
        const appShell = document.querySelector('.app-shell');
        if (appShell) appShell.style.visibility = 'hidden';
    }

    /**
     * Odešle registrační žádost na server.
     */
    async function submitRegistration() {
        const firstName = (document.getElementById('reg-firstname').value || '').trim();
        const lastName = (document.getElementById('reg-lastname').value || '').trim();
        const deptId = document.getElementById('reg-dept').value;

        if (!firstName || !lastName || !deptId) {
            alert('Vyplňte všechna povinná pole (jméno, příjmení, oddělení).');
            return;
        }

        const btn = document.getElementById('reg-submit-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Odesílám...'; }

        try {
            const result = await callServer('registerUser', { first_name: firstName, last_name: lastName, department_id: deptId });
            if (result && result.success) {
                const screen = document.getElementById('auth-screen');
                screen.querySelectorAll('.auth-state').forEach(s => s.classList.remove('active'));
                const emailEl = document.getElementById('pending-email');
                if (emailEl) emailEl.textContent = document.getElementById('reg-email').value || '';
                document.getElementById('auth-state-pending').classList.add('active');
            } else {
                alert('Chyba: ' + (result ? result.error : 'Neznámá chyba'));
                if (btn) { btn.disabled = false; btn.textContent = 'Odeslat žádost o přístup'; }
            }
        } catch (e) {
            alert('Chyba při odesílání: ' + e);
            if (btn) { btn.disabled = false; btn.textContent = 'Odeslat žádost o přístup'; }
        }
    }

    function getISOWeek(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

       NOTIFICATION SYSTEM
       ========================================================= */

    let _notifPanelOpen = false;
    let _notifData = [];

    /**
     * Načte notifikace ze serveru a aktualizuje badge.
     */
    async function loadNotifications() {
        try {
            const res = await callServer('getNotifications');
            if (!res || !res.success) return;
            _notifData = res.notifications || [];
            const unread = _notifData.filter(n => n.read === 'false' || n.read === false).length;
            const badge = document.getElementById('notif-badge');
            if (badge) {
                if (unread > 0) {
                    badge.textContent = unread > 99 ? '99+' : String(unread);
                    badge.classList.add('visible');
                } else {
                    badge.classList.remove('visible');
                }
            }
            // Pokud je panel otevřený, překreslit ho
            if (_notifPanelOpen) renderNotifPanel(_notifData);
        } catch (e) {
            console.warn('loadNotifications error:', e);
        }
    }

    /**
     * Otevře / zavře notifikační panel.
     */
    function toggleNotifPanel() {
        _notifPanelOpen = !_notifPanelOpen;
        const panel = document.getElementById('notif-panel');
        const backdrop = document.getElementById('notif-backdrop');
        if (!panel || !backdrop) return;

        if (_notifPanelOpen) {
            renderNotifPanel(_notifData);
            panel.classList.add('visible');
            backdrop.classList.add('visible');
        } else {
            panel.classList.remove('visible');
            backdrop.classList.remove('visible');
        }
    }

    /**
     * Vykreslí seznam notifikací do panelu.
     */
    function renderNotifPanel(notifs) {
        const list = document.getElementById('notif-list');
        if (!list) return;

        if (!notifs || notifs.length === 0) {
            list.innerHTML = `
                <div class="notif-empty">
                    <div class="notif-empty-icon">🔔</div>
                    <div class="notif-empty-text">Žádná nová oznámení</div>
                </div>`;
            return;
        }

        list.innerHTML = notifs.map(n => {
            const isUnread = n.read === 'false' || n.read === false;
            const isRegReq = n.type === 'REGISTRATION_REQUEST';
            const isVacReq = n.type === 'VACATION_APPROVAL_REQUEST';
            const isVacResult = n.type === 'VACATION_APPROVED' || n.type === 'VACATION_REJECTED';
            const timeStr = formatTimeAgo(n.timestamp);
            const pu = n.pending_user;
            const vr = n.vacation_request;

            // Detail žadatele nebo obecná zpráva
            const isPending = pu && (!pu.auth_status || pu.auth_status === 'PENDING');
            const isApproved = pu && pu.auth_status === 'APPROVED';
            const isRejected = pu && pu.auth_status === 'REJECTED';

            let contentHtml;
            if (isVacReq && vr) {
                // Žádost o schválení dovolené
                const requesterName = escapeHtml(vr.requester_name || vr.first_name || '');
                const deptName = vr.department_name ? `<span style="color:#64748b"> · ${escapeHtml(vr.department_name)}</span>` : '';
                const datesList = (vr.entries || []).map(e => `<span class="notif-vacation-date-chip">${escapeHtml(_formatApprovalDate(e.date) || e.date || '')}</span>`).join('');
                const hasLocalPending = _getPendingEntriesForUser(vr.requester_id || '').length > 0;
                contentHtml = `<div class="notif-item-user">
                        <div class="notif-item-user-name">${requesterName}${deptName}</div>
                    </div>
                    <div class="notif-vacation-dates">${datesList}</div>
                    ${hasLocalPending ? `<div class="notif-item-actions">
                        <button class="notif-open-approval-btn" onclick="openVacationApprovalFromNotif('${n.notif_id}')">
                            ⏳ Otevřít schvalování
                        </button>
                    </div>` : `<div class="notif-item-msg" style="color:#94a3b8; font-style:italic;">Žádost již byla zpracována.</div>`}`;
            } else if (isVacResult) {
                const icon = n.type === 'VACATION_APPROVED' ? '✓' : '✕';
                const color = n.type === 'VACATION_APPROVED' ? '#15803d' : '#be123c';
                contentHtml = `<div class="notif-item-msg" style="color:${color}; font-style:italic;">${icon} ${escapeHtml(n.message || '')}</div>`;
            } else if (isRegReq && isPending) {
                contentHtml = `<div class="notif-item-user">
                        <div class="notif-item-user-name">${escapeHtml((pu.first_name || '') + ' ' + (pu.last_name || ''))}</div>
                        <div class="notif-item-user-meta">
                            ${escapeHtml(pu.email || '')}
                            ${pu.department_name ? `<br>Oddělení: ${escapeHtml(pu.department_name)}` : ''}
                        </div>
                   </div>
                <div class="notif-item-actions">
                    <button class="notif-approve-btn"
                        id="approve-${n.notif_id}"
                        onclick="approveUserFromNotif('${pu.user_id}', '${n.notif_id}')">
                        ✓ Schválit
                    </button>
                    <button class="notif-reject-btn"
                        id="reject-${n.notif_id}"
                        onclick="rejectUserFromNotif('${pu.user_id}', '${n.notif_id}')">
                        ✕ Zamítnout
                    </button>
                </div>`;
            } else if (isRegReq && isApproved) {
                contentHtml = `<div class="notif-item-user">
                        <div class="notif-item-user-name">${escapeHtml((pu.first_name || '') + ' ' + (pu.last_name || ''))}</div>
                        <div class="notif-item-user-meta">${escapeHtml(pu.email || '')}</div>
                   </div>
                <div class="notif-item-msg" style="color:#15803d; font-style:italic;">✓ Přístup byl schválen.</div>`;
            } else if (isRegReq && isRejected) {
                contentHtml = `<div class="notif-item-user">
                        <div class="notif-item-user-name">${escapeHtml((pu.first_name || '') + ' ' + (pu.last_name || ''))}</div>
                        <div class="notif-item-user-meta">${escapeHtml(pu.email || '')}</div>
                   </div>
                <div class="notif-item-msg" style="color:#be123c; font-style:italic;">✕ Žádost byla zamítnuta.</div>`;
            } else if (isRegReq) {
                contentHtml = `<div class="notif-item-msg" style="color:#94a3b8; font-style:italic;">Žádost již byla zpracována.</div>`;
            } else {
                contentHtml = `<div class="notif-item-msg">${escapeHtml(n.message || '')}</div>`;
            }

            return `
                <div class="notif-item ${isUnread ? 'unread' : ''}" id="notif-item-${n.notif_id}" onclick="markAsRead('${n.notif_id}')">
                    <div class="notif-item-header">
                        <div class="notif-item-title">${escapeHtml(n.title || '')}</div>
                        <div class="notif-item-time">${timeStr}</div>
                    </div>
                    ${contentHtml}
                </div>`;
        }).join('');
    }

    /**
     * Označí konkrétní notifikaci jako přečtenou.
     */
    async function markAsRead(notifId) {
        const notif = _notifData.find(n => n.notif_id === notifId);
        if (!notif || notif.read === 'true' || notif.read === true) return;

        // Optimistický update v UI
        notif.read = 'true';
        const item = document.getElementById('notif-item-' + notifId);
        if (item) item.classList.remove('unread');

        _updateNotifBadge();

        try {
            await callServer('markNotificationRead', notifId);
        } catch (e) {
            console.warn('markAsRead error:', e);
        }
    }

    /**
     * Označí všechny notifikace jako přečtené (hromadně).
     */
    async function markAllAsRead() {
        const unreadNotifs = _notifData.filter(n => n.read === 'false' || n.read === false);
        if (unreadNotifs.length === 0) return;

        // Optimistický update
        _notifData.forEach(n => { n.read = 'true'; });
        renderNotifPanel(_notifData);
        _updateNotifBadge();

        try {
            await callServer('markAllNotificationsRead');
        } catch (e) {
            console.warn('markAllAsRead error:', e);
            loadNotifications(); // V případě chyby načíst reálný stav ze serveru
        }
    }

    /**
     * Aktualizuje badge na zvonečku podle aktuálních dat v _notifData.
     */
    function _updateNotifBadge() {
        const unread = _notifData.filter(n => n.read === 'false' || n.read === false).length;
        const badge = document.getElementById('notif-badge');
        if (badge) {
            if (unread > 0) {
                badge.textContent = unread > 99 ? '99+' : String(unread);
                badge.classList.add('visible');
            } else {
                badge.classList.remove('visible');
            }
        }
    }

    /**
     * Formátuje timestamp jako "před X min/hod/dny".
     */
    function formatTimeAgo(timestamp) {
        if (!timestamp) return '';
        try {
            const now = Date.now();
            const then = new Date(timestamp).getTime();
            const diff = Math.floor((now - then) / 1000); // sekundy
            if (diff < 60) return 'Právě teď';
            if (diff < 3600) return `před ${Math.floor(diff / 60)} min`;
            if (diff < 86400) return `před ${Math.floor(diff / 3600)} hod`;
            return `před ${Math.floor(diff / 86400)} dny`;
        } catch (_) { return ''; }
    }

    /**
     * Escape HTML pro bezpečné vložení do innerHTML.
     */
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getEmployeeFirstName(userId) {
        if (!plannerData || !plannerData.employees) return "";
        const u = plannerData.employees.find(function (e) { return e.user_id === userId; });
        return u ? (u.first_name || "") : "";
    }

    function getLocalNamedDay(dateStr) {
        if (!plannerData || !plannerData.namedDays) return "";
        const parts = dateStr.split('-');
        const key = String(parts[1]).padStart(2, '0') + "-" + String(parts[2]).padStart(2, '0');
        return plannerData.namedDays[key] || "";
    }

    /* =========================================================
       MONTHLY PLANNER LOGIC (Redesigned)

    let _activePlannerGroups = []; // IDs of groups being viewed

    function renderMonthlyPlanner() {
        const grid = document.getElementById('monthly-grid');
        const period = document.getElementById('monthly-display-period');
        const groupsList = document.getElementById('monthly-groups-list');
        if (!grid || !period || !plannerData) return;

        // 1. Sidebar Groups rendering
        if (groupsList) {
            let groupsHtml = '';
            const groups = plannerData.plannerGroups || [];

            // Pokud není vybraná žádná skupina, vybereme automaticky všechny
            if (_activePlannerGroups.length === 0 && groups.length > 0) {
                _activePlannerGroups = groups.map(g => String(g.group_id));
            }

            groups.forEach(g => {
                const isActive = _activePlannerGroups.includes(String(g.group_id));
                const perm = (plannerData.plannerPermissions || {})[g.group_id] || 'VIEW';
                groupsHtml += `
                <div class="group-item ${isActive ? 'active' : ''}" onclick="togglePlannerGroup('${g.group_id}')" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center;">
                        <div class="group-dot" ${isActive ? `style="background:${g.color || '#0ea5e9'}; border-color:${g.color || '#0ea5e9'};"` : ''}></div>
                        <div class="group-info" style="display:flex; flex-direction:column; margin-left:8px;">
                            <span class="group-name">${escapeHtml(g.name)}</span>
                            <span style="font-size:9px; color:#94a3b8;">${perm === 'VIEW' ? 'Jen čtení' : perm === 'WRITE' ? 'Zápis' : 'Správce'}</span>
                        </div>
                    </div>
                    ${perm === 'ADMIN' ? `<div style="display:flex;gap:4px;"><button onclick="event.stopPropagation(); window.openPlannerGroupModal('${g.group_id}')" style="background:none; border:none; cursor:pointer; font-size:12px; opacity:0.6; color:#1e293b;" title="Upravit Planner">✏️</button><button onclick="event.stopPropagation(); deletePlannerGroup('${g.group_id}', '${escapeHtml(g.name).replace(/'/g, "\\'")}')" style="background:none; border:none; cursor:pointer; font-size:12px; opacity:0.6; color:#ef4444;" title="Smazat Planner">🗑️</button></div>` : ''}
                </div>`;
            });
            groupsList.innerHTML = groupsHtml;

            // Oprávnění k vytvoření
            const canCreateGroups = plannerData.isAdmin || ['SECTION_LEADER', 'DEPT_LEADER'].includes(plannerData.user.org_role);
            const footer = document.querySelector('.monthly-sidebar-footer');
            if (footer) footer.style.display = canCreateGroups ? 'block' : 'none';
        }

        // 2. Grid Header
        const monthNames = ["LEDEN", "ÚNOR", "BŘEZEN", "DUBEN", "KVĚTEN", "ČERVEN", "ČERVENEC", "SRPEN", "ZÁŘÍ", "ŘÍJEN", "LISTOPAD", "PROSINEC"];
        period.textContent = `${monthNames[currMonth]} ${currYear}`;

        const firstDay = new Date(currYear, currMonth, 1);
        let startDay = firstDay.getDay();
        if (startDay === 0) startDay = 7; // Mon=1, Sun=7

        const events = (plannerData.plannerEvents || []).filter(e => _activePlannerGroups.includes(String(e.group_id)));
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const canWriteAny = _activePlannerGroups.some(gid => {
            const p = (plannerData.plannerPermissions || {})[gid];
            const pUp = (p || '').toString().toUpperCase();
            return pUp === 'WRITE' || pUp === 'ADMIN';
        });

        let html = '';

        // Header Row: Week + Day labels
        html += `<div class="monthly-week-label"></div>`;
        const dayLabels = ['PO', 'ÚT', 'ST', 'ČT', 'PÁ', 'SO', 'NE'];
        dayLabels.forEach(label => {
            html += `<div class="monthly-day-label">${label}</div>`;
        });

        // Vždy 6 týdnů (42 dní) pro konzistentní výšku
        let currentIterDate = new Date(currYear, currMonth, 1 - (startDay - 1));

        for (let row = 0; row < 6; row++) {
            // Week number cell
            const weekNum = getISOWeek(currentIterDate);
            const wStart = new Date(currentIterDate);
            wStart.setHours(0, 0, 0, 0);
            const wEnd = new Date(currentIterDate);
            wEnd.setDate(wEnd.getDate() + 6);
            wEnd.setHours(23, 59, 59, 999);
            const isCurrentWeek = (today >= wStart && today <= wEnd);

            html += `<div class="monthly-week-cell"><span class="monthly-week-num ${isCurrentWeek ? 'current' : ''}">KT<br>${weekNum}</span></div>`;

            for (let dayCol = 0; dayCol < 7; dayCol++) {
                const d = currentIterDate.getDate();
                const m = currentIterDate.getMonth();
                const y = currentIterDate.getFullYear();
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isOtherMonth = (m !== currMonth);
                const isToday = (currentIterDate.getTime() === today.getTime());
                const isWeekend = (currentIterDate.getDay() === 0 || currentIterDate.getDay() === 6);
                const dayEvents = isOtherMonth ? [] : events.filter(e => String(e.date).substring(0, 10) === dateStr);
                const holiday = isOtherMonth ? null : (plannerData.holidays || {})[dateStr.substring(5)];

                let cellClass = 'monthly-day-cell';
                if (isOtherMonth) cellClass += ' other-month';
                if (isToday) cellClass += ' today';
                if (holiday) cellClass += ' holiday';
                if (isWeekend) cellClass += ' weekend';

                html += `
                <div class="${cellClass}" onclick="${(!isOtherMonth && canWriteAny) ? `openPlannerEventModal('${dateStr}')` : 'void(0)'}">
                    <div class="monthly-day-header">
                        <span class="monthly-day-num">${isOtherMonth ? '' : d}</span>
                        ${(!isOtherMonth && holiday) ? `<span class="monthly-day-holiday-label" title="${holiday}">${holiday}</span>` : ''}
                    </div>
                    <div class="monthly-day-events">
                        ${dayEvents.map(e => {
                    const group = plannerData.plannerGroups.find(g => String(g.group_id) === String(e.group_id));
                    const eColor = (group && group.color) ? group.color : '#0ea5e9';
                    const eIcon = (e.type && e.type !== 'default') ? e.type : '💬';

                    const emp = (plannerData.employees || []).find(emp => String(emp.user_id) === String(e.user_id));
                    const creatorName = emp ? (emp.first_name + ' ' + emp.last_name) : 'Neznámý uživatel';

                    const tooltip = `${eIcon} ${creatorName}\nSkupina: ${group ? group.name : '?'}\nPopis: ${e.description}`;
                    return `
                            <div class="monthly-event-chip" title="${escapeHtml(tooltip)}" style="background:${eColor}18; border-left:3px solid ${eColor}; color:#1e293b; margin-bottom:2px; border-radius:4px; font-size:10px; padding:2px 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" 
                                 onclick="event.stopPropagation(); window.openPlannerEventModal('${dateStr}', '${e.event_id}')">
                                 ${escapeHtml(eIcon)} ${escapeHtml(e.description)}
                            </div>`;
                }).join('')}
                    </div>
                    ${(!isOtherMonth && canWriteAny) ? '<div class="monthly-day-add">+</div>' : ''}
                </div>`;

                currentIterDate.setDate(currentIterDate.getDate() + 1);
            }
        }

        grid.innerHTML = html;
        grid.style.gridTemplateRows = `40px repeat(6, 1fr)`;
    }

    function togglePlannerGroup(groupId) {
        groupId = String(groupId);
        const idx = _activePlannerGroups.indexOf(groupId);
        if (idx === -1) _activePlannerGroups.push(groupId);
        else if (_activePlannerGroups.length > 1) _activePlannerGroups.splice(idx, 1);
        renderMonthlyPlanner();
    }

    function deletePlannerGroup(groupId, name) {
        showCustomConfirm(
            'Smazat Planner',
            `Opravdu chcete trvale smazat kalendář "${name}" a všechny jeho události? Tuto akci nelze vrátit.`,
            async function () {
                showOpSpinner('Mažu planner...', 'Odstraňuji kalendář a všechny události');
                try {
                    const res = await callServer('deletePlannerGroup', groupId);
                    if (res && res.success) {
                        const idx = _activePlannerGroups.indexOf(groupId);
                        if (idx !== -1) _activePlannerGroups.splice(idx, 1);

                        if (plannerData && plannerData.plannerGroups) {
                            plannerData.plannerGroups = plannerData.plannerGroups.filter(g => String(g.group_id) !== String(groupId));
                        }
                        if (plannerData && plannerData.plannerEvents) {
                            plannerData.plannerEvents = plannerData.plannerEvents.filter(e => String(e.group_id) !== String(groupId));
                        }

                        renderMonthlyPlanner();
                        updateOpSpinner('Aktualizuji kalendář...');
                        await refreshApp({ full: true });
                        hideOpSpinner();
                    } else {
                        hideOpSpinner();
                        alert('Chyba: ' + (res ? res.error : 'Neznámá chyba'));
                    }
                } catch (e) {
                    hideOpSpinner();
                    console.warn('deletePlannerGroup error:', e);
                }
            }
        );
    }

    let _currentPlannerEvent = null;

    function openPlannerEventModal(dateStr, eventId) {
        const modal = document.getElementById('planner-event-modal');
        const descInput = document.getElementById('planner-event-desc');
        const typeSelect = document.getElementById('planner-event-type');
        const delBtn = document.getElementById('planner-event-delete-btn');
        const label = document.getElementById('planner-event-date-label');
        const groupSelector = document.getElementById('planner-event-group');
        const saveBtn = document.getElementById('planner-event-save-btn');

        if (!modal || !descInput || !groupSelector) return;

        const d = new Date(dateStr + 'T12:00:00');
        label.textContent = d.getDate() + '. ' + (d.getMonth() + 1) + '. ' + d.getFullYear();

        const ev = eventId ? (plannerData.plannerEvents || []).find(e => e.event_id === eventId) : null;

        const writeGroups = (plannerData.plannerGroups || []).filter(g => {
            const p = (plannerData.plannerPermissions || {})[g.group_id];
            const pUp = (p || '').toString().toUpperCase();
            return pUp === 'WRITE' || pUp === 'ADMIN';
        });

        let displayGroups = [...writeGroups];
        if (ev) {
            const groupExists = displayGroups.some(g => String(g.group_id) === String(ev.group_id));
            if (!groupExists) {
                const gObj = (plannerData.plannerGroups || []).find(g => String(g.group_id) === String(ev.group_id));
                if (gObj) displayGroups.push(gObj);
            }
        }

        groupSelector.innerHTML = displayGroups.map(g => `<option value="${g.group_id}">${escapeHtml(g.name)}</option>`).join('');

        if (ev) {
            _currentPlannerEvent = { ...ev };
            descInput.value = ev.description || '';
            typeSelect.value = (ev.type && ev.type !== 'default') ? ev.type : '💬';
            groupSelector.value = ev.group_id;

            const p = (plannerData.plannerPermissions || {})[ev.group_id] || 'VIEW';
            const pUp = p.toString().toUpperCase();
            const isOwner = (String(ev.user_id) === String(plannerData.user.user_id));
            const canEdit = (pUp === 'ADMIN' || (pUp === 'WRITE' && isOwner));

            descInput.disabled = !canEdit;
            typeSelect.disabled = !canEdit;
            groupSelector.disabled = true;
            delBtn.style.display = canEdit ? 'block' : 'none';
            if (saveBtn) saveBtn.style.display = canEdit ? 'block' : 'none';
        } else {
            _currentPlannerEvent = { event_id: null, date: dateStr, user_id: plannerData.user.user_id };
            descInput.value = '';
            typeSelect.value = '💬';
            groupSelector.disabled = false;
            delBtn.style.display = 'none';
            descInput.disabled = false;
            typeSelect.disabled = false;
            if (saveBtn) saveBtn.style.display = 'block';

            if (writeGroups.length > 0) {
                const activeWriteGroup = writeGroups.find(g => _activePlannerGroups.includes(String(g.group_id)));
                if (activeWriteGroup) groupSelector.value = activeWriteGroup.group_id;
                else groupSelector.value = writeGroups[0].group_id;
            }
        }

        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('visible'), 10);
        if (!descInput.disabled) descInput.focus();
    }

    function closePlannerEventModal() {
        const modal = document.getElementById('planner-event-modal');
        if (modal) {
            modal.classList.remove('visible');
            setTimeout(() => modal.style.display = 'none', 200);
        }
    }

    async function savePlannerCurrentEvent() {
        if (!_currentPlannerEvent) return;
        const desc = document.getElementById('planner-event-desc').value.trim();
        const groupId = document.getElementById('planner-event-group').value;

        if (!desc) { alert('Zadejte popis události.'); return; }
        if (!groupId) { alert('Vyberte skupinu.'); return; }

        _currentPlannerEvent.description = desc;
        _currentPlannerEvent.group_id = groupId;
        _currentPlannerEvent.type = document.getElementById('planner-event-type').value;

        closePlannerEventModal();
        showOpSpinner('Ukládám událost...', 'Probíhá zápis do plánovacího kalendáře');

        try {
            const res = await callServer('savePlannerEvent', _currentPlannerEvent);
            if (res && res.success) {
                updateOpSpinner('Aktualizuji kalendář...', 'Načítám aktuální data');
                await refreshApp({ full: true });
                hideOpSpinner();
            } else {
                hideOpSpinner();
                alert('Chyba: ' + (res ? res.error : 'Neznámá chyba'));
            }
        } catch (e) {
            hideOpSpinner();
            console.warn('savePlannerEvent error:', e);
        }
    }

    function deletePlannerCurrentEvent() {
        if (!_currentPlannerEvent || !_currentPlannerEvent.event_id) return;

        showCustomConfirm('Smazat událost', 'Opravdu smazat tuto událost?', async function () {
            const eid = _currentPlannerEvent.event_id;
            closePlannerEventModal();
            showOpSpinner('Mažu událost...', 'Odstraňuji z plánovacího kalendáře');

            try {
                const res = await callServer('deletePlannerEvent', eid);
                if (res && res.success) {
                    updateOpSpinner('Aktualizuji kalendář...', 'Načítám aktuální data');
                    await refreshApp({ full: true });
                    hideOpSpinner();
                } else {
                    hideOpSpinner();
                    alert('Chyba: ' + (res ? res.error : 'Neznámá chyba'));
                }
            } catch (e) {
                hideOpSpinner();
                console.warn('deletePlannerEvent error:', e);
            }
        });
    }

    let _editingGroupId = null;

        const modal = document.getElementById('planner-group-modal');
        if (!modal) return;

        // Reset
        _editingGroupId = groupId;
        const nameEl = document.getElementById('pg-name');
        const colorEl = document.getElementById('pg-color');
        const saveBtn = document.getElementById('pg-save-btn');
        if (saveBtn) saveBtn.textContent = groupId ? 'ULOŽIT ZMĚNY' : 'VYTVOŘIT PLANNER';

        if (nameEl) nameEl.value = '';

        document.getElementById('pg-add-suggestions').style.display = 'none';

                // Načteme členy přes query z backendu, protože do frontendu posíláme jen práva aktuálního usera
                // Ale aspoň zakladatele přidáme. Backend by měl vrátit členy... wait, my ve frontendu aktuálně nemáme seznam všech členů.
                // Prozatím tedy umožníme správu z frontendových dat pokud to lze, anebo varujeme.

            }

    // Asynchronní načtení členů do editoru (jelikož ve frontendu je běžně nemáme)
    async function loadGroupMembersToEditor(groupId) {
        if (!groupId) return;
        try {
            const res = await callServer('getPlannerGroupMembers', groupId);
            if (res && res.success && res.members) {
                _groupMembersStaged = res.members.map(m => {
                    const emp = (plannerData.employees || []).find(e => String(e.user_id) === String(m.user_id));
                    return {
                        user_id: m.user_id,
                        name: emp ? (emp.first_name + ' ' + emp.last_name) : 'Neznámý uživatel',
                        permission: (m.permission || 'VIEW').toString().toUpperCase()
                    };
                });
                renderGroupMembersStaged();
            }
        } catch (e) { console.warn(e); }
    }

        _origOpenPlannerGroupModal(groupId);
        if (groupId) loadGroupMembersToEditor(groupId);

    function setBulkPlannerPermissions(perm) {
        if (!perm || _groupMembersStaged.length === 0) return;
        _groupMembersStaged.forEach(m => { m.permission = perm; });
        renderGroupMembersStaged();
    }

    function closePlannerGroupModal() {
        const modal = document.getElementById('planner-group-modal');
        if (modal) {
            modal.classList.remove('visible');
            setTimeout(() => modal.style.display = 'none', 200);
        }
    }

    function updatePlannerGroupUserSuggestions() {
        const type = document.getElementById('pg-add-filter-type').value;
        const q = document.getElementById('pg-add-filter-input').value.toLowerCase().trim();
        const container = document.getElementById('pg-add-suggestions');

        if (!plannerData || !plannerData.employees) {
            container.style.display = 'none';
            return;
        }

        let results = [];
        const emps = plannerData.employees.filter(e => e.active !== 'false' && e.active !== false);

        if (type === 'NAME') {
            if (!q) { container.style.display = 'none'; return; }
            results = emps.filter(e => (e.first_name + ' ' + e.last_name).toLowerCase().includes(q));

            if (results.length === 0) {
                container.innerHTML = '<div style="padding:5px; font-size:12px; color:#94a3b8;">Nic nenalezeno</div>';
            } else {
                container.innerHTML = results.slice(0, 15).map(e => `
                   <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 8px; background:white; border:1px solid #e2e8f0; border-radius:4px;">
                       <span style="font-size:12px;">${escapeHtml(e.first_name + ' ' + e.last_name)}</span>
                       <button type="button" onclick="addEmployeeToPlannerGroup('${e.user_id}')" style="background:var(--primary); color:white; border:none; border-radius:4px; padding:3px 8px; font-size:11px; cursor:pointer;">Přidat</button>
                   </div>
               `).join('');
            }
        } else {
            // Skupiny (Section, Dept, Group)
            let orgList = [];
            let propId = '';

            // Pokus o získání org dat z Admina, pokud existuje v paměti
            let orgData = (typeof admin !== 'undefined' && admin.data) ? admin.data : null;
            if (!orgData && plannerData) orgData = plannerData; // Fallback

            if (type === 'SECTION') { orgList = orgData.sections || []; propId = 'section_id'; }
            if (type === 'DEPT') { orgList = orgData.departments || []; propId = 'department_id'; }
            if (type === 'GROUP') { orgList = orgData.groups || []; propId = 'group_id'; }

            if (q) orgList = orgList.filter(o => (o.name || '').toLowerCase().includes(q));

            if (orgList.length === 0) {
                container.innerHTML = '<div style="padding:5px; font-size:12px; color:#94a3b8;">' + (q ? 'Nic nenalezeno' : 'Žádná data') + '</div>';
            } else {
                container.innerHTML = orgList.map(o => `
                   <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 8px; background:white; border:1px solid #e2e8f0; border-radius:4px;">
                       <span style="font-size:12px; font-weight:600;">${escapeHtml(o.name)}</span>
                       <button type="button" onclick="addMultipleEmployeesToPlannerGroup('${propId}', '${o[propId]}')" style="background:var(--primary); color:white; border:none; border-radius:4px; padding:3px 8px; font-size:11px; cursor:pointer;">PŘIDAT VŠECHNY</button>
                   </div>
               `).join('');
            }
        }

        container.style.display = 'flex';
    }

    function addEmployeeToPlannerGroup(userId) {
        if (!userId || _groupMembersStaged.some(m => String(m.user_id) === String(userId))) return;
        const emp = plannerData.employees.find(e => String(e.user_id) === String(userId));
        if (!emp) return;

        _groupMembersStaged.push({
            user_id: userId,
            name: emp.first_name + ' ' + emp.last_name,
            permission: 'VIEW'
        });
        renderGroupMembersStaged();
        // Option to clear the input here, but maybe better not to, so user can add multiple quickly
    }

    function addMultipleEmployeesToPlannerGroup(propId, val) {
        if (!plannerData || !plannerData.employees) return;
        let count = 0;
        plannerData.employees.forEach(e => {
            if (String(e[propId]) === String(val) && e.active !== 'false' && e.active !== false) {
                if (!_groupMembersStaged.some(m => String(m.user_id) === String(e.user_id))) {
                    _groupMembersStaged.push({
                        user_id: e.user_id,
                        name: e.first_name + ' ' + e.last_name,
                        permission: 'VIEW'
                    });
                    count++;
                }
            }
        });
        renderGroupMembersStaged();
        // Zavření na okamžik hintboxu pro feedback
        document.getElementById('pg-add-suggestions').style.display = 'none';
        document.getElementById('pg-add-filter-input').value = '';
    }

    function renderGroupMembersStaged() {
        const container = document.getElementById('pg-members-container');
        if (!container) return;

        if (_groupMembersStaged.length === 0) {
            container.innerHTML = '<div style="color:#94a3b8; font-size:12px; font-style:italic;">Zatím žádní členové. Použijte vyhledávač výše.</div>';
            return;
        }

        container.innerHTML = _groupMembersStaged.map((m, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:white; margin-bottom:4px; border-radius:8px; border:1px solid #e2e8f0; box-shadow:0 1px 2px rgba(0,0,0,0.02);">
                <span style="font-size:13px; font-weight:700; color:#1e293b;">${escapeHtml(m.name)}</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <select class="perm-select-item" onchange="_groupMembersStaged[${idx}].permission = this.value" style="font-size:11px; padding:4px 8px; border-radius:6px; border:1.5px solid #cbd5e1; background:#f8fafc; font-weight:600;">
                        <option value="VIEW" ${m.permission.toString().toUpperCase() === 'VIEW' ? 'selected' : ''}>NÁHLED</option>
                        <option value="WRITE" ${m.permission.toString().toUpperCase() === 'WRITE' ? 'selected' : ''}>ZÁPIS</option>
                        <option value="ADMIN" ${m.permission.toString().toUpperCase() === 'ADMIN' ? 'selected' : ''}>SPRÁVCE</option>
                    </select>
                    <button type="button" onclick="_groupMembersStaged.splice(${idx}, 1); renderGroupMembersStaged();" style="border:none; background:none; cursor:pointer; color:#ef4444; font-size:16px;" title="Odebrat">✕</button>
                </div>
            </div>
        `).join('');
    }

    async function savePlannerGroup() {
        const nameEl = document.getElementById('pg-name');
        if (!nameEl) return;
        const name = nameEl.value.trim();

        const colorEl = document.getElementById('pg-color');

        if (!name) { alert('Zadejte název planneru.'); nameEl.focus(); return; }

        // Explicitně projít selecty v DOM, abychom měli aktuální 'permission'
        const container = document.getElementById('pg-members-container');
        if (container) {
            const selects = container.querySelectorAll('.perm-select-item');
            selects.forEach((sel, idx) => {
                if (_groupMembersStaged[idx]) {
                    _groupMembersStaged[idx].permission = sel.value;
                }
            });
        }

        const data = {
            group_id: _editingGroupId,
            name: name,
            description: "", // Removed from UI
            color: colorEl ? colorEl.value : 'default',
            members: _groupMembersStaged
        };

        const saveBtn = document.getElementById('pg-save-btn');
        const originalText = _editingGroupId ? 'ULOŽIT ZMĚNY' : 'VYTVOŘIT PLANNER';
        const loadingText = _editingGroupId ? 'UKLÁDÁM...' : 'VYTVÁŘÍM...';

        if (saveBtn) { saveBtn.textContent = loadingText; saveBtn.disabled = true; }

        try {
            const res = await callServer('createPlannerGroup', data);
            if (saveBtn) { saveBtn.textContent = originalText; saveBtn.disabled = false; }

            if (res && res.success) {
                closePlannerGroupModal();
                showOpSpinner(_editingGroupId ? 'Ukládám planner...' : 'Vytvářím planner...', 'Probíhá zápis do databáze');

                // Optimisticky ho hned zařadit do frontendu než se natáhne ze serveru,
                // aby se to zobrazilo okamžitě.
                if (plannerData) {
                    if (!plannerData.plannerGroups) plannerData.plannerGroups = [];
                    const existingGroupIdx = plannerData.plannerGroups.findIndex(g => String(g.group_id) === String(res.group_id));
                    if (existingGroupIdx !== -1) {
                        plannerData.plannerGroups[existingGroupIdx].name = name;
                        plannerData.plannerGroups[existingGroupIdx].color = data.color;
                    } else {
                        plannerData.plannerGroups.push({ group_id: res.group_id, name: name, active: true, color: data.color });
                    }

                    if (!plannerData.plannerPermissions) plannerData.plannerPermissions = {};
                    plannerData.plannerPermissions[res.group_id] = 'ADMIN'; // zakladatel je automaticky ADMIN

                    if (_activePlannerGroups.indexOf(res.group_id) === -1) {
                        _activePlannerGroups.push(res.group_id);
                    }
                    renderMonthlyPlanner();
                }

                updateOpSpinner('Aktualizuji kalendář...', 'Načítám aktuální data');
                await refreshApp({ full: true });
                hideOpSpinner();
            } else {
                alert('Chyba: ' + (res ? res.error : 'Neznámá chyba'));
            }
        } catch (e) {
            hideOpSpinner();
            if (saveBtn) { saveBtn.textContent = 'VYTVOŘIT PLANNER'; saveBtn.disabled = false; }
            console.error('savePlannerGroup error:', e);
        }
    }
