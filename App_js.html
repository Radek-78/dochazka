<script>
    /**
     * Logika plánovače postavená na CSS Grid - REÁLNÁ DATOVÁ VRSTVA + SPLASHSCREEN
     */
    let currYear = new Date().getFullYear();
    let currMonth = new Date().getMonth();
    var plannerData = null;
    let currentView = 'attendance';
    let statsCurrentDate = new Date();
    var _viewSectionId = null; // SUPERADMIN: přepnutý úsek (null = vlastní)

    /** Vrátí section_id podle kterého se filtruje kalendář a statistika */
    function getActiveSectionId() {
        return _viewSectionId || (plannerData && plannerData.user && plannerData.user.section_id) || '';
    }
    let statsUpdateTimer = null;
    let heartbeatTimer = null;

    // ─── DOCHÁZKOVÝ SYSTÉM ────────────────────────────────────────────────────

    let _attendanceData = {}; // key: `${userId}_${date}_${slot}` → entry
    let _attWriteQueue = {}; // pending saves (stejné klíče)
    let _attDeleteQueue = {}; // pending deletes (stejné klíče)
    let _attSaveTimer = null;
    let _attDeleteTimer = null;
    let _attLoadInProgress = false; // mutex: zabraňuje flush během načítání (race condition)
    let _attFlushInProgress = false; // mutex: zabraňuje concurrent flush
    let _attDeleteFlushInProgress = false; // mutex pro delete flush
    let _attSaveRetryCount = 0; // exponenciální backoff counter pro save
    let _attDeleteRetryCount = 0; // exponenciální backoff counter pro delete
    let _attInFlight = []; // záznamy aktuálně odesílané na server (save)
    let _attDeleteInFlight = []; // záznamy aktuálně odesílané na server (delete)
    let _globalAttendanceData = {}; // Kumulativní cache pro všechny načtené dny
    let _attModal = { userId: null, date: null, slot: 'ALL_DAY', selectedStatusId: null, note: '', canEdit: false };
    let _batchMode = { active: false, status_id: null, slot: 'ALL_DAY', action: 'ENTRY' };
    let _batchActionRequest = null; // 'ENTRY' or 'DELETE'
    let _approvalMode = { active: false, entries: [], requesterId: null, decisions: {} };

    // --- BACKGROUND PREFETCH CACHE ---
    // key: `year_month` (např. '2026_0')
    let _attendanceCache = {};

    // ─── REZERVACE STOLŮ ─────────────────────────────────────────────────────
    // key: `${userId}_${date}` → { reservation_id, map_id, cell_id, date }
    let _mapReservations = {};
    let _highlightedUserId = null; // Aktuálně zvýrazněný uživatel

    // Přepne zvýraznění celého řádku uživatele
    function toggleRowHighlight(userId) {
        if (_highlightedUserId === userId) {
            _highlightedUserId = null;
        } else {
            _highlightedUserId = userId;
        }
        renderPlanner(); // Full re-render pro aplikaci třídy na řádek
    }

    function getCellElement(userId, date) {
        return document.querySelector('[data-user-id="' + userId + '"][data-date="' + date + '"]');
    }

    // --- OPERATION SPINNER ---
    function showOpSpinner(text, sub) {
        var overlay = document.getElementById('op-spinner-overlay');
        var textEl = document.getElementById('op-spinner-text');
        var subEl = document.getElementById('op-spinner-sub');
        if (!overlay) return;
        if (textEl) textEl.textContent = text || 'Zpracovávám...';
        if (subEl) subEl.textContent = sub || '';
        overlay.style.display = 'flex';
    }
    function updateOpSpinner(text, sub) {
        var textEl = document.getElementById('op-spinner-text');
        var subEl = document.getElementById('op-spinner-sub');
        if (textEl && text) textEl.textContent = text;
        if (subEl && sub !== undefined) subEl.textContent = sub;
    }
    function hideOpSpinner() {
        var overlay = document.getElementById('op-spinner-overlay');
        if (overlay) overlay.style.display = 'none';
    }

    // --- SYNC TOAST ---
    let _syncToastTimer = null;
    function showSyncToast(action, count, isError = false) {
        const toast = document.getElementById('sync-toast');
        const text = document.getElementById('sync-toast-text');
        if (!toast || !text) return;

        clearTimeout(_syncToastTimer);
        toast.className = 'sync-toast active';

        let suffix = "";
        let adj = "";
        if (count === 1) { suffix = "status"; adj = "docházkový"; }
        else if (count >= 2 && count <= 4) { suffix = "statusy"; adj = "docházkové"; }
        else { suffix = "statusů"; adj = "docházkových"; }

        let actionWord = action === 'DELETE' ? 'Mažu' : 'Ukládám';
        if (isError) {
            toast.classList.add('error');
            actionWord = action === 'DELETE' ? 'Mazání' : 'Ukládání';
            text.innerHTML = `Chyba spojení. ${actionWord} (${count}) zkusím znovu...`;
        } else {
            text.innerHTML = `${actionWord} ${count} ${adj} ${suffix}...`;
        }
    }

    function hideSyncToast(successType, count = '') {
        const toast = document.getElementById('sync-toast');
        const text = document.getElementById('sync-toast-text');
        if (!toast || !text) return;

        clearTimeout(_syncToastTimer);

        if (successType) {
            toast.className = 'sync-toast active success';
            let actionWord = successType === 'DELETE' ? 'vymazáno' : 'uloženo';

            let suffix = "";
            let adj = "";
            if (count !== '') {
                if (count === 1) { suffix = "status"; adj = "docházkový"; }
                else if (count >= 2 && count <= 4) { suffix = "statusy"; adj = "docházkové"; }
                else { suffix = "statusů"; adj = "docházkových"; }
                text.innerHTML = `Úspěšně ${actionWord} ${count} ${adj} ${suffix}`;
            } else {
                text.innerHTML = `Úspěšně ${actionWord}`;
            }
        } else {
            toast.classList.remove('active');
            return;
        }

        _syncToastTimer = setTimeout(() => {
            toast.classList.remove('active');
            setTimeout(() => { toast.className = 'sync-toast'; }, 400); // reset classes after hide
        }, 3000); // 3 vteřiny pro klidnější přečtení
    }

    function canEditUserAttendance(userId) {
        if (!plannerData || !plannerData.user) return false;
        if (userId === plannerData.user.user_id) return true;

        const scope = hasPermission('edit_attendance_scope');
        if (scope === 'ALL') return true;

        const emp = (plannerData.employees || []).find(e => e.user_id === userId);
        if (!emp) return false;

        const myUser = plannerData.user;
        if (scope === 'OWN_DEPARTMENT') return emp.department_id === myUser.department_id;
        if (scope === 'OWN_SECTION') return emp.section_id === myUser.section_id;

        return false;
    }

    /**
     * Kontrola oprávnění na základě RBAC konfigurace.
     */
    function hasPermission(permissionKey) {
        if (!plannerData || !plannerData.user) return false;
        const role = plannerData.user.system_role || 'USER';

        let def = null;
        if (typeof admin !== 'undefined' && admin.defaultRbac) {
            def = admin.defaultRbac.find(r => r.key === permissionKey);
        }

        const config = (plannerData.rbacConfig && plannerData.rbacConfig[permissionKey]) || {};
        let val = config[role] !== undefined ? config[role] : (def ? def[role] : undefined);

        if (role === 'SUPERADMIN') {
            if (def && (def.type === 'scope' || String(def.type).includes('_scope'))) return 'ALL';
            return true;
        }

        if (val === 'NONE' || val === 'false' || val === false) return false;
        if (val === 'true' || val === true) return true;

        return val !== undefined ? val : false;
    }

    /**
     * Zneplatní cache pro daný měsíc (vynutí re-fetch při příštím loadu).
     * @param {string|Date} date - Datum nebo string reprezentující den.
     */
    function _invalidateCache(date) {
        if (!date) return;
        const d = new Date(date);
        const cacheKey = d.getFullYear() + '_' + d.getMonth();
        if (_attendanceCache[cacheKey]) {
            delete _attendanceCache[cacheKey];
            console.log(`[Cache] Invalidated month: ${cacheKey}`);
        }
    }

    /**
     * Získá Promise s daty pro daný rok a měsíc (využívá cache).
     */
    function _fetchMonthDataCached(year, month) {
        const cacheKey = year + '_' + month;
        if (!_attendanceCache[cacheKey]) {
            const officeMap = plannerData?.officeMap;
            const yearMonth = year + '-' + String(month + 1).padStart(2, '0');

            _attendanceCache[cacheKey] = Promise.all([
                callServer('getMonthAttendance', year, month),
                (officeMap && officeMap.map_id)
                    ? callServer('getMapReservationsForMonth', officeMap.map_id, yearMonth)
                    : Promise.resolve(null)
            ]);

            // Log for debugging
            console.log(`[Prefetch] Started downloading: ${year}-${month + 1}`);
        }
        return _attendanceCache[cacheKey];
    }

    /**
     * Asynchronně natáhne data pro definované okolní měsíce sekvenčně.
     */
    async function startBackgroundPrefetch() {
        if (!plannerData) return;

        let monthsToFetch = [];
        // Předchozí 1 měsíc
        let pDate = new Date(currYear, currMonth - 1, 1);
        monthsToFetch.push({ y: pDate.getFullYear(), m: pDate.getMonth() });

        // Následujících 12 měsíců
        for (let i = 1; i <= 12; i++) {
            let nDate = new Date(currYear, currMonth + i, 1);
            monthsToFetch.push({ y: nDate.getFullYear(), m: nDate.getMonth() });
        }

        const toast = document.getElementById('prefetch-toast');
        const toastText = document.getElementById('prefetch-toast-text');
        const progressBar = document.getElementById('prefetch-progress-bar');

        if (toast) toast.classList.add('active');

        const monthNames = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];

        for (let i = 0; i < monthsToFetch.length; i++) {
            let req = monthsToFetch[i];
            let mName = monthNames[req.m] + " " + req.y;

            // Aktualizace textu a progressbaru
            if (toastText) toastText.innerText = `Načítám: ${mName}`;
            if (progressBar) {
                const percent = Math.round(((i + 1) / monthsToFetch.length) * 100);
                progressBar.style.width = percent + "%";
            }

            try {
                const [attRes] = await _fetchMonthDataCached(req.y, req.m);
                if (attRes && attRes.success) {
                    (attRes.data || []).forEach(function (entry) {
                        var dk = String(entry.date).substring(0, 10);
                        var slot = entry.slot || 'ALL_DAY';
                        _globalAttendanceData[entry.user_id + '_' + dk + '_' + slot] = entry;
                    });
                    // Refresh stats if prefetch finishes for a month that might affect current view
                    updateDailyStats();
                }
            } catch (err) {
                console.warn('[Prefetch] Error fetching background data:', req, err);
            }
        }

        if (toastText) toastText.innerText = "Všechna data jsou připravena.";
        const toastTitle = document.getElementById('prefetch-toast-title');
        if (toastTitle) toastTitle.innerText = "Optimalizace dokončena";

        setTimeout(() => {
            if (toast) toast.classList.remove('active');
            // Reset po zmizení
            setTimeout(() => {
                if (progressBar) progressBar.style.width = "0%";
                if (toastTitle) toastTitle.innerText = "Optimalizace kalendáře";
            }, 600);
        }, 3000);
    }

    async function loadAttendance() {
        if (!plannerData) return;
        _attLoadInProgress = true;

        // Ukaž spinner POUZE pokud data ještě nejsou v cache a budou se teprve stahovat
        const cacheKey = currYear + '_' + currMonth;
        const spinner = document.getElementById('calendar-loading-overlay');
        const isAlreadyCached = !!_attendanceCache[cacheKey];
        if (spinner && !isAlreadyCached) spinner.style.display = 'flex';

        try {
            // Použití nacachovaného Promise, ev. jeho vytvoření a fetch  
            const [attRes, resRes] = await _fetchMonthDataCached(currYear, currMonth);

            if (attRes && attRes.success) {
                // Záloha čekajících zápisů před přepisem — ochrana před race condition
                // kdy loadAttendance vrátí stará serverová data dříve, než flush stihl uložit
                const pendingWrites = Object.assign({}, _attWriteQueue);
                _attendanceData = {};
                (attRes.data || []).forEach(function (entry) {
                    var dk = String(entry.date).substring(0, 10);
                    var slot = entry.slot || 'ALL_DAY';
                    _attendanceData[entry.user_id + '_' + dk + '_' + slot] = entry;
                    _globalAttendanceData[entry.user_id + '_' + dk + '_' + slot] = entry;
                });
                // Přeaplikovat čekající zápisy — jejich lokální verze je vždy novější než server
                Object.assign(_attendanceData, pendingWrites);
                Object.assign(_globalAttendanceData, pendingWrites);
            }

            if (resRes && resRes.success) {
                _mapReservations = {};
                (resRes.data || []).forEach(function (r) {
                    var dk = String(r.date).substring(0, 10);
                    _mapReservations[r.user_id + '_' + dk] = {
                        reservation_id: r.reservation_id,
                        map_id: r.map_id,
                        cell_id: r.cell_id,
                        date: dk
                    };
                });
            }

            renderAttendanceInGrid();
            // Po načtení základních dat iniciujeme statistiky a heartbeat
            initStatsAndHeartbeat();

            // Spusť tiché načtení okolních měsíců do cache (využije volný čas JS i sítě)
            startBackgroundPrefetch();
        } catch (e) {
            console.warn('loadAttendance:', e);
        } finally {
            _attLoadInProgress = false;
            if (spinner) spinner.style.display = 'none';
        }
    }

    // ─── STATISTIKY & HEARTBEAT ────────────────────────────────────────────────

    function initStatsAndHeartbeat() {
        if (!plannerData) return;

        // Zobrazíme modul statistik pouze v relevantních pohledech
        const statsModule = document.getElementById('topbar-stats-module');
        if (statsModule) {
            statsModule.style.display = (currentView === 'dashboard' || currentView === 'vacation' || currentView === 'attendance') ? 'flex' : 'none';
        }

        updateDailyStats();

        // Heartbeat každých 5 minut
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        heartbeatTimer = setInterval(() => {
            callServer('updateUserActivity').catch(e => console.warn('Heartbeat failed:', e));
        }, 5 * 60 * 1000);

        // Aktualizace statistik každých 5 minut
        if (statsUpdateTimer) clearInterval(statsUpdateTimer);
        statsUpdateTimer = setInterval(() => {
            updateDailyStats();
        }, 5 * 60 * 1000);

        // První okamžitý heartbeat
        callServer('updateUserActivity').catch(e => console.warn('Initial heartbeat failed:', e));

        // Tlačítko logu aktivity v patičce (pouze pro SUPERADMIN)
        const activityBtn = document.getElementById('footer-activity-btn');
        if (activityBtn) {
            activityBtn.style.display = (plannerData.user && plannerData.user.system_role === 'SUPERADMIN') ? 'inline-flex' : 'none';
        }
    }

    let _statsUpdateId = 0;
    async function updateDailyStats() {
        const myUpdateId = ++_statsUpdateId;
        try {
            const dateStr = statsCurrentDate.toISOString().split('T')[0];
            const stats = calculateLocalStats(dateStr);

            // Pokud už máme v plannerData nějaké online uživatele z dřívějška, použijeme je jako výchozí
            if (plannerData.onlineUsers) {
                stats.online = [...plannerData.onlineUsers];
            } else {
                const myName = (plannerData.user.first_name || "") + " " + (plannerData.user.last_name || "");
                if (!stats.online.includes(myName)) stats.online.unshift(myName);
            }
            highlightStatsDay(dateStr);

            // 1. Nejdříve vykreslíme to, co máme lokálně (velmi rychlé)
            renderStats(stats);

            // 2. Na pozadí (pokud je to dnes) se pokusíme zjistit online stav
            // Ale nebudeme na to čekat (await), aby se UI nezaseknulo
            try {
                const todayStr = new Date().toISOString().split('T')[0];
                // Voláme server jen pro online data
                callServer('getDailyStats', todayStr).then(res => {
                    if (myUpdateId !== _statsUpdateId) return;
                    if (res && res.success) {
                        const onlineSectionId = getActiveSectionId();
                        const serverOnline = res.stats.online || [];
                        const myName = (plannerData.user.first_name || "") + " " + (plannerData.user.last_name || "");

                        let filteredOnline = serverOnline.filter(name => {
                            const emp = (plannerData.employees || []).find(e => (e.first_name + " " + e.last_name) === name);
                            if (!emp) return false;
                            return emp.section_id === onlineSectionId;
                        });

                        if (!filteredOnline.includes(myName)) filteredOnline.unshift(myName);
                        plannerData.onlineUsers = filteredOnline;

                        // Aktualizujeme jen online část
                        stats.online = filteredOnline;
                        renderStats(stats);
                    }
                });
            } catch (e) { console.warn("Online fetch error", e); }
        } catch (e) {
            console.warn('updateDailyStats error:', e);
        }
    }

    function calculateLocalStats(dateStr) {
        const today = new Date();
        const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        const stats = {
            date: dateStr,
            namedDay: getLocalNamedDay(dateStr),
            online: [],
            totalCount: 0,
            unfilled: [],
            filled: [],
            kancelar: [],
            homeoffice: [],
            dovolena: [],
            ostatni: []
        };

        const myUser = (plannerData && plannerData.user) || {};
        const activeSectionId = getActiveSectionId();

        const activeUsers = (plannerData.employees || []).filter(u => {
            // Statistika zobrazuje jen zaměstnance z aktivního úseku
            if (u.section_id !== activeSectionId) return false;

            let isTerminated = false;
            if (u.date_end) {
                const endDate = new Date(u.date_end);
                const todayDate = new Date();
                todayDate.setHours(0, 0, 0, 0);
                if (endDate < todayDate) {
                    isTerminated = true;
                }
            }
            const isActive = u.active !== 'false' && !isTerminated;
            return isActive;
        });
        stats.totalCount = activeUsers.length;

        activeUsers.forEach(u => {
            const fullName = u.first_name + " " + u.last_name;
            const userAtt = getAttendanceForUserAndDate(u.user_id, dateStr);

            if (userAtt.length === 0) {
                stats.unfilled.push(fullName);
                return;
            }

            const primary = userAtt.find(a => a.slot === 'ALL_DAY') || userAtt.find(a => a.slot === 'AM') || userAtt[0];
            const status = (plannerData.statuses || []).find(s => s.status_id === primary.status_id);
            if (!status) {
                stats.unfilled.push(fullName);
                return;
            }

            const sName = (status.name || "").toLowerCase().trim();
            const sCat = (status.category || "").toLowerCase().trim();
            const item = {
                name: fullName,
                status: status.name,
                color: status.color || 'var(--primary)',
                category: status.category || 'Ostatní'
            };

            stats.filled.push(item);

            if (sName.includes('kancelář')) {
                stats.kancelar.push(item);
            } else if (sName.includes('homeoffice') || sName.includes('home office')) {
                stats.homeoffice.push(item);
            } else if (sCat.includes('volno') || sCat.includes('absence') || sName.includes('dovolená') || sName.includes('volno')) {
                stats.dovolena.push(item);
            } else {
                stats.ostatni.push(item);
            }
        });

        const catOrder = ['práce', 'přítomnost', 'volno / absence', 'v / a', 'v/a', 'zdraví', 'ostatní'];
        const sortFn = (a, b) => {
            let cA = (a.category || "").toLowerCase().trim();
            let cB = (b.category || "").toLowerCase().trim();

            // Sjednocení variant
            if (cA === 'v / a' || cA === 'v/a') cA = 'volno / absence';
            if (cB === 'v / a' || cB === 'v/a') cB = 'volno / absence';

            let idxA = catOrder.findIndex(cat => cA.includes(cat));
            let idxB = catOrder.findIndex(cat => cB.includes(cat));

            if (idxA !== idxB) {
                const wA = idxA === -1 ? 999 : idxA;
                const wB = idxB === -1 ? 999 : idxB;
                return wA - wB;
            }
            // Pokud je stejná kategorie, řadíme dle názvu statusu a pak jména
            const sComp = (a.status || "").localeCompare(b.status || "", 'cs');
            if (sComp !== 0) return sComp;
            return (a.name || "").localeCompare(b.name || "", 'cs');
        };

        stats.filled.sort(sortFn);
        stats.kancelar.sort((a, b) => (a.name || "").localeCompare(b.name || "", 'cs'));
        stats.homeoffice.sort((a, b) => (a.name || "").localeCompare(b.name || "", 'cs'));
        stats.dovolena.sort((a, b) => (a.name || "").localeCompare(b.name || "", 'cs'));
        stats.ostatni.sort((a, b) => (a.name || "").localeCompare(b.name || "", 'cs'));
        stats.unfilled.sort((a, b) => a.localeCompare(b, 'cs'));

        return stats;
    }

    /**
     * Pomocná funkce pro zjištění, zda má zaměstnanec v daný den jmeniny.
     * Používá přesné porovnání jmen (Martin != Martina).
     */
    function _hasEmployeeNamedDay(userId, dateStr) {
        if (!userId || !dateStr) return false;
        const firstName = (getEmployeeFirstName(userId) || "").toLowerCase();
        const namedDayRaw = (getLocalNamedDay(dateStr) || "").toLowerCase();
        if (!namedDayRaw) return false;

        // Rozdělit jména podle běžných oddělovačů (mezera, lomítko, čárka, " a ")
        const names = namedDayRaw.split(/[\s,/\-]+| a /).filter(Boolean);
        return names.some(n => n === firstName);
    }

    function getAttendanceForUserAndDate(userId, dateStr) {
        const results = [];
        const slots = ['ALL_DAY', 'AM', 'PM'];
        slots.forEach(slot => {
            const key = userId + '_' + dateStr + '_' + slot;
            const entry = _attendanceData[key] || _globalAttendanceData[key];
            if (entry) results.push(entry);
        });
        return results;
    }

    function highlightStatsDay(dateStr) {
        // Odstranit starý highlight
        document.querySelectorAll('.stats-highlight').forEach(el => el.classList.remove('stats-highlight'));

        // Přidat nový highlight
        document.querySelectorAll('.cell[data-date="' + dateStr + '"]').forEach(el => {
            el.classList.add('stats-highlight');
        });
    }

    function changeStatsDate(delta) {
        statsCurrentDate.setDate(statsCurrentDate.getDate() + delta);
        updateDailyStats();
    }

    /**
     * Vrátí číslo kalendářního týdne (ISO 8601).
     */
    function getISOWeek(date) {
        let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        let dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        let yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    /** Vrátí ISO week ID ve formátu "YYYY-WW" (rok dle ISO 8601). */
    function getWeekId(date) {
        let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        let dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const isoYear = d.getUTCFullYear();
        const week = Math.ceil((((d - new Date(Date.UTC(isoYear, 0, 1))) / 86400000) + 1) / 7);
        return isoYear + '-' + String(week).padStart(2, '0');
    }

    /** Parsuje week ID ("2026-14" nebo legacy "14") → { year, week }. */
    function parseWeekId(kt) {
        if (kt && String(kt).includes('-')) {
            const parts = String(kt).split('-');
            return { year: Number(parts[0]), week: Number(parts[1]) };
        }
        return { year: new Date().getFullYear(), week: Number(kt) };
    }

    /** Vrátí week ID pro datum posunuté o offsetWeeks od dnes. */
    function offsetWeekId(baseDate, offsetWeeks) {
        const d = new Date(baseDate);
        d.setDate(d.getDate() + offsetWeeks * 7);
        return getWeekId(d);
    }

    /**
     * Vykreslí modul s marketingovými týdny a akčními dny (Po/Čt) v topbaru.
     */
    function _renderMarketingWeeks() {
        try {
            const module = document.getElementById('topbar-promo-module');
            const text = document.getElementById('promo-current-text');
            const tooltip = document.getElementById('promo-tooltip');
            if (!module || !text || !tooltip) return;

            const data = (plannerData && plannerData.marketingWeeks) ? plannerData.marketingWeeks : [];
            const now = new Date();
            const currentWeekId = getWeekId(now);
            const { week: currentKT } = parseWeekId(currentWeekId);

            // Najít aktuální týden — porovnáváme weekId nebo legacy číslo
            const findWeek = (weekId) => data.find(w => {
                const p = parseWeekId(w.kt);
                const q = parseWeekId(weekId);
                return p.year === q.year && p.week === q.week;
            });

            const currentWeek = findWeek(currentWeekId);

            // --- Pill obsah ---
            if (currentWeek && (currentWeek.monday || currentWeek.thursday)) {
                const mon = currentWeek.monday || '—';
                const thu = currentWeek.thursday || '—';
                text.innerHTML =
                    `<span class="promo-pill-kt">KT ${currentKT}</span>` +
                    `<span class="promo-pill-sep"></span>` +
                    `<span class="promo-pill-day"><span class="promo-pill-tag po">Po</span>${mon}</span>` +
                    `<span class="promo-pill-day"><span class="promo-pill-tag ct">Čt</span>${thu}</span>`;
            } else {
                text.innerHTML = `<span class="promo-pill-kt">KT ${currentKT}</span><span style="font-size:10px;opacity:0.6;margin-left:6px;">bez kampání</span>`;
            }

            // --- Tooltip ---
            const isAdmin = typeof hasPermission === 'function' && hasPermission('access_admin');
            let html = `<div class="promo-tt-header">
                <span class="promo-tt-title">🛒 Marketingové kampaně</span>
                <span class="promo-tt-week">KT ${currentKT}</span>
            </div>
            <div class="promo-tt-cols">
                <div class="promo-tt-col-head" style="flex:0 0 38px;"></div>
                <div class="promo-tt-col-head"><span class="promo-tt-day-badge po">Po</span></div>
                <div class="promo-tt-col-head"><span class="promo-tt-day-badge ct">Čt</span></div>
            </div>`;

            for (let i = 0; i < 3; i++) {
                const weekId = offsetWeekId(now, i);
                const { week: kt } = parseWeekId(weekId);
                const week = findWeek(weekId);
                const mon = week && week.monday ? week.monday : null;
                const thu = week && week.thursday ? week.thursday : null;
                const isCurrent = i === 0;
                html += `<div class="promo-tt-row${isCurrent ? ' promo-tt-row-active' : ''}">
                    <div class="promo-tt-kt">${isCurrent ? `<span class="promo-tt-kt-now">${kt}</span>` : `<span class="promo-tt-kt-num">${kt}</span>`}</div>
                    <div class="promo-tt-val">${mon ? `<span class="promo-tt-chip po">${mon}</span>` : '<span class="promo-tt-empty">—</span>'}</div>
                    <div class="promo-tt-val">${thu ? `<span class="promo-tt-chip ct">${thu}</span>` : '<span class="promo-tt-empty">—</span>'}</div>
                </div>`;
            }
            if (isAdmin) html += `<div class="promo-tt-footer">Klikněte pro správu kampaní →</div>`;
            tooltip.innerHTML = html;

            // Viditelnost: zobrazit jen v relevantních pohledech (stejně jako stats)
            const showInView = (currentView === 'dashboard' || currentView === 'vacation' || currentView === 'attendance');
            module.style.display = showInView ? 'flex' : 'none';

            // Click handler
            module.onclick = (e) => {
                e.stopPropagation();
                if (typeof hasPermission === 'function' && hasPermission('access_admin')) openMarketingAdminModal();
            };
            module.style.cursor = isAdmin ? 'pointer' : 'default';
        } catch (err) {
            console.error("Marketing ERROR:", err);
        }
    }

    /**
     * Otevře modál pro editaci marketingových týdnů (pouze pro adminy).
     */
    function openMarketingAdminModal() {
        const modal = document.getElementById('marketing-modal');
        const container = document.getElementById('marketing-edit-container');
        if (!modal || !container) return;

        const existing = [...(plannerData.marketingWeeks || [])];
        const now = new Date();
        // Aktuální + dalších 10 týdnů (celkem 11), s korektním rokem
        const data = [];
        for (let i = 0; i < 11; i++) {
            const weekId = offsetWeekId(now, i);
            const found = existing.find(w => {
                const p = parseWeekId(w.kt); const q = parseWeekId(weekId);
                return p.year === q.year && p.week === q.week;
            });
            data.push(found ? { ...found, kt: weekId } : { kt: weekId, monday: '', thursday: '' });
        }
        _renderMarketingEditTable(data);
        modal.style.display = 'flex';

    /**
     * Přidá nový prázdný řádek pro další kalendářní týden.
     */
    function addMarketingRow() {
        const body = document.getElementById('marketing-edit-body');
        if (!body) return;
        
        const lastKtStr = body.querySelector('tr:last-child .kt-val')?.value;
        let nextKt;
        if (lastKtStr) {
            // Vezmi pondělí daného ISO týdne a posuň o 7 dní = další týden
            const { year, week } = parseWeekId(lastKtStr);
            const jan4 = new Date(Date.UTC(year, 0, 4)); // 4. ledna je vždy v KT1
            const dayOfWeek = jan4.getUTCDay() || 7;
            const mondayOfWeek1 = new Date(jan4.getTime() - (dayOfWeek - 1) * 86400000);
            const mondayOfLastKt = new Date(mondayOfWeek1.getTime() + (week - 1) * 7 * 86400000);
            const mondayOfNextKt = new Date(mondayOfLastKt.getTime() + 7 * 86400000);
            nextKt = getWeekId(mondayOfNextKt);
        } else {
            nextKt = getWeekId(new Date());
        }
        
        const temp = document.createElement('tbody');
        temp.innerHTML = _createMarketingEditRowHtml(nextKt, '', '');
        body.appendChild(temp.firstElementChild);
        
        // Autoscroll dolů v těle modálu
        const modalBody = body.closest('.footer-modal-body');
        if (modalBody) modalBody.scrollTop = modalBody.scrollHeight;
    }

    /**
     * Uloží marketingové týdny na server.
     */
    async function saveMarketingWeeks() {
        const saveBtn = document.getElementById('marketing-save-btn');
        const rows = document.querySelectorAll('.marketing-edit-row');
        const data = [];

        rows.forEach(row => {
            const kt = row.querySelector('.kt-val').value;
            const mon = row.querySelector('.mon-val').value.trim();
            const thu = row.querySelector('.thu-val').value.trim();
            if (kt) data.push({ kt, monday: mon, thursday: thu });
        });

        if (saveBtn) {
            saveBtn.disabled = true;
            saveBtn.innerHTML = 'UKLÁDÁM...';
        }

        try {
            const res = await callServer('updateMarketingWeeks', data);
            if (res && res.success) {
                if (plannerData) plannerData.marketingWeeks = data;
                _renderMarketingWeeks();
                document.getElementById('marketing-modal').style.display = 'none';
                showSyncToast('SAVE', data.length);
            } else {
                alert('Chyba při ukládání: ' + (res?.error || 'Neznámá chyba'));
            }
        } catch (e) {
            console.error(e);
            alert('Chyba komunikace při ukládání kampaní.');
        } finally {
            if (saveBtn) {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'ULOŽIT ZMĚNY';
            }
        }
    }

        dateDisplay.textContent = formattedDate;
        namedDayDisplay.textContent = stats.namedDay || '—';

        renderStatTooltip('list-ho', stats.homeoffice);

    function renderStatTooltip(elementId, items, isUnfilled = false) {

            el.innerHTML = '<div class="stat-tooltip-empty">Žádné záznamy</div>';

            el.innerHTML = items.map(item => {
                const name = (typeof item === 'object') ? item.name : item;

                const status = (typeof item === 'object' && item.status) ? ` <small style="opacity:0.6;font-size:10px;">(${item.status})</small>` : '';

                    </div>

            }).join('');
        }
    }

    // Vrací zkratku dne pro dané datum
    function getDayAbbr(dateStr) {

        return ['NE', 'PO', 'ÚT', 'ST', 'ČT', 'PÁ', 'SO'][d];
    }

    // Vykreslí chipsy pro jednu buňku (ALL_DAY = celá buňka, AM/PM = poloviny)
    function renderAttendanceCell(cellEl, userId, date) {
        if (!plannerData || !plannerData.statuses) return;

        cellEl.innerHTML = '';
        cellEl.classList.remove('has-status', 'weekend', 'sat', 'sun', 'holiday', 'row-highlighted');

        // Zvýraznění řádku
        if (_highlightedUserId === userId) {
            cellEl.classList.add('row-highlighted');
        }

        // Přidání vodoznaku (jako samostatný element, aby nebyl smazán)
        const d = new Date(date + 'T12:00:00').getDate();
        const dayAbbr = getDayAbbr(date);
        const watermark = document.createElement('span');
        watermark.className = 'cell-watermark';
        watermark.textContent = d + (dayAbbr ? ' ' + dayAbbr : '');
        cellEl.appendChild(watermark);

        const dateObj = new Date(date + 'T12:00:00');
        const dw = dateObj.getDay();
        const isSat = (dw === 6);
        const isSun = (dw === 0);
        const holidayName = plannerData.holidays ? plannerData.holidays[date.substring(5)] : null;

        if (isSat) cellEl.classList.add('weekend', 'sat');
        if (isSun) cellEl.classList.add('weekend', 'sun');
        if (holidayName) {
            cellEl.classList.add('holiday');
            cellEl.title = holidayName;
        }

        var allDay = _attendanceData[userId + '_' + date + '_ALL_DAY'];
        var am = _attendanceData[userId + '_' + date + '_AM'];
        var pm = _attendanceData[userId + '_' + date + '_PM'];

        // Funkce pro filtr "Dovolené a volna"
        const isVacationView = (currentView === 'vacation');
        const isVacationStatus = (st) => {
            if (!isVacationView) return true;
            return st && (st.category === 'Volno / Absence' || st.category === 'V / A');
        };

        let contentHtml = '';
        let hasStatus = false;

        // Helper: vrátí HTML chipp pro jeden entry (s podporou pending + staged stavu)
        const chipHtml = (entry, st, extraClass, titlePrefix) => {
            if (!st || !isVacationStatus(st)) return null;
            const isPending = (String(entry.approved) === 'pending');
            const aid = entry.attendance_id || '';
            const stagedDecision = (isPending && aid && _approvalMode.active)
                ? _approvalMode.decisions[aid] : undefined;
            const stagedCls = stagedDecision === true ? ' staged-approve'
                : stagedDecision === false ? ' staged-reject' : '';
            const pendingCls = isPending ? ' pending-approval' : '';
            const pendingOverlay = isPending && stagedDecision === undefined
                ? '<span class="pending-hourglass">⏳</span>' : '';
            const titleSuffix = stagedDecision === true ? ' → schválit'
                : stagedDecision === false ? ' → zamítnout'
                    : isPending ? ' (čeká na schválení)' : '';

            // Kontrola uživatelského nastavení pro zobrazení začátku pracovní doby v chipu
            const showTimeSetting = !!(plannerData && plannerData.user && plannerData.user.show_work_start_time);
            const formattedTime = (showTimeSetting) ? _formatWorkTime(entry.work_start_time) : '';

            const timeTag = (formattedTime && formattedTime !== '')
                ? '<span class="chip-time-tag">' + formattedTime + '</span>'
                : '';
            const timeTitleSuffix = (formattedTime && formattedTime !== '') ? ' · příchod ' + formattedTime : '';

            return '<span class="att-cell-chip' + extraClass + pendingCls + stagedCls +
                '" data-slot="' + entry.slot + '" style="background:' + (st.color || '#94a3b8') +
                ';color:' + (st.text_color || '#fff') + ';" title="' + (titlePrefix ? titlePrefix + ': ' : '') +
                (st.name || '') + timeTitleSuffix + titleSuffix + '">' +
                (st.abbreviation || '') + timeTag + '</span>' + pendingOverlay;
        };

        let hasPending = false;

        if (allDay) {
            var s = plannerData.statuses.find(function (st) { return st.status_id == allDay.status_id; });
            var ch = chipHtml(allDay, s, '', '');
            if (ch !== null) {
                contentHtml = ch;
                hasStatus = true;
                if (allDay.approved === 'pending') hasPending = true;
            }
        } else if (am || pm) {
            var halfHtml = '<div class="att-cell-halves">';
            var hasAnyHalf = false;
            if (am) {
                var sa = plannerData.statuses.find(function (st) { return st.status_id == am.status_id; });
                var cha = chipHtml(am, sa, ' am-chip', 'Dop.');
                if (cha !== null) {
                    halfHtml += cha;
                    hasAnyHalf = true;
                    if (am.approved === 'pending') hasPending = true;
                } else {
                    halfHtml += '<span class="att-cell-chip am-chip empty" data-slot="AM"></span>';
                }
            } else {
                halfHtml += '<span class="att-cell-chip am-chip empty" data-slot="AM"></span>';
            }
            if (pm) {
                var sp = plannerData.statuses.find(function (st) { return st.status_id == pm.status_id; });
                var chp = chipHtml(pm, sp, ' pm-chip', 'Odp.');
                if (chp !== null) {
                    halfHtml += chp;
                    hasAnyHalf = true;
                    if (pm.approved === 'pending') hasPending = true;
                } else {
                    halfHtml += '<span class="att-cell-chip pm-chip empty" data-slot="PM"></span>';
                }
            } else {
                halfHtml += '<span class="att-cell-chip pm-chip empty" data-slot="PM"></span>';
            }
            halfHtml += '</div>';
            if (hasAnyHalf) {
                contentHtml = halfHtml;
                hasStatus = true;
            }
        }

        if (contentHtml) {
            const contentWrap = document.createElement('div');
            contentWrap.className = 'att-cell-content-wrap';
            contentWrap.innerHTML = contentHtml;
            cellEl.appendChild(contentWrap);
        }
        if (hasStatus) cellEl.classList.add('has-status');
        if (hasPending) cellEl.classList.add('has-pending'); else cellEl.classList.remove('has-pending');

        // --- RBAC CLICKABLE LOGIC ---
        const canEdit = canEditUserAttendance(userId);
        let canApprove = false;
        if (hasPending && _isVacationApprover() && userId !== plannerData.user.user_id) {
            const scope = hasPermission('approve_vacation_scope');
            const emp = (plannerData.employees || []).find(e => e.user_id === userId);
            const myUser = plannerData.user;
            if (scope === 'ALL') canApprove = true;
            else if (scope === 'OWN_DEPARTMENT' && emp && emp.department_id === myUser.department_id) canApprove = true;
            else if (scope === 'LEADERS_ONLY' && emp) {
                const leaderRoles = ['DEPT_LEADER', 'DEPT_DEPUTY', 'SECTION_LEADER', 'SECTION_DEPUTY'];
                if (leaderRoles.includes(emp.org_role)) canApprove = true;
            }
        }

        if (canEdit || canApprove) {
            cellEl.classList.add('clickable');
        } else {
            cellEl.classList.remove('clickable');
        }

        // Indikátor jmenin (dortík) - PŘIDÁVÁME AŽ NAKONEC, ABY NEBYL PŘEPSÁN innerHTML
        if (_hasEmployeeNamedDay(userId, date)) {
            const cake = document.createElement('span');
            cake.className = 'namesday-indicator';
            cake.innerHTML = '🎂';
            cake.title = 'Svátek má ' + getEmployeeFirstName(userId);
            cellEl.appendChild(cake);
        }

        // Červený rámeček pro vlastní buňky bez rezervace stolu
        _checkNeedsDeskBorder(cellEl, userId, date);
    }

    /**
     * Vrátí true pokud daný status vyžaduje rezervaci stolu.
     */
    function _statusNeedsDeskReservation(statusId) {
        if (!statusId || !plannerData || !plannerData.statuses) return false;
        var s = (plannerData.statuses || []).find(function (st) { return st.status_id == statusId; });
        return s && (s.allows_desk_reservation === 'true' || s.allows_desk_reservation === true);
    }

    /**
     * Formátuje work_start_time na "H:MM".
     * Zvládá HH:MM string i ISO date string (Google Sheets time konverze).
     */
    function _formatWorkTime(val) {
        if (!val || val === '') return '';
        try {
            // Pokud je to už Date objekt (Google Sheets konverze)
            if (val instanceof Date) {
                var h = String(val.getHours()).padStart(2, '0');
                var m = String(val.getMinutes()).padStart(2, '0');
                return h + ':' + m;
            }

            var s = String(val).trim();
            if (s === '') return '';
            if (s.indexOf("'") === 0) s = s.substring(1);

            // ISO date string (Google Sheets uložil čas jako datum: "1899-12-30T08:00:00.000Z")
            if (s.indexOf('T') !== -1) {
                var d = new Date(s);
                if (!isNaN(d)) {
                    var h = String(d.getUTCHours()).padStart(2, '0');
                    var m = String(d.getUTCMinutes()).padStart(2, '0');
                    return h + ':' + m;
                }
            }
            // HH:MM nebo H:MM string
            var mMatch = s.match(/^(\d{1,2}):(\d{2})/);
            if (mMatch) {
                var hh = mMatch[1].padStart(2, '0');
                return hh + ':' + mMatch[2];
            }
            return s;
        } catch (e) {
            console.warn('_formatWorkTime error:', e, val);
            return String(val);
        }
    }

    /** Vrátí true pokud má status zapnuté zobrazování času příchodu (shows_work_time). */
    function _statusIsOffice(statusId) {
        if (!plannerData) return false;
        var s = (plannerData.statuses || []).find(function (st) { return st.status_id == statusId; });
        return s && (String(s.shows_work_time) === 'true' || s.shows_work_time === true);
    }

    /** Vrátí true pokud má uživatel zapnuto zobrazení time boxu A status je kancelářský. */
    function _shouldShowWorkStartTimeBox(statusId) {
        if (!plannerData || !plannerData.user) return false;
        if (_attModal.userId !== plannerData.user.user_id) return false;
        var enabled = (String(plannerData.user.show_work_start_time) === 'true' || plannerData.user.show_work_start_time === true);
        if (!enabled) return false;
        return _statusIsOffice(statusId);
    }

    /**
     * Přidá červený rámeček buňce pokud je status Kancelář a chybí rezervace stolu.
     * Volá se z renderAttendanceCell (jen pro vlastního uživatele).
     */
    function _checkNeedsDeskBorder(cellEl, userId, date) {
        if (!plannerData || !plannerData.officeMap) return;

        var myMap = plannerData.officeMap;

        // Má uživatel trvalé místo? → nepotřebuje aktivní rezervaci
        var hasPermanentDesk = (myMap.cells || []).some(function (c) {
            return c.type === 'desk' && c.permanent_user_id === userId;
        });
        if (hasPermanentDesk) return;

        // Má rezervaci?
        var hasReservation = !!_mapReservations[userId + '_' + date];

        // Označ chipy kancelářského statusu bez rezervace
        var slots = ['ALL_DAY', 'AM', 'PM'];
        slots.forEach(function (slot) {
            var entry = _attendanceData[userId + '_' + date + '_' + slot];
            if (!entry) return;
            if (!_statusNeedsDeskReservation(entry.status_id)) return;
            // Najdi odpovídající chip
            var chip = cellEl.querySelector('[data-slot="' + slot + '"]');
            if (chip) {
                if (!hasReservation) chip.classList.add('needs-desk-chip');
                else chip.classList.remove('needs-desk-chip');
            }
        });
    }

    function renderAttendanceInGrid() {
        if (!plannerData || !plannerData.statuses) return;
        document.querySelectorAll('.cell[data-user-id][data-date]').forEach(function (cell) {
            var userId = cell.getAttribute('data-user-id');
            var date = cell.getAttribute('data-date');
            renderAttendanceCell(cell, userId, date);
        });
    }

    function handleAttendanceCellClick(event, cellEl) {
        event.stopPropagation();
        var userId = cellEl.getAttribute('data-user-id');
        var date = cellEl.getAttribute('data-date');

        // Approval mode aktivní: kliknutí na buňku přidá/odebere staged rozhodnutí
        if (_approvalMode.active) {
            var handled = _handleApprovalCellClick(userId, date, cellEl);
            if (handled) return;
        }

        // Approval mode: vedoucí klikne na pending buňku → otevření banneru
        if (_isVacationApprover() && cellEl.classList.contains('has-pending') && userId !== plannerData.user.user_id) {
            const scope = hasPermission('approve_vacation_scope');
            const emp = plannerData.employees.find(e => e.user_id === userId);
            const myUser = plannerData.user;

            let canApprove = false;
            if (scope === 'ALL') canApprove = true;
            else if (scope === 'OWN_DEPARTMENT' && emp && emp.department_id === myUser.department_id) canApprove = true;
            else if (scope === 'LEADERS_ONLY' && emp) {
                const leaderRoles = ['DEPT_LEADER', 'DEPT_DEPUTY', 'SECTION_LEADER', 'SECTION_DEPUTY'];
                if (leaderRoles.includes(emp.org_role)) canApprove = true;
            }

            if (!canApprove) return;

            var pendingForCell = _getPendingEntriesForUser(userId);
            if (pendingForCell.length > 0) {
                openVacationApprovalBanner(pendingForCell, userId);
                return;
            }
        }

        const canEdit = canEditUserAttendance(userId);
        if (!canEdit) return; // ZAMEZENÍ KLIKNUTÍ PRO NEOPRÁVNĚNÉ ROLE

        // Batch mode: přímo zapíše status nebo smaže bez otevření modalu
        if (_batchMode.active) {
            if (!canEditUserAttendance(userId)) return;
            var dw = new Date(date + 'T12:00:00').getDay();
            if (dw === 0 || dw === 6) return; // víkendy přeskočit

            var slot = _batchMode.slot || 'ALL_DAY';
            var key = userId + '_' + date + '_' + slot;

            if (_batchMode.action === 'DELETE') {
                // Smazat vše pro daný den (ALL_DAY, AM, PM)
                const slots = ['ALL_DAY', 'AM', 'PM'];
                slots.forEach(s => {
                    const k = userId + '_' + date + '_' + s;
                    delete _attendanceData[k];
                    delete _attWriteQueue[k];
                });
                _persistQueues();
                clearTimeout(_attSaveTimer);
                renderAttendanceCell(cellEl, userId, date);
                queueAttendanceDelete(userId, date, '*');
                // Mazání dne → zruš i rezervaci stolu pokud existuje
                _maybeClearReservationOnStatusChange(userId, date);
                _refreshVacationBalance(userId);
            } else {
                var status = plannerData.statuses.find(function (s) { return s.status_id === _batchMode.statusId; });
                if (!status) return;
                var entry = { user_id: userId, date: date, slot: slot, status_id: _batchMode.statusId, note: '' };
                // Automaticky přidat výchozí čas příchodu pro vlastní Kancelář záznamy
                if (userId === plannerData.user.user_id &&
                    plannerData.user.show_work_start_time === 'true' &&
                    _statusIsOffice(_batchMode.statusId)) {
                    entry.work_start_time = plannerData.user.default_work_start_time || '08:00';
                }
                _attendanceData[key] = entry;
                renderAttendanceCell(cellEl, userId, date);
                var chip = cellEl.querySelector('[data-slot="' + slot + '"]');
                if (chip) chip.classList.add('saving');
                queueAttendanceSave(entry);
                // Aktualizuj counter v banneru a případně zruš rezervaci
                _maybeClearReservationOnStatusChange(userId, date);
                _refreshVacationBalance(userId);
                _updateBatchMapBtn();
            }
            return;
        }

        openAttendanceModal(userId, date);
    }

    // Vykreslí mřížku statusů (seskupeno po kategoriích, ale baleno do řádků po max 5)
    function _renderStatusGrid(canEdit) {
        var rawStatuses = plannerData.statuses.filter(function (s) { return s.active !== 'false'; });
        var groupOrder = ['Práce', 'Volno / Absence', 'Zdraví', 'Ostatní'];

        // Seskupit do objektů
        var groups = groupOrder.map(cat => ({
            label: cat,
            items: rawStatuses.filter(s => {
                var sCat = (s.category && s.category.trim()) ? s.category.trim() : 'Ostatní';
                return sCat === cat;
            })
        })).filter(g => g.items.length > 0);

        // Dynamický výpočet limitu pro zobrazení ve 2 řadách (min 5, max polovina celku)
        var totalActive = rawStatuses.length;
        var rowLimit = Math.max(5, Math.ceil(totalActive / 2));

        // Algoritmus pro balení do řádků
        var packedRows = [];
        var currentRow = null;

        groups.forEach(g => {
            if (!currentRow) {
                currentRow = { labels: [g.label], items: [...g.items] };
            } else {
                // Pokud se vejdou do limitu, spojíme je
                if (currentRow.items.length + g.items.length <= rowLimit) {
                    currentRow.labels.push(g.label);
                    currentRow.items = currentRow.items.concat(g.items);
                } else {
                    packedRows.push(currentRow);
                    currentRow = { labels: [g.label], items: [...g.items] };
                }
            }
        });
        if (currentRow) packedRows.push(currentRow);

        var html = '';
        packedRows.forEach(row => {
            var joinedLabel = row.labels.join(' & ').toUpperCase();
            html += '<div class="att-cat-label">' + joinedLabel + '</div>';
            html += '<div class="att-status-group">';
            row.items.forEach(s => {
                html += _statusBtnHtml(s, _attModal.selectedStatusId, canEdit);
            });
            html += '</div>';
        });

        var gridEl = document.getElementById('att-status-grid');
        gridEl.innerHTML = html;

        // Nastavit počet sloupců podle nejdelší řady, aby mřížka lícovala
        var maxInRow = 0;
        packedRows.forEach(r => maxInRow = Math.max(maxInRow, r.items.length));
        gridEl.style.setProperty('--status-cols', maxInRow);
    }

    function setAttendanceMode(mode) {
        _attModal.mode = mode;

        document.getElementById('btn-mode-full').classList.toggle('active', mode === 'FULL');
        document.getElementById('btn-mode-half').classList.toggle('active', mode === 'HALF');

        const helper = document.getElementById('att-slot-helper');
        if (helper) {
            if (mode === 'HALF') {
                helper.classList.add('visible');
                const helperText = document.getElementById('slot-helper-text');
                if (helperText) helperText.textContent = 'VYBERTE STATUS PRO DOPOLEDNE';
                _attModal.slot = 'AM';
            } else {
                helper.classList.remove('visible');
                _attModal.slot = 'ALL_DAY';
            }
        } else {
            // I bez helperu musíme nastavit slot
            _attModal.slot = (mode === 'HALF') ? 'AM' : 'ALL_DAY';
        }

        // Refresh gridu pro zobrazení výběru a preview
        _renderStatusGrid(_attModal.canEdit);
        _updateStatusPreview();
    }

    function openAttendanceModal(userId, date) {
        if (!plannerData || !plannerData.statuses) return;
        var emp = plannerData.employees.find(function (e) { return e.user_id === userId; });
        if (!emp) return;
        var canEdit = canEditUserAttendance(userId);

        // Detekce módu podle stávajících dat
        var hasAm = !!_attendanceData[userId + '_' + date + '_AM'];
        var hasPm = !!_attendanceData[userId + '_' + date + '_PM'];
        var slot = (hasAm || hasPm) ? 'AM' : 'ALL_DAY';
        var mode = (hasAm || hasPm) ? 'HALF' : 'FULL';

        var existing = _attendanceData[userId + '_' + date + '_' + slot] || null;

        var parts = date.split('-');
        var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        var dayNames = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
        var monthNames = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
        var dateDisplay = dayNames[d.getDay()] + ', ' + d.getDate() + '. ' + monthNames[d.getMonth()] + ' ' + d.getFullYear();

        var amEntry = _attendanceData[userId + '_' + date + '_AM'];
        var pmEntry = _attendanceData[userId + '_' + date + '_PM'];

        _attModal = {
            userId: userId, date: date, slot: slot, mode: mode, nextHalfSlot: 'AM',
            selectedStatusId: existing ? existing.status_id : null,
            amStatusId: amEntry ? amEntry.status_id : null,
            pmStatusId: pmEntry ? pmEntry.status_id : null,
            canEdit: canEdit,
            rangeAction: null // NOVÉ
        };

        document.getElementById('att-modal-date').textContent = dateDisplay;
        document.getElementById('att-modal-user').textContent = emp.first_name + ' ' + emp.last_name;

        // Nastavit UI módu
        document.getElementById('btn-mode-full').classList.toggle('active', mode === 'FULL');
        document.getElementById('btn-mode-half').classList.toggle('active', mode === 'HALF');

        const helper = document.getElementById('att-slot-helper');
        if (helper) {
            if (mode === 'HALF') {
                helper.classList.add('visible');
                const helperText = document.getElementById('slot-helper-text');

            } else {
                helper.classList.remove('visible');
            }
        }

        _renderStatusGrid(canEdit);
        _updateStatusPreview();

        var hasSel = !!_attModal.selectedStatusId;

        // Stable layout toggling
        const applyRow = document.getElementById('att-apply-row');
        // Vždy zobrazit pro editovatelné modaly (aby šlo "před-kliknout" rozsah)
        if (canEdit) applyRow.classList.add('visible'); else applyRow.classList.remove('visible');

        const clearBtn = document.getElementById('att-clear-btn');
        if (canEdit && existing) clearBtn.classList.add('visible'); else clearBtn.classList.remove('visible');

        const batchBtn = document.getElementById('att-batch-btn');
        const batchDeleteBtn = document.getElementById('att-batch-delete-btn');
        if (canEdit) {
            if (batchBtn) batchBtn.classList.add('visible');
            if (batchDeleteBtn) batchDeleteBtn.classList.add('visible');
        } else {
            if (batchBtn) batchBtn.classList.remove('visible');
            if (batchDeleteBtn) batchDeleteBtn.classList.remove('visible');
        }

        document.getElementById('attendance-modal').classList.add('visible');

        // Mapa kanceláře: zobrazit i pro ostatní uživatele, pokud mapa existuje
        var mapSection = document.getElementById('att-map-section');
        if (mapSection) {
            if (plannerData.officeMap) {
                mapSection.style.display = '';
                // Zjisti zda aktuálně vybraný status vyžaduje rezervaci
                var curStatusId = existing ? existing.status_id : null;
                if (curStatusId && _statusNeedsDeskReservation(curStatusId)) {
                    _showMapInModal(date);
                } else {
                    mapSection.classList.add('att-map-inactive');

                    _renderMapInModal(date, false);

                }
